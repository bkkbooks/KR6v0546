廢修飾唐宋皆設僧正司祝皓詩後嶺前峯迭送迎景多目眩亂吟情青山影裏僧家住緑樹陰中客騎行流水洗心塵垢淨涼風吹鬢夢魂清山高已見諸天近明日登臨見化城智導庵中臺南麓即清涼泉側萬曆間釋明經建望海寺東臺元建嘉靖間秋月禪師重修鎮澄詩寶剎陵霄漢登臨意廓然雲霞連海岱嵐色接青天遠塞冥鴻杳長空孤月懸始知身是夢回向禮金仙普濟寺南臺宋建成化間重修性善詩策杖尋幽上翠巔清涼春盡景芳妍千崖花綴千崖錦五頂峯連五頂天梵剎岧嶤陵日月經堂寂寞鎖雲煙真容欲覩知何在極目蒼蒼意惘然法雷寺西臺唐建明法聚重修晉陽西屏詩臺山遠躡勢陵虛臺上高飆不可居五頂插霄皆嵲嶫萬林蔽日總扶疏舊聞勝槩風光異今覺間遊懷抱舒遍歷峯巔望四極恍疑天近地無餘靈應寺北臺五臺唯此山高風猛人難措泊往者多凍餒而死隆慶初釋圓廣與徒明來構居開粥以濟飢寒萬曆丁亥釋佛秀募造文殊大像未遂竟以勞死感夢慈聖施金佛始成遣中使陳儒載送峯頂更建殿宇供奉為祝釐之所丘坦之詩客子新遊地文殊舊道場莊嚴託聖母護法有龍王殿與雲霄近山多松柏香風濤復暴作愁絶老僧房演教寺中臺唐建弘治間玉禪師重建中有鐵塔藏舍利焉秋崖詩嵯峨高萬丈氣宇眇蓬萊塔影連雲漢鐘聲出斗隈龍池藏日月聖地絶塵埃天下多名勝難同是五臺淨土庵棲賢谷嘉靖間玉峯和尚開山歷試苦行嘗四十餘日昏散不入後廣集緇流事淨土行因結庵新安明淵詩雪髮頭陀遁僻林定忘昏散道猶深雙眉不著人間夢一塵高揮劫外音野衲從風因有道山禽相狎為無心蒲團夜照清涼月一榻松風獨自任龍興庵棲賢谷嘉靖初太虛和尚卓庵於此初住林茂無人正旦見金色女手執蓮花立石上俄而不見流光滿谷又嘗聞龍鳴居無何大開社火廣接方來叢林鼎盛因為名鎮澄詩紛紛逐榮辱大士獨驚心避俗離寰闠誅茅入遠岑林花觀代謝漚影識浮沈定入千峯夜寒雲一榻深靈鷲庵華嚴谷東嶺正德間僧官從鈴建大鉢庵紫霞谷羣峯拱抱茂林森聳無邊禪師得楚峯和尚道濟下草八代楚峯嘗囑曰爾後有鉢飯當共衲子食嘉靖甲子卓庵於此掘得銅鉢受斗餘遂成叢林伏牛法光詩住老臺山不記年蔬餐澗飲樂心田雲埋五頂誰人到雪覆千峯獨自眠擊鉢謾歌佛祖句縛茅常結水雲緣自從勘破西來旨此段因緣不易傳鎮澄詩羣山環抱樹森森大士開圖歲已深銅鉢埋來應有讖可知原是舊叢林靜林庵紫霞谷釋真雲所構學天目中峯禪梓其書以施人寂江詩靜林庵結碧巖阿目極溪山樂處多簾捲白雲生遠岫窗含明月映澄波燈寒絶澗龍蛇冷路僻羊腸虎豹過門掩清涼無箇事數聲啼鳥隔煙蘿雜華庵塔兒溝僧正參建法雲庵即古彌陀庵在龍門上長干德清居此號為憨山子清幼歲人呼為清郎萬曆己亥與友妙峯卓庵於此掘地得石座上勒清郎居三字有契焉遂居之鎮澄詩獨宿千峯裏良宵開竹房幽松發爽籟淡月生微涼野色凝心靜溪聲引興長魂清眠不得擁衲坐繩牀大林庵在鳳林谷金陵素庵法師構龍樹庵在車溝嘉靖初寶印楚峯玉堂同參大川和尚曰向去三人載一車後至蛇溝共結庵而居致成叢林蓋蛇溝舊名車溝也楊海州詩巖扉一榻安便遣紅塵纍巾裾帶月清枕簟流松翠梵磬夕轉幽花雨晴還墜蓮社倘相容日耽菩提醉謝畹溪詩三老習禪靜結宇白雲林戶外數峯秀巖前衆壑深夕陰連雨足空翠落庭昏看取蓮花淨方知不染心棲鳳庵天盆北嶺嘉靖間寶峯建釋紫崖詩峯頭嘉木緑依依客子尋芳路轉迷清磬一聲寒雨外淡煙縹眇隔幽栖華嚴庵棲鳳庵東北嘉靖末僧古檀能誦華嚴於此卓庵白頭庵南臺東北十餘里昔有行者生而皓首神異頗多嘉靖間卓庵於此後罔知終焉性善詩皤然一老叟來自無何有手攜紫節藜飄飄鶴隨後兩鬢帶秋霜未擬年多壽隱顯翠微中樵牧傳之久乞食向人間結庵倚山阜紫氣擁崖巔丹砂煮星斗乘興入蓬萊相尋不相偶題詩細咨詢遺蹤果非謬臥雲庵中臺西南麓明建法光詩臥破白雲不出山終朝無事樂間間一聲清唳松頭鶴格外風光那可攀不二樓西臺北樓倚二聖對談石景泰間宣城公子遊此遙見紫金樓躍出雲表因建重樓擬所見也嘉靖丙寅永平法師慧月至此見文殊淨名二聖對談須臾失之有感偈曰清涼有分歸來晚大聖無緣奉覲難一句了然千聖外相逢何事自顢頇先是成化間有老尼居此自憶宣公子再來發其私隱皆符契將終勒石志曰吾若來時必闡華嚴重修是樓月公至此講華嚴凡五遍矣故時人呼為華嚴樓亦曰三生樓鎮澄詩大士談經不二樓八功德水印明秋泠泠清梵滿山谷散入冥空不可收談經人在翠微中縹眇煙霏隔幾重欲寄此心無可託長隨片月挂西峯冰雪談經歲已深蕭條瓶鉢挂高岑虛空不住婆娑影劫火難銷刻苦心臺外佛剎凡三十六東臺外九寺華林寺在古華巖唐建至明朝凡四修香雲寺華林相鄰香藟寺華林之東中有乳頭香藟慈雲寺香藟之南龍蟠寺大會谷其山狀若蟠龍鳳嶺寺龍蟠相鄰溫泉寺臺東南五十餘里古傳昔有王者嬰疾至是就浴疾差因建寺元重修銅鐘寺大會谷中有神鐘受三十斛雕文鏤藻綺煥可觀寺僧慧燈受戒赴京及歸鐘失徘徊愴惻冥啓大聖忽聞空中報曰鐘乃拘樓秦佛時兜率天王所造今收入金剛窟中爾何求耶燈遂勒石為銘云寺法器世無倫擊振吼息煙塵集聖賢滅苦因被收入金剛輪誰得知聞空神表神鐘之去處絶後代之疑人龍泉寺臺東南舊路嶺宋建嘉靖初羣盜縱橫往者憚之有馬大士者不知何來依止廢寺遇賊即殺羣盜乃絶由是道路復通往來無難馬公將卒以三門託燕京大智宗主以慈惠及物山之野民靡然從化恥為盜者皆願施重修其寺諺云前日馬那吒今朝智菩薩燕京釋永慶詩龍泉抱古寺梵影出重城喬木團青蓋丹崖列翠屏朝煙諸壑暝秋水半溪明講罷西齋月蕭然一榻清南臺外九寺靈境寺去臺二十里成化間釋清善建法本詩蕭蕭靈境倚雲層拽杖南來試一登匝地莓苔敷臥具半龕蘿月代昏燈緇衣有力耕南畝白社無人叩上乘覽盡清涼多少寺不堪愁思憶衰興石塔寺亦名小柏寺臺東南谷元建娑婆寺臺西南三十里高齊釋玄賾卓庵于此誦華嚴有婦攜子數來聽經賾疑之婦即知其疑告曰師莫疑我名娑婆乃龍母也因聞法得悟我將脫是類矣賾曰孰當信汝耶婦指龍池曰我若真悟無生者此之深陂涌成高阜言訖隨手而起即成高阜婦即化去後人目其阜名龍宮聖堆玄賾於此建寺名曰娑婆龍母名也鎮澄詩華座巍巍樹影重白雲不散講時鐘龍聞了義乘通去梵宇猶存翠靄中佛光寺臺西南四十里元魏孝文建帝見佛光之瑞因為名唐解脫和尚於此藏修參政王陶詩五臺山上白雲浮雲散臺空境自幽歷代珠幡懸法界纍朝金剎列峯頭風雷激烈龍池夜草木淒涼雁塞秋世路茫茫名利者塵機到此盡應休嵌巖寺臺南六十里元魏孝文帝建赤崖寺聖福寺法華寺殊公寺並在仙花山陽其廓魔石臺雙嶺等寺入焉西臺外九寺祕密寺在祕魔巖巖谷幽深隱者星布唐木叉和尚于此藏修始建寺大千和尚詩覽勝登臨興有餘祕魔巖畔幾間居羊腸石徑通幽谷鯨首鐘聲透碧虛隱隱龍宮多子母蕭蕭僧舍少親疏何時得遂歸來志相共雲間展鉢盂圭峯寺峨谷隋建覺玄詩幾年聞説圭峯寺未暇從容試一遊丹鳳翻來形勢古青猿啼斷海山秋霜鐘搗日開金殿鐵鉢分泉漾碧流嘉賞每思酬宿願爽吟先付管城侯豹子寺熊頭寺向陽寺育王寺望臺寺石門寺六寺並在峨谷隋唐所建鐵勤寺臺西南六十里鐵勤山唐慧洪大師建鎮澄詩西出清涼路轉遙鐵勤方丈倚青㟽鏗鏘澗水幽琴合起伏雲山翠浪朝僧定虛堂生白月鶴飛雙樹動清飆頭陀更在深巖下默默無言味寂寥北臺外九寺寶積寺臺北谷木瓜寺臺北谷普濟寺大黃尖南麓唐建公主寺臺西北谷元魏第四誠信公主出家建唐有尼掘得尺璧獻武則天下敕重建唐末唯德禪師重修淨名寺臺西北繁峙縣南唐建具九山龍戲龜之勢寺在龜背上宋興國間敕建金大定間重修元天曆二年推官郭琪重葺天覺詩月滿汾川寶鐸寒誰來此地葬金棺育王得道行空際尊者飛光出指端天上凝雲常覆定人間劫火漫燒殘三千世界無留迹聊向閻浮示涅槃正覺禪院臺北臨滹沱宋稱天王院宣和初黃冠所侵改神霄宮三年復佛寺時有真容院僧慧識主之邑人仰重相與踊躍葺之復請額于朝賜名正覺禪院將立石志其事識以言于大夫王公元禮禮復言于承德郎高公植植為文其略曰昔我師釋迦以修多羅教付阿難陀以正法眼藏付大迦葉由是宗教並行今五臺山善言佛者宗則佛光解脫師教則華嚴觀國師其間名流繼出代不絶人自宋以來唯教僅存其言宗者寂無聞顧識所主院獨以禪名奈何植復於禮曰事固有實廢而名存者雖聖人不去也昔子貢欲去告朔之餼羊孔子以為羊存猶得以識其禮故告之曰爾愛其羊我愛其禮蓋存其羊冀禮之復行也識之院榜之曰禪其誰曰不可禮固知識之志也請并記以告將來其有能發最上乘者庶幾因是而得解脫復於此土傳無盡燈則於世尊拈花囑付之意為不孤矣清源寺大黃尖下二十里元建羣峯環抱山氣日佳禪者之栖也關西僧戒喜久參悟中和尚及辭中曰爾緣在北逢源而止萬曆初至此卓庵掘地得殘碑因識清源古基也蘭若寺大黃尖北二十里唐建萬曆初法華道者遊行五頂誦法華日夜無怠後挂錫於此重修中有卓錫泉宋谷寺天宮寺入焉鎮澄詩清涼北控太行峯望入煙霄紫翠重日暮白雲飛不盡幾回敲斷夕陽鐘普光寺今名黎谷寺在文岫山金璧峯藏修處洪武間敕修上賜詩以旌之金公嘗依華嚴制為佛事梵音哀婉凡四十二奏唯本寺襲其法四方學者于茲灌頂受業焉御製詩沙門號璧峯五臺山愈崇固知業已白此來石壁空能不為禪縛區區幾劫功處處食常住善世語龐鴻神出詣靈鷲浩瀚佛家風雖已成正覺未入天台叢一朝脫殼去人言金璧翁從斯新佛號盞水溢蛟龍飛錫長空吼隻履挂高松年逾七十歲玄關盡悟終果然忽立化飄然陵蒼穹寄與璧峯翁是必留禪宗附録結蓮社普勸文如是我聞西方有佛名阿彌陀一名無量光一名無量壽又有觀音勢至二菩薩助佛揚化皆以大願力濟度諸衆生其國以七寶莊嚴清淨自然無諸雜穢故名淨土其人皆蓮華化生壽命無量衣食受用隨念而至更無諸苦亦無輪轉故又名極樂世界以此返觀我等現今所受之身所處之世較彼國土淨穢壽量苦樂生死豈止天地之相遠耶而昧者不知或知而不信自作障礙顛倒執迷不思解脫捨此生彼豈不哀哉故我今者勸諸有緣結此蓮社假使難知難辦猶當勉力精勤況佛號甚易持淨土甚易往八萬四千法門無如是之捷徑但能輟清晨俯仰之暇遂可為永劫不壞之資是則用力甚微而收功乃無有盡衆生亦何苦自棄而不為乎噫夢幻非真壽夭難保呼吸之頃即是來生一失人身萬劫不復此時不悟佛如衆生何願深念於無常勿徒貽於後悔淨樂居士張掄勸緣
