body:
  text: 第三五峯靈迹法身無相偶居蓮華千葉之中聖化多方橫出香水四流之表返常合道利用契機故飛輪銜寶蕩除尊貴之幢晦影韜光樹植蕭間之幟千尋壁立跛驢智何處求蹤萬象鏡懸羚羊角誰能漏迹微露一機一境宛然分主分賓淨蠲六識六塵觸處隨時隨地豈同夸張方伎惑亂俗流侈談蓬島三山靈芝益壽神州五嶽丹訣延年神異迥殊正邪攸別志靈迹五臺亦曰五峯臺言高平峯言聳峭所以有五者觀國師云表我大聖五智已圓五眼已淨總五部之真祕洞五陰之性源故首戴五佛之冠頂分五方之髻運五乘之要清五濁之災矣其東西南北四臺皆自中臺發脈一山連屬勢若遊龍唯南臺特秀而窵居焉東臺約高三十八里頂若鰲脊周三里亦名望海峯若夫蒸雲寢壑爽氣澄秋東望明霞若陂若鏡即大海也亦見滄瀛諸洲因以為名東溪之水北注滹沱支山東南延四十里入阜平縣界西北延二十里入繁峙縣界明給事中錫山仁甫萬象春詩攀巖聳步上層巒身世悠然宇宙寬一望滄波迷大海遙瞻紫氣接長安丹峯隱隱霞光映碧樹重重月影團怪道陰雲生石洞從知靈物此中蟠其靈迹二十六那羅延窟臺東畔其內風氣凜然盛夏有冰吐納雲霞或燈光時出華嚴云是菩薩住處亦是神龍所居鎮澄詩石窟開巖畔靈蹤接上方雲霞常出沒神物自幽藏冷積千年雪虛明五夜光東南觀海岱煙水思茫茫笠子塔臺頂宋宣和間代牧趙康弼同慈化大師見異僧入那羅窟留笠子建塔藏之鎮澄詩夢裏乾坤度幾秋窮源直到海峯頭短筇擊碎那羅窟佛國恆沙任爾遊觀音坪臺北麓一里許華嚴谷臺之西北今名東臺溝棗林臺之東北元魏永安二年恆州刺史延慶因獵至此僕夫四人逐一白鹿偶見大宅高門鹿即竄入有一長者鬚髮皓然拄杖而立曰鹿乃我家所有卿何妄逐僕曰我不用鹿飢困奈何翁指東林棗方熟四人就林而食囊之歸進棗延慶慶怪之復迹尋之遂失其所在五王城臺東北數十里有五王寺天城五王城側靈迹記云天城即化寺也不依地立迥出雲霞朱樓紺殿皎若天城得遇之人塵機頓息大會谷臺東谷衆溪交會滹沱之源出此華林臺東南二十里即今古華巖溫湯泉臺東南七十里馬跑泉臺東南六十餘里龍泉關臺東南六十里關之東即直隸關之西即山西釋德清詩策杖煙霞外重關虎豹林路當崎曲險山入塞垣深慘淡黃雲色蕭條落日陰邊笳如怨客嗚噎嶺頭吟舊路嶺臺東南五十餘里鐵鋪臺南五十里棲賢谷臺西南溝俗呼宰殺溝自古真人藏修處也鎮澄詩路入清涼境幽棲獨此多煙霞藏梵宇鐘磬出松蘿疊嶂呈奇畫流泉弄玉珂尋真未相識且看白雲過觀音洞棲賢谷口巖畔洞有滴泉味甘法本詩足躡雲梯上翠巔畫樓飛閣接雲天殷勤瞻禮圓通相一滴甘泉熱惱蠲化竹林臺西南支山二十里亦名昶竹林昔人遠望萬竹鱗鱗近則失之遂此卓庵釋善安詩茅房小築萬松間幕幕煙光四壁環深谷豈宜俗客住溪雲常共野僧間夜深山鬼聞經去日午天人送供還自是身心常寂泊不知飛瀑日潺湲青峯化竹林南今名大螺頂釋法本詩踏遍塵區念已休歸來結社碧峯頭無窮松韻清雙耳不盡雲山豁兩眸一箇蒲團消白日半肩破衲度寒秋人間八萬四千夢盡向無生一念收現聖臺青峯之南唐觀國師嘗見萬聖羅空五臺停岫釋覺玄詩瑞靄雲飛杳杳窮十千開士御寒空繽紛不盡蓮華雨無限真人到此峯明月池臺西南草里昔人晦夜見皎月澄池雨花老人詩倚杖看明月滄浪水正清悠然歌此曲可以濯吾纓未入非熊兆空沉老兔精若逢知道者相與結鷗盟石佛嶺明月池南二十里漫天石東臺頂古有怪石夏流液夜有光後人造屋火之研伽羅山舊云東臺山名應是梵語未詳所出紫府五臺總稱遠望五峯之間紫氣盤鬱神人所居也無恤獵常山西瞻紫雲之瑞至此見聖鎮澄詩西望龍泉錦繡開紫雲鬱鬱鎖仙臺就中一片清涼地劫火曾經幾度來黃巍嶺商英望此見神燈料是小東臺觀來石南臺高三十七里頂若覆盂周一里亦名錦繡峯山峯聳峭煙光凝翠細草雜花千巒彌布猶鋪錦然故以名焉支山南延六十里至嶔巖寺萬仁甫詩南臺孤聳隔諸臺極目氤氳瑞氣開花滿重岡堆錦繡巖藏溼霧鎖莓苔千尋寶剎摩雲出百道飛泉帶雨來欲證菩提何處是暫從法地一徘徊其靈迹二十一仙花山即南臺之山名普明歌南臺之麓仙人之居春雲靄靄暮雨霏霏臥於石罅而坐神龜杳然飛去仙花披靡李環洲詩南極名山絶漢開捫蘿直上最高臺白雲縹眇峯前過紅日曈曨地底來望眼敢云空四海飛身應擬近三台尋真到此聊經宿莫謂丹成便浪猜普賢塔南臺山上古南臺臺南二里嘉靖間香林大士卓庵其上副使楊彩詩沱水恆山一脈來清涼勝迹自天開石門祕訣封何日寶樹靈根那為栽演法當年緣正覺傳燈歧路謾相猜停驂漸欲收登覽先上南天紫翠臺石罅神龜二俱仙花山南半麓石城臺南二十里四山峭壁若城焉德清詩青山白社意何真不厭孤遊杖屨頻石裂峭崖天作障寺居空界日為鄰瑤花紫朮春常在豐草長林鹿自馴悵望餐霞人已去峯頭明月好誰親白龍池臺東南麓插箭嶺臺東二十里宋太宗北征入此見菩薩現八臂相插箭而回萬木坪臺西南四十里唐李澄師莊為普通供養龍宮聖堆近娑婆寺昔有龍母聞法化去時龍池即湧為堆故名焉聖鐘山臺南八十里昔有神鐘飛來懸于巖下高數丈鐘後飛鳴而去今鐵尚存聖僧崖亦名滴水崖臺南七十里唐貞觀中梵僧于此立化古竹林臺西南三十里唐法照入聖境鎮澄詩森森萬竹拂蒼煙可信人間別有天回首不知誰是夢夕陽山色意茫然虒陽嶺臺西南三十餘里佛陀波利見文殊處有尊勝幢存焉虒陽河源發於此志公洞清涼石南法華洞志公洞前七佛洞臺西南二十里古有七梵僧至此入寂不起遂立七佛像千佛洞臺東北崖畔嘉靖末道方者夜遊至此見神燈萬點既出旋入方隨入見玉佛像森列其中穹窿深迥進里許黤然聞波濤悚怖不能出念觀音名願造像忽見一燈尋光得出乃造石佛于洞口金閣嶺臺西北嶺昔人見化金閣建寺以擬之德清詩祇園傑閣境清虛布盡黃金計不疏山指嶽蓮瞻玉氣地從塵海入空居青天有客乘鴻鵠白社何人揭梵書萬里風煙仍擊目不堪登眺轉愁豫一片輕雲日夜浮即看春色又神州無邊芳草年年路不盡滹沱滾滾流人世即今頻側目乾坤自古一登樓憑虛直欲陵風去更許何人汗漫遊侍郎楊海州詩年來蹤迹厭紅塵此日登臨託勝因紫界左窺連渤岱銀潢西指控周秦堂齋罷柝鐘聲靜梵偈傳香月印新贏得緇流詢姓字便疑驅遣幻中身天盆谷金閣之左山若仰盆泰山樵子孫枝詩石磴穿雲上松蘿覓路除山深無客到地僻有僧居刳木通泉水開畦種野蔬好遊渾不倦空閣且停輿蛇溝天盆北舊名車溝若車箱形海螺城天盆之東昔人於此見化城若海旋焉鎮澄詩悵望青山思更依化城縹眇隔煙霏曼殊境界原非外只要當心一息機西臺高三十五里頂平廣周二里亦名挂月峯月墜峯巔儼若懸鏡因以為名其上有泉羣山拱合巖谷幽潛支山西北延四十里至繁峙縣界萬仁甫詩重巒硉矹倚青蒼紺宇參差八水旁欲向法門探上乘間來淨土即西方泉飛石壁三衣溼花吐金蓮萬壑香指點諸天僧話久峯頭明月已生光其靈迹十七魏文人馬迹在臺上石上印文若人馬足迹俗以為魏帝至此覺玄詩魏帝鑾輿避暑來旌旗卷日映山臺盤陀石上空留迹風雨千年印緑苔八功德水臺北副使李北沙詩臺山聞自昔今日見青冥翠抹千尋壁祥看五色屏雲籠七寶樹水繞八功亭散落天花夜清音送客聽二聖對談石唐法林見緇白二叟坐談石上近之則失因為名宣公子覩異於上建樓覺玄詩妙德弘開向上關維摩一默不輕還對談若謂無言説風雨依前點石斑獅子蹤對談石下雨花老人詩誰跨狻猊到五峯徐行踏遍玉芙蓉一方石上遺靈迹八水池邊絶異蹤花落每經香雨溼春深惟有緑苔封杖藜歸去應尋覓見在西巖第幾重牛心石臺東有石狀若牛肝文殊洗鉢池臺東北谷昔有白髮母洗鉢于此僧明信問其故曰中臺乞食而來言訖忽隱唯見光映林谷泥齋和尚處臺東北谷昔有神僧住此以泥作饌與賓共食覺玄詩西臺東北古巖阿尊者修行志不磨日午自搓泥劑子旋充中食省檀那鳥門臺西北隅龍窟臺西半麓石門臺之西南谷中李牛谷臺西北三十里禪堂溝臺西北溝峨谷臺西五十餘里祕魔巖臺西四十餘里木叉和尚居此德清詩羊腸百折任青藜草莽蕭蕭仄徑迷絶壁倚天應隘日斷崖無路只飛梯依人野鶴尋常下逐客山猿日夜啼自是煙霞隨去住到來元不費招攜龍洞在祕魔巖懇禱則龍現見者非一薩埵崖祕魔之西古有代州王氏女不欲配逃于此食薇飲露父母逼之女投崖未墜而飛香山中西二臺之間北臺高四十里舊傳三十八里中臺四十里今登中臺不見北臺地面登北臺則見中臺地面是知北臺高于中臺故易之頂平廣周四里亦名叶斗峯其下仰視巔摩斗杓故以為名風雲雷雨出自半麓有時下方驟雨其上曝睛四方雲氣每歸朝而宿泊焉蓋龍帝之宮也時或猛風怒雷令人悚怖嘗有大風吹人墮澗若稿葉耳東望海氣北眺沙漠令人悲淒登臨者俯仰大觀益覺此生微茫虛幻支山北延四十里至繁峙川前有衆溪發源注清河萬仁甫詩高臺天際鬱崔嵬幾見山僧杖錫回幢影翻時陵日月鐘聲鳴處隱風雷身依北斗懷宸極面對南山獻壽杯冰積萬年消不盡何時窮谷起飛灰其靈迹二十四黑龍池臺上亦名金井池側有龍王祠四方民禱雨輒應西陵丘坦之詩一片黃沙起山川總不分滿空飛亂石四谷合烏雲莫是龍王怒疑從虎口聞春光已三月猶自雪紛紛鎮澄詩萬丈峯頭金井開醍醐甘露謾相猜龍王神力難思議一滴能令遍九垓説法臺臺之東常出鐘梵之音人多聞之法本詩聞道仙人説法臺法音寥寂石生苔談經大士今何在惟有白雲空去來隱峯塔唐鄧隱峯參馬祖飛錫解軍倒化于北臺妹尼立塔近者僧明來重修覺玄詩隱峯倒化古巖前筆立裙衣上聳然良妹已收靈骨後石幢高樹在峯巔蒲坂福登詩人間重苦是無常誰不臨歧手腳忙唯有吾師惺大夢等間遊戲死生場法本詩金鎖玄關不可留鄧公遺塔晚峯頭顛亡倒化乘神浪千古令人仰未休鎮澄詩大士曾參馬祖關陵空一錫向青山頭陀本自無生死爭肯區區取涅槃生陷獄臺後半麓隋繁峙民張愛盜龍池錢若干將歸暴風卒起吹墮于此上聳巉崖下臨絶澗黑雲四蔽冰雪擁身求出莫由志心悔咎稱菩薩名經宿雲開見白兔隨出鎮澄詩迷裏清涼生地獄悟時地獄即清涼須知二法元無相不離當人一念彰羅漢臺臺之次東一級平臺唐十六梵僧至此同化去華嚴嶺臺之東南二臺之間孫孜詩策杖登層嶺攀蘿上極巔深林迷白日古澗落寒泉四望山川盡平臨星斗懸不須求羽化際此是登仙夢覺詩好靜尋山谷探奇上嶺頭雙眸廓海宇兩足跨雲樓杖倚寒空月人臨碧漢流吾知非宿善安得五臺遊樓觀谷臺之東南二十餘里金剛窟在樓觀左崖畔乃萬聖祕宅祇桓圖云三世諸佛供養之器俱藏於此迦葉佛時楞伽鬼王所造神樂及金紙銀書毗奈耶藏銀紙金書修多羅藏佛滅度後並收入此昔佛陀波利入此不出白下正秀詩為訪金剛窟相將啓石扉無心能造詣有相可歸依閣迥雲陰重巖深暑氣微三三前後語千古露真機福登詩金剛窟子無縫罅入者還他師子兒鐵壁銀山直拶透三三之語許渠知德清詩均提相送出精藍無著投機事已慚莫謂當年人不薦至今誰解話三三雲南淨倫詩杖藜特叩金剛窟回首雲生白水池欲問三三前後事一聲幽鳥夕陽西法本詩無著寥寥不復聞古巖餘瑞尚氤氳遊人千載希靈迹猶向峯頭禮白雲鎮澄詩石門寂寂鎖蒼苔波利尋真去不回大智願王無向背遊人何事浪相猜白水池在樓觀谷後其泉若乳山人多取洗眼雨花詩五郎溝下臥殘碑一徑斜通白水池雨歇空山澄罔象風生曲岸動漣漪銀沙布底月來處雪浪滔天雲起時到此君應懷藻鑑洗清法眼是便宜覺玄詩江漢微茫尚炳靈一泓池水自澄渟溶溶淡染秋光白想是仙家玉液醽五郎祠樓觀谷西山麓宋楊業第五子出家處正秀讚正行將令卻入禪那外彰威武內息干戈掃除六賊戡翦四魔金湯教法屏障山河名標寰宇迹寄巖阿偶來稽首謾説伽陀鎮澄詩國士寥寥馬不嘶白雲深鎖五郎祠宋家世界空成夢鐵棒常拈欲恨誰玉泉樓觀谷口無著見化人于此飲牛紫霞谷臺南俗呼北臺溝清涼深處禪侶幽栖也釋明讓詩紫氣絪縕晝不開靈霞日護法王臺雲栖道者談經後散落天花遍九垓龍門臺南麓裂石如崩濤聲若雷北有藏雲谷下有留雲石雲出為雨雲入為霽順庵胡公題其石妙峯刺舌血書華嚴處鎮澄詩獨宿龍門夜寥寥心自如神燈出杳靄清籟發寒虛雪色千山迥秋聲萬木疏坐來諸念寂因識古曼殊金沙泉龍門之側仙人庵臺後覺玄詩何年仙子此修行服日餐霞道氣清袖拂天風騎鶴去至今傳説有庵名九女泉臺後七里曾有九仙女浣衣藏真谷臺西北昔有五百梵僧藏修於此大黃尖臺北二十里即古北臺卓錫泉在蘭若寺唐初僧道賢縛茅藏修每下澗汲水往返甚艱偶客僧至沐浴賢數汲澗下明日僧浣衣賢再汲不厭半途失跌破瓶更取別器汲之略無怠色僧曰子誠矣即卓錫庵前命賢拔之不出僧彈指錫飛泉涌僧即隨去憨山古傳云昔有梵僧從魏孝文帝乞一臥具地帝許之僧展臥具覆五百餘里帝知其神駭之馳騎而去帝聞山錚然顧之趿然隨後帝曰爾憨耶山乃止故以為名文岫山臺之西北四十餘里寶陀山臺北四十里亦名寶山秦戲山臺東北七十里山海經云秦戲之山無草木多金玉滹沱之水出焉亦名派山品字泉在秦戲山即滹沱源西流由北臺之陰諸溪競注過繁峙城北經代州五臺欣州定襄盂縣入真定平山左繞臺山三面中臺高三十九里頂平廣周五里亦名翠巖峯巔巒雄曠翠靄浮空因為名與西北二臺接臂南眺晉陽北俯沙塞有五溪發源二溪左注清河三溪右由西臺下出峨口入滹沱焉水經云峨谷之水出於中臺即此也萬仁甫詩羣峯面面擁奇觀朝雨和煙積翠巒策杖千山渾不倦披裘六月尚餘寒蒼崖碧嶂周遭合古木黃沙四望寬雲霧漸看山半起卻疑身已在雲端其靈迹三十二靈鷲峯臺東南支山今稱菩薩頂宛似西天靈鷲山故借為名正秀詩大士棲靈地何緣得共登光中披梵夾象外見真燈舉杖風堪御騰身虛可憑人天相接處知是最高層鎮澄詩青山藏白社寂寞隔塵寰鐘磬丹霄外樓臺翠靄間鶴依雙樹老僧共野雲間欲識曼殊面還應過別山甘露泉臺右大寶塔靈鷲之前五峯之中漢摩騰天眼見此有阿育王所置佛舍利塔歷代帝王不廢修飾明萬曆間聖母李太后重建厥高入雲神燈夜燭清涼第一勝境也晉陽王道行詩浮圖屹立奠坤儀從此羣山勢盡卑百丈高僧無我相萬年天子竟檀施輪光遍入星河影金色渾成世界奇借問曼殊何處是欲從言下決狐疑鎮澄詩浮圖何縹眇卓出梵王宮遠帶青山色孤標紫界雄金瓶涵海月寶鐸振天風自是藏靈久神邦萬古崇佛足碑在大塔左側按西域記云摩竭陀國波吒釐精舍大石釋迦佛所遺雙足迹其長一尺六寸廣六寸千輻輪相十指皆現華文卍字寶瓶魚劍之狀光明炳煥昔佛北趣拘尸那城將示寂滅回顧摩竭陀國蹈此石上告阿難言吾今最後留此足迹以示衆生有能見者生大信心瞻禮供養滅無量罪常生佛前云云後外道輩嫉心除之愈顯如是八番文彩如故唐貞觀中玄奘法師自西域圖寫持歸太宗敕令刻石祖廟以福邦家至明萬曆壬午秋少林嗣祖沙門威縣明成德州如意一夕一夢蓮花一夢月輪現于塔際既覺各言所夢異之及曉少室僧正道持佛足圖貽之及展見是雙輪印相喜曰此夢真也遂傾囊兼募衆立石時孟秋既望也是夕衆聞空中珠珮雜樂之聲出戶視之神燈點點此聖神嘉贊也鎮澄讚巍巍大雄浩劫忘功神超化外迹示寰中剎塵混入念劫融通開茲覺道扇以真風竭諸有海爍彼空濛巖中留影石上遺蹤碎身作寶永益羣盲稽首佛陀悲願何窮文殊髮塔在大塔東側昔文殊化為貧女遺髮藏此萬曆間方廣道人重修見髮色若金隨人視之不一法本讚昔有㲯毿女領犬復攜兒入衆乞辰齋既得還索之我固無貪妬愍爾多瞋癡箇中無是物何必生嫌疑飛空明玉相斷髮留金絲大士乘通去靈蹤萬古遺紺塔陵雲霄慈光破世迷稽首大智王神功不可思般若泉大塔前左畔唐僧慧潛結庵于此日課金剛經久之感庵側涌泉因為名飲者生慧覺玄詩般若池邊止渴時山瓢一吸樂何支塵塵煩惱俱消歇無限清涼説向誰雜花園大塔前唐末改築戒壇今為空壤鳳林谷臺東南谷西天洞鳳林谷北嶺梵仙山臺東南三十里中臺案山昔有五百仙人餌菊成道秋崖詩愛玩吾家紫府山溪雲老樹共僧間乾坤謾説蓬萊異聞者雖多達者難覺玄詩山頭紫氣日長浮上有仙人汗漫遊餌菊換教風骨異白雲影裏去悠悠井溝梵仙山西楊柏谷井溝南九龍岡臺南近竹林寺令公塔在九龍岡宋楊業忠死子五郎收骨建塔鎮澄詩山色蒼蒼鎖暮煙令公遺塔白雲邊將軍忠義乾坤並千古清標尚凜然竹林舍利塔臺南竹林寺前成化間耕者得石槨內銀匣中有琉璃瓶盛舍利