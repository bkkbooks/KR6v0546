front:
  text: 清涼山志重修流通序文殊菩薩道證一真德超十地入三德之祕藏居常住之寂光但以救苦情殷度生念切故復不違寂光現身塵剎種種方便度脫衆生其為七佛師作菩薩母猶屬迹門之事若論本地則非佛莫知雖盡塵剎界無非所住而障重之凡夫何由識其妙用瞻其法範乎哉以故不得不為初機設一應化之地俾有所趣向而種出世之善根故從昔已來與萬菩薩常住清涼寶山演說一實之道兼示不思議種種神化令善根成熟者即證真常未成熟者因茲增長須知菩薩不動念而隨機示現說法了無差音雌殊者如月到中天影印衆水不但大江大河各現一月即一勺一滴亦現一月江河中月一人視之只見一月百千萬人于百千萬處視之亦各只見一月人若東行月則隨之而東人若西行月則隨之而西人若安住月則不動世間色法之妙尚能如是何况菩薩徹悟唯心圓證自性悲運同體慈起無緣者乎恐拘墟者見志中所有神妙之迹心懷疑惑故為表示其致了此則遍閲大乘經典不至驚疑怖畏不徒為閲此志者作前導也舊志係明萬曆間鎮澄法師所修大體甚好閒有未加詳考之失其時憨山紫柏妙峯皆屬摯友不但于此山有大關係實于佛法世道有大關係均未立傳清康熙間復有修者絶未遍訪且于大有關係之文字任意刪削因茲遂不流通今依明志稍為考訂增修耳去春一弟子李圓淨言文殊普賢觀音地藏四大菩薩實為一切衆生之恃怙師在普陀曾請許止淨居士作觀音本迹頌發揮觀音之深恩重德至為周到師又另修王雅三所修之普陀志何不將五臺峨眉九華志亦按此例而修之乎况五臺志亦無處請而體裁尚好峨眉志則只是志山不復以發揮普賢之道為事九華志則更可痛歎當此世道人心陷溺已極之時固宜亟亟修而流通以作挽回之據遂忘其固陋勉力從事乃請許止淨標示大致其修治則光任之其校對則德森師任之今已排竣雖無大發明然亦不無小補至于近世之事以身既不在其地而以朝不保夕之年亦不敢託人采訪恐事未集而人已逝致成空談故將近事留與後來之哲人耳憶昔光緒十三年在紅螺山告假朝五臺欲請清涼山志至京琉璃廠遍問各舊書店祇得一部因而購之今為排印流通俾後來易得而釋己遺憾何幸如之五臺雖為文殊菩薩道場未見念菩薩時發起之讚今夏華嚴嶺僧瀞栖師祈作一讚以備念誦之儀乃湊成八句寄彼讚曰文殊菩薩德難量久成龍種上法王龍種上佛係文殊過去劫中成佛之名出首楞嚴三昧經龍種上尊王另是一佛不可誤引因憐衆生迷自性特輔釋迦振玄綱為七佛師體莫測作菩薩母用無方常住寂光應衆感萬川一月影咸彰民國二十二年癸酉九月日常慚愧僧釋印光敬撰淮陰重刻清涼山志序元夜月滿地有雪天無雲訪聚用長老於淮陰聞思寺問佛與法聚公曰何者是佛何者是法栴檀貝葉皆非也何者非佛何者非法耳鳴目眚皆是也執像求佛執經求法劫火洞燒經像俱泯二者何在在在皆在而人不悟也余曰佛法如是士農工商信者無幾奈何聚公曰士期於學文無相之文乃為至文不悟者愚矣農期於力田無形之田乃為福田不悟者荒矣工期於能巧無技之巧衆巧所師不悟者拙矣商期於獲利無得之利萬利所歸不悟者窘矣一字必惜是大慧佛一粒必珍是多寶佛一蟲必救是長壽佛而人不悟也一字萬化無量法王一粒萬種無量法寶一蟲萬變無量法母而人更不悟也余問人有三難人身難得中土難生正法難聞奈何聚公曰即非人身無非佛身即非中土無非佛土即非正法無非佛法悟者何難又問佛有三難衆生難度無緣難化定業難逃奈何聚公曰衆本非衆度在慈悲無本非無化在喜舍定本無定逃在懺悔悟者何難又問父母未生我前我在何處聚公曰且道父母既生我後我在何處我未生以前父母又在何處又問如何是祖師西來意聚公曰如何是祖師如何是西如何是來不師師不西西不來來且道且道余遂默然聚公說偈曰今年元夜卻無雲春雪三分月十分大地清涼除熱惱梅花忘我我忘君甲戌春聚公與其徒養淳蘊哲徒步朝清涼山山志板適燬於火乃取舊志歸淮陰重校而梓之請序於余因述問答之語可悟聚公以大千為山以大藏為志無在非清涼者乾隆乙亥上元淮陰教授金壇史震林書清康熙皇帝御製清涼山志序朕惟清涼山古稱文殊大士演教之區也茲山聳峙於雁門雲中之表接恆嶽而俯滹沱橫臨朔塞藩屏京畿其地風徑而高寒層冰結於陰巖積雪留於炎夏故名清涼然地雖寒而嘉木芳草蒙茸山谷稱靈異焉五峯竦立上矗霄漢日月之所回環烟霞之所虧蔽蒼然深秀其為神皋奧區蓋自昔而已然矣是以自漢迄今歷代皆有崇建古剎精藍遍滿巖岫宇內稱靈山佛土最著者有三峨眉普陀而五臺為尤盛焉我世祖章皇帝上為慈闈祝釐下為蒼生錫福賜金遣使屢沛恩施朕數經駐蹕茲山為兩宮祈康寧福祉因而登五峯陟臺懷各為文勒石以紀之琪樹靈葩形於篇詠蓋嘗念佛教以清淨慈惠為本以戒定智慧為宗亦有裨於勸善遠慝茲山又密邇塞垣遠離塵俗當為清修者之所棲泊故於此每惓惓焉山之有志所以紀形勝述建置載藝文俾後之人有所稽考往蹟舊聞不致湮沒茲編詳𥳑適中不蕪不支清涼勝境可撫卷而得其梗概也因敘於𥳑端康熙四十年五月初三日清涼山志序寂光無外五濁懸鏡裏之山至聖非遙六趣閉夢中之宅螺髻眼底儼若天宮鶖子目前依稀人世毋固毋我非色非空惟妙體以無私循業緣而殊現且夫一微塵裏窺法界之莫涯信乎五頂山中宅萬聖而非隘文殊大士既為七佛之師紫府靈峯固矣三千之最雖曰充周法界極神德而無方今則獨指清涼使歸心之有在山橫鴈代孤標震旦之雄聲播五天爰起遐方之敬雜花初唱名曰清涼寶篋重宣稱為五頂乃聖言之有據厥靈蹟亦可徵原夫真區湛寂杳無攀仰之端化宇形殊斯有瞻依之相真該化末化洞真源真化融通聖凡交徹清涼神境斯之謂歟故即真而化曼殊現貧女之軀即化而真波利入金剛之界是以菩薩於衆生心內時時證覺顧衆生不知衆生於菩薩心中念念輪回惟菩薩無礙是則真不外化化豈離真真化一心悟迷斯隔耳其為山也涵容萬化潛育百靈巖花澗草全彰本智之光靜谷幽林深隱真人之宅時乎珠林煥現仙域洞開靈霞生宿客之衣圓光射遊人之影觸目通玄非人間矣是以遊觀之士四海雲馳棲寂之流千巖星布明王聖主代為興福之場列宰名臣屢有思真之詠昏昏業識望影塵消汩汩煩心觀光慧朗至於烏茶仰信醜虜降心則大士攝化之功至矣清涼志者所以載夫臺山盛事者也唐初藍谷法師創集曰清涼傳宋僧延一又為廣傳而無盡居士所覩靈蹟復自書之目曰續傳傳雖再出而於文殊應迹志士感通班班遺諸羣籍而猶未備焉至國朝正德間秋崖法師細搜今古倍益舊文為二十卷收採泛濫未足可傳適際今上聖明御宇慈聖國母廣植勝因敕建釋迦文佛舍利寶塔于清涼山中神功殊利澤及萬方法門盛事光越千古塔院住持圓廣感斯盛遇與不佞言將以書諸傳記昭化後世開覺生民且命不修葺之而後壽梓不佞病斯文之訛亦久矣今有所授敢不勉焉於是削繁秩亂勒門為十於初二門中藉以問辨發揮人境真化之旨殆盡厥文雖減古而事類有序焉明萬曆丙申秋燕山廣應寺沙門鎮澄書于臺山之獅子窟即師子窩總目卷一十三頁一總標化宇二略紀化主分十小目一原聖二釋名三生緣四德相五神用六法要七利行八涅槃九釋住十辨益卷二二十七頁三五峯靈迹四伽藍勝概卷三四十一頁五高僧懿行卷四十四頁六菩薩顯應卷五十六頁七帝王崇建卷六十五頁八名公外護卷七十四頁九異衆感通卷八十六頁十名公題詠文殊聖像文殊菩薩像讃緬維菩薩實龍種上誓願宏深慈悲無量不違寂光現身塵剎隨衆生機說圓通法其所施設妙莫能詮春到百卉月印萬川為憐凡夫無由瞻仰示住清涼俾有所仗闡佛心要及與淨宗理超象外道契寰中唯願慈悲放金色光普令衆生同證真常常慚愧僧釋印光和南撰三寶弟子曹嶽申和南書五臺山圖
