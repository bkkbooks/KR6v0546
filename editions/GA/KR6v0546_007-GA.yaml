body:
  text: 第九異眾感通根塵十二總屬緣生事相三千無非心造況乎大士具智光之無量乘悲願以再來本妙明無作之心為緣熏眾生之境故雲林烟島之間花放鳥啼之候罔非宣揚妙理流布法音但眾生五蓋熏蒸則悟門閉塞六情纏繞則亂想紛馳何由朗愛水之昏波接法流於彼岸乎惟須辦此一誠捐其十礙庶幾薰鑪夜爇心香度此巖前法鼓晨催意蕊舒於座下等千燈之互照似帝網之交羅志感通楞嚴云精研七趣皆是昏沈諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華但一虛妄更無根緒是知三界天仙未出輪迴皆不足以為生民攸賴況山川之靈耶世有烹宰物命昵事鬼神者不直無福實增業累唯吾文殊大聖乃為有生慈悲真主歸崇信向漸以覺乎長夜之迷而超脫乎生死幻累也今夫清涼山者出於佛口大聖所宅於茲蘄嚮信有曼殊真身洋洋乎徧諸雲林烟島之間充塞而無閒也是以四方之民觀光遊禮一念之誠永為成佛不壞種子直至菩提斯善不磨其為益豈不大哉故其感應靈異往往膾炙人口今略錄數條以曉未聞焉耳王子燒身高齊天保帝第三子兩世為僧不犯欲戒故得生知宿命自憶周衰已來為晉楚世家兒殺人盈千人殺己七番生大厭離不樂世位天保七年身嬰重疾醫不能療因入清涼志誠禮懺求見文殊久而不見心生疑慮夢老人曰子於往者唐死無算今求聖少勞而且怠耶且子之身非子有矣可不勉哉王子自念此身必償他債乃於文殊像前然身供養火方然時自陳願云我某然身供聖良因釋我往昔自殺教殺無量怨債一時酬畢再得為人作沙門相直至菩提永不殺害火盡閹官劉謙之拾其骨塔於鷲峯之西帝悼之即於焚身處建寺焉即今東壽寧舊稱王子燒身寺心通註經高齊中相劉謙之諦信佛乘厭離塵垢持文殊菩薩名日念七萬徧以為定課不為事務所閒天保間隨王子入清涼山見其焚身為所難為生大悲感自慨刑餘非佛法器奏乞在山修道上許之謙遂不歸朝持名閱經精誠所致忽爾心通造華嚴論六十卷奏帝詔令敷演一徧後感男根復生環先遇聖隋代州趙良相家資巨萬有二子長曰盈次曰孟盈強孟弱其父將終約家資為二孟得其上及良相死盈盡霸取止與孟園屋一區孟傭力自活無何趙盈死生孟家為兒名環後孟亦死生盈家與盈之子為兒名先洎長而孟家益貧盈家益富趙環即與趙先作僕使為活諺云天道弗平盈者益盈環一日聞其寡母曰趙盈霸汝家業致爾世貧今至為其奴可不恥乎環因懷恨欲殺趙先開皇初環從先遊五臺入峨谷東數十里深曠無人環拔刀謂先曰爾祖我父弟兄也爾祖霸我產業致我世貧今為爾僕爾其忍乎吾今殺汝也先即疾走環逐之入林見草庵遂入有老衲曰子將何為環曰吾逐怨也老衲大笑曰子且勿為令汝自識之各以藥物授之充茶湯食已如夢初惺忽憶往事感愧自傷老衲曰盈乃環之前身霸他之業是自棄其業也先乃孟之再來受其先產父命猶在耳二人棄家從釋修道後終於彌陀庵無染證聖唐釋無染善住院僧於東臺麓見化寺額曰福生至二門守者止之令出曰汝有慳垢不應入此染既出迴顧乃失深自悔責歸家盡施所有歎曰大聖警我豈徒然哉行道禮臺凡五十三次年七十三一日告徒曰道眼未明前程黑暗爾無執吝浮生保持幻物自蔽妙明無所益也珍重自作蠟衣衣之服香水七日然身中臺火光中說願偈曰我昔久逐生死輪非義捨身若恆沙今然此身供如來普願自他成正覺火光若紅蓮華金色童子端坐其上移時乃殞香風遠徹花雨繽紛見聞者生難遭想建塔梵仙山下至今尚存福運然身唐釋福運代州總因寺僧身嬰重苦長年不差因入清涼亡生行道一日金剛窟前禮懺至困而寐見人以水沃之覺而得宿命見往為大法師貪他利養不淨說法墮牛犬中償足復人既見是已劇增悲慟服香百日願供養大聖文殊以謝宿愆積薪跏趺自然火已宴然而逝五竅流光上燭雲漢觀者千萬悲聲震山溫陵曰夫為法不顧其身非特佛氏也至人得道皆能外形骸忘死生或喪之若遺土或喜之如決疣若揚雄不羨久生孔聖甘於夕死凡以達本知常恃有不亡者存而蘄脫乎塵垢患累故燒身然臂曾無憂吝世俗或駭其所為在至人觀之與遺土決疣一而已亦以妙覺圓照離於身見得蘊空故乃能如是若識見未亡諸蘊違礙不達法行空慕其迹是徒增業苦為妄作之凶矣神兵現空唐釋澄靈於武后長安初卓庵大黃尖南麓禪寂中聞珠珮聲出庵忽見神兵現於雲表部類各異威肅儼然俄而雲沒不現但聞異香充滿林谷土療惡瘡唐福州陳仲良遊清涼囊土而歸其妻患瘡盡醫莫差仲良以土付之曰此文殊大聖所賜藥汝但至誠歸命所苦必差其妻聞文殊名生難遭想即起合掌三稱南無大聖文殊其苦即瘉後遊禮至公主寺出家為尼名法空孝感仙藥唐李思遜山東人負八十歲母遊清涼明年母卒遜因思罔極志託清涼一步一禮至北臺麓結庵修道未幾有異人授靈藥食之辭友僧道一羽化而去後人目其居為仙人庵今為荒麓焉雨有合香唐開元中代州大旱都督薛徽禱雨於太華池命僧諷華嚴以合香枝灑淨滿七日大雨千里徧聞合香是年大稔僧伽神異唐梵僧僧伽師南天竺人持文殊五字呪多神異唐天寶間來遊清涼不入人舍夜坐林野攜舍利缾夜則放光嘗入定於中臺之野天花擁膝七日乃起經夏還天竺過長安李太白作歌贈之歌曰高僧法號號僧伽有時為我論三車問云誦呪幾千徧口道恆河沙復沙吾師本住南天竺為法頭陀來此國戒若長天秋月明身如世上青蓮色心清淨貌棱棱亦不減亦不增缾裏千年舍利骨手中萬歲胡孫藤嗟余落魄天涯久罕遇真僧說空有一言懺盡波羅夷再禮渾除犯輕垢此係另一僧伽非泗洲僧伽乃泗洲僧伽入滅三十多年後方來此方者謝平遇仙唐景龍間代州謝平於東臺麓見一老叟招之入深谷川原清暢花木秀茂茆茨石室諸仙所居採薇而食其味沖澹了無茹退血氣優柔不思嗜慾久之思親採薇囊之而歸奉母母病將死食之病瘉平居三月復尋終不見焉法愛變牛唐北臺後黑山寺僧法愛充監寺二十年以招提僧物廣置南原之田遺厥徒明誨愛死即生其家為牛力能獨耕僅三十年牛老且病莊頭欲以牛從他易油是夕明誨夢亡師泣曰我用僧物為爾置田今為牛既老且羸願剝我皮作鼓書我名字於鼓上凡禮誦當擊之我苦庶有脫日矣不然南原之阜變為滄瀛未應脫免耳言訖舉身自撲誨覺方夜半鳴鐘集眾具宣其事明日莊頭報老牛觸樹死誨依其言剝皮作鼓書名於上即賣南原之田得價若干五臺飯僧誨復盡傾衣鉢為亡師禮懺後送其鼓於五臺文殊殿年久鼓壞寺主以他鼓易之訛傳以為人皮鼓耳中臺聞鐘唐長史崔公部從五十餘人遊清涼登中臺聞鐘聲大震公謂部從曰僧預知其來故鳴鐘也至頂了無一人亦未有鐘因共造銅鐘招僧居守慧賾見聖唐釋慧賾同緇素數人遊臺至中臺遙見沙門持錫而立及近則失之遠望仍現畫工呂玄覽同見圖其像眾人掘其地得一鉢一像金石莫辨遂建塔於此時龍朔元年松說苦空唐釋法念棲禪青峯庵南有大松若舍可蔽風雨法念嘗坐其間若昧不昧見僧作老比丘形說苦空法既寤乃聞秋聲瑟瑟不勝其悲因呼為苦空蘽古碑猶存聞警大徹唐北臺後有古木百圍中空釋惠湛得荷澤之道自謂大了穴木為居每一入定三日乃起木叉和尚訪之在定召曰湛闍黎湛出定視之叉曰汝在此生死穴中耽著幾時湛忽然大徹淚下如雨自此觸向明妙後人呼其樹為生死蘽勃荷神異宋建陽趙氏畜豬為業一豬特異毛鬣金色唯食勃荷里中小兒因以呼之凡屠者擒捉羣豬奔逸勃荷安徐引之入檻趙氏愛惜多年不殺太平興國中僧辨聰者遊五臺寄清涼寺過夏一老衲出入眾中若佯狂然為眾輕易唯聰敬事之解夏將還老衲以書付聰囑曰至京城北尋勃荷投之聰辭去竊發而視之其詞曰子遊世間日久彼眾生得易調伏否彼若調伏汝自調伏度生事訖祇可速返若更久住恐強緣打失流入世業也至禱至禱聰大驚復緘之既至於廣濟河側聞小兒呼勃荷聰問勃荷何在小兒指趙氏欄內大豬項帶銅鈴聰就呼云勃荷豬躍起聰以書投之豬噉之人立而化誠感天華宋元豐間安州張氏每歲自種芝麻打油百斤負來然燈五頂供養每登臺必澡浴更衣一日同六七人至中臺忽聞異香仰而視之乃見天花浮空青黃赤白隨色生光眾以手捉近之即飛唯張氏得一金色華近者身衣皆黃持至真容院寺主覩奇請畱供養張氏不與遂持歸觀者甚眾行數里黃光大熾而殞褻侮慘報宋王在代州人其家豪富素不孝聞清涼之勝挾妓來遊宿真容院於殿堂設酒宴舞妓為樂主僧諫曰此龍神之地長者何以褻慢若是耶在怒罵曰禿丁龍神何在僧莫敢言明日登東臺陰風卒起雲霧晦冥雷火涌地在身已裂僕妓皆徙置山麓昏迷一日乃蘇神僧入洞宋宣和八年夏代牧趙康弼巡檢董梁同真容院慈化大師數十人至那羅洞趙公同慈化入窟行數步隘不可入低旋而迴既出見異僧立於洞口趙公戲曰我從深裏來師何不入僧曰我能入一塵遊沙界況此恢恢者乎即踊身而入殊無阻礙眾待數日不出檢遺物唯有笠子一頂建塔東臺法華不焚宋淳熙間華嚴寺經樓遭焚諸皆煨燼唯有法華經一部不壞披之得舍利三顆經後記大唐釋道宣所書蓋其戒定精熏所致也華嚴放光元皇慶初獵者馬秋兒因獵宿東臺之東華林之野見光明上燭林巒洞曉歸白真容院主主率人探之見塔基掘之得石匣中有華嚴經一部乃唐顏真卿所書沙門法遠建塔於此主賷歸祕藏後忽失之人以為收入金剛窟圓光現塔元延祐二年夏皇姊大長公主遊禮五頂見大圓光中有七級浮圖母妻同化元亳州王僧吉母年八十七謂吉曰我為爾曹累不能遂五臺遊今老矣菩薩聖地豈能一至乎言訖潸然吉謂妻曰我與若共輿母詣五臺汝能之乎妻曰妾所願也夫婦架轎輿行十步一拜長途無怠三月抵清涼徧禮五頂靈瑞頻現四月八日至陽白谷僧吉偶病昧若死其母與妻守七日而惺白母曰我適一國見大陂水無限蓮華其外小陂環帀岸多芳樹輭風吹香令人醉悅童子引我至一陂菡萏盈池兩莖特秀告曰若當棲此吉言訖曰願母歸家我當於此修行母曰我家在近爾言已坐脫既葬妻亦化去吉遂於此藏修焉已上并出舊傳稱名脫難明宣德間定州曹一貴六人遊臺至華嚴嶺遇盜被縛志心念文殊名忽見數十騎沿嶺而來盜竄去貴舉首但見浮雲度嶺更無一人尋路而歸誠瘉親病明正統初永平王國華父母俱久病求醫莫療國華發願禮五臺明日病稍損華即裹糧一步一禮至中臺見白光襲衣其父母俱夢白衣母入其家屋宇皆白明日無恙華初未有子其年生俊男夫婦同化明正德間燕京西山靈水村劉繼先夫婦遊臺八返先年九十一妻八十雇輿再遊既禮五臺至菩薩頂翁囑婆曰汝好歸我就此去矣婆曰住住待我金剛窟來相別出房於佛殿前坐脫人報翁翁笑曰賊老婆嗊我去也言訖而化金輪神光明正德十二年蘇州管氏六人宿中臺見金輪浮空光吞五頂天橋度關明嘉靖十五年京師王行者造佛像送臺山至龍泉關佛像重大關門不能度關吏紿曰若佛能放光我為若拆關令度言已佛像面門放光西流關吏驚畏即構天橋像度過天燈引還明嘉靖三十九年九月胡虜越邊犯臺山擄淨明寺二沙彌入草地沙彌志誠念文殊名一夕脫走黑夜迷路忽見天燈攸攸南逝沙彌逐燈而歸孝婦坐化嘉靖四十一年春贊皇縣李氏妻侍親以孝聞一日同四十餘人來遊臺至日光寺盥沐禮佛別眾而坐說偈曰拖泥帶水去還來何似今番坐五臺說與諸人各努力這回終不入胞胎言訖而逝變相怖盜嘉靖四十二年春河間僧繼宗素持文殊五字呪遊臺至竹林嶺有羣盜林中突出見宗作夜叉神佩火輪賊大怖伏地不敢仰視僧正懷在後亦見而宗不自知月輪光照浙江吳居士素業禪觀誦法華鄉閭稱吳彌陀步禮來遊夜登東臺見無數月輪自那羅洞涌出得法喜三月不知世味後終舌根不壞一江遇聖明嘉靖四十三年春北京一江和尚來遊山中臺麓見白髮母片衲遮醜飢凍甚危師憐之解衣衣之分麨食之更與作禮母逆立而受傍僧不堪曰佛戒比丘不禮白衣師乃人天模範禮貧賤女可乎師曰此狀難測汝遊清涼無分別可也行數步回顧貧母即失唯見衣挂松枝金光煥散異香絪縕日盡乃已二虎懾盜明嘉靖四十五年夏祁縣僧德胤隱鳳林谷值歲凶暮夜貧民從之貸糧胤以饘橐授之而去出籬數步見二伏虎大怖而返還所授橐胤笑曰虎自汝心耳送之出惟見臥石二焉因以二虎稱之道感刺客明釋明山字翠峯初結茅中臺之南谷檀施日多有忌其盛者一夕刺客投宿中夜窺山屹然端坐目如秋水鼻息殆絕客長跪發露悔過山曰汝受人所託必忠其事當速殺我以快彼意客曰吾寧自殺終不殺道人也客行且曰師可速離此地倘遇他人師命危矣明日移九龍岡孝感千獅明嘉靖間河南信士潘守誠負七十母來登中臺至竹林嶺見千獅子遊戲躍入雲際盜錢雷擊明嘉靖末北臺一人盜龍池錢入廚執爨雷自竈出擊之死半日乃蘇自陳偷錢事稱名得煖明釋慧澄晚上南臺值風雪凍急念文殊忽見草庵老僧向火澄入就坐對火煦然生暖俄而小寐忽寤天色已曉坐對枯杌前狀皆失神魚出現明隆慶四年夏北臺諷華嚴首座遠庵見天井一金魚長尺許有光明呼眾臨池禮誦自辰至未而隱寺建仰華明隆慶五年虜酋俺靼款關效貢仰五臺聖境奏請欲來進香上未許既而復請建寺於海西設像瞻禮賜名仰華自此畏事中國寶塔重修臺懷大塔內藏阿育王所造釋迦佛舍利寶塔元朝重建隆慶間石塔寺僧稱小會首者見其圮也發願募修走京師叩馮監馮監初許之而忍弗能予此僧每指其事而諷切焉馮怒聞上逮詔獄既死而時時入馮夢中以為患又聞上聖母出宮金遣中官范江李友督修撤而改作凡二載塔始成實萬曆十年也屋成月輪明釋真寶住棲賢谷一日趺坐痛念生死大事不徹鑽仰不入轉覺淒惶稱文殊名數聲斂念久之忽見居屋為月輪五峯林木洞矚無礙清涼適悅難以為言移時乃隱自爾昏散不入者數日松現異相明萬曆初釋悟福同二僧行至蛇溝遙見彩霞滿樹佇望久之綠葉零零其大如手趨前數步閒葉有果黃赤相雜大如茶甌精光曜目及近唯見松株退數步仍見前異日沒乃隱神燈徧野明萬曆元年正月上元日北臺大雪怒風神燈徧野在剎端者其大如斗僧無用者指以示眾指端即現一燈既而霑衣拂面皆神燈也山神示兆萬曆五年二月廬山僧徹空居龍門法雲庵假寐間見二儒服者至龕前曰明日有辟力鬼遇害師可避之空曰請相公方便儒者諾諾而去明日果有數賊自西嶺而來至龍門上大風卒起吹墮亂石一賊折踁眾賊舁入庵捨去折踁者以實告乞憐養半月得好去後負油麪來設齋而謝十指現燈萬曆六年少林僧洪電一夜上中臺值雷雨昏黑大怖不能行志心合掌稱菩薩名十指現燈離之燈十斂之復一電合掌至臺偶失跌乃隱妙峯感通明萬曆初釋福登字妙峯居龍門妙德庵日刺舌尖血為二分一分研朱書華嚴經一分呪食施鬼神一夕閱經窗下患燈不亮忽爾窗戶洞明如晝經盡乃已初夜遊中北二臺至北臺之東見神燈浮空上下雙手搏之得二樹葉菩薩髮塔元魏時文殊菩薩現為貧女所施之髮修塔貯之在佛舍利大塔之右住持圓廣見其圮也撤而新之命行者督工行者分取其髮囊之而去過十餘年返北京至淨因庵主僧惠杲方假寐金甲神曰有盜髮賊將鬻師可留之明年歸之本地矣既寤疑慮間行者負經篋入欲貨之還俗杲與錢一千留篋啓之經數部有一囊盛髮若金縷詢之乃知聖髮也明年萬曆十年杲因禮五頂賷其髮入大塔焉五佛示夢萬曆九年中相范李二人奉命建塔院寺方成之夕李公夢五梵僧自西北飛來空中不下公設座延之乃下就座明日白范公相與披尋靈迹至壽寧寺見五佛頹然荒草間二公陳香帛請就塔院華藏閣舉之飄然不藉多力應真屢現五百應真住持清涼自古及今顯應者三一隋開皇初五百梵僧棲禪中臺麓龍神修供過夏而隱二唐貞觀中慈恩法師開菩薩戒於華嚴寺時有五百比丘忽至聞戒而去三明永樂辛巳頒御製佛名曲經偶千僧至齋畢散入林谷清涼靈石清涼石古來顯應頗多不能悉錄且近見聞者嘉靖間太史岳國濟謫汾陽斷司過此率僕夫百餘人登之剛容不隘作歌以志其靈又三十七年山西副使張君與僧綱有隙懷怒來山至是登石覩異怒心乃釋乃曰此石乃臺山和尚赦書也萬曆初僉事楊彩登石感異有詩志之詩載靈迹蓋聖無常應應於克誠來者以迹而求則殆矣老人示路清釋碧雲於乾隆初住清涼橋吉祥寺常遊諸臺一日晚歸至中臺迷路忽遇老人示其歸路旋行復回顧老人老人即說偈曰來時有路去時便誤撐起眉頭放開腳步月挂中峯雲消野渡努力向前切莫回顧燈隨心現清釋照遠山西太原人姓王投本村永寧寺聯公薙染後受碧雲和尚心法遂卓錫本郡大崇善寺乾隆初禮臺山至大螺頂拜燈一禮及地五頂燈飛數百林泉輝映旋盡入塔院寺大塔頂中遠卓犖英奇於世淡然視名山勝地如渴思飲故于四大名山皆親禮焉尤繾綣于臺山故朝禮十三次夏安居九次三十五年朝山至臺懷遇弟子廿餘人謂曰我等朝山拜燈三宿一盞未現遠曰我朝十三次無一次不現汝等求燈皆隨我來眾有倦色唯程宗周願隨遂至大螺頂初夜拜求未及三禮五頂各現無數金燈宗周甚喜仍返臺懷遠指梵仙嶺謂眾曰此地是菩薩現像處眾咸企仰見雲中現一金獅鈴聲隱隱晃耀天光眾皆俯拜舉首視之雲消不見結緣感聖清釋崇章住京都翊教寺乾隆間備茶果於臺山萬緣庵結緣躬自汲水煎茶至第三年有白衣母攜一童子白如雪至菩薩前問訊轉向崇章問訊曰大師是從都中來結緣者章曰然即奉茶果母與童子用茶果盡母更索之章再奉茶果復用少許即起座問訊出門不見佛燈屢現清釋成洪鹽城人乾隆十四年五月十五日至五臺南山寺見奎和尚其晚天清氣爽見神燈浮空峯巒露彩奎曰朝山人若與菩薩有緣神燈不求而自現若是無緣雖神燈徧山亦不能見次日至清涼橋朝西臺又從西臺至祕魔巖未至巖洞之間忽現丈六金容方入洞時三聖皆現又見光中無數化佛諸頂朝畢至大螺頂拜燈神燈映星而上又於夜半之後古南臺神光照頂如同旭日幽冥黑暗之中無不照燭因歎曰我與一切眾生紛忙於火宅之內昏昧無知今日得悟菩薩大圓鏡智何其幸歟是時天色未曉降微細霧雨其光遂隱稽首讚曰稽首文殊大智師慈心照我清淨光爍開多劫昏矇眼盡未來際覲法王夜現日輪清釋了彙號度博住京都西山戒臺寺於乾隆二十七年夏謁五臺文殊大士至大螺頂求見神燈深夜焚香虔禱不數十拜西峯上忽現紅日一輪高昇旋轉光輝朗耀覺心空映如入定中因呼同伴問云見否忽然隱滅至明日過祕魔巖經大深澗中崎嶇之處數十步前有四五人修路及至前倏忽不見遂直上龍洞焚香拜訖求見聖像親見文殊菩薩現像歷歷分明福資往生清禹尚智大同府渾源州城西水磨疃村人好善樂施凡渾郡修建寺院盡力樂助又于村南東西大路修建茶房置地頃餘俾施茶永遠不替每年盡合城各廟散施香燭一日尚智偶有微疾夢中見菩薩放光光中見菩薩像為滴水所淋病瘉發心朝臺至東臺頂後那羅窟見菩薩聖像與夢無異惻然動念回家出己資鑄鐵廟一座送至窟中擁護金身俾永遠不沾滴水後臨終呼子範孫璽與琦囑曰諸惡莫作眾善奉行大事已畢吾往蓮城說畢而逝附獅子窟創建十方淨土院碑即五峯靈迹末之師子窩明唐文獻華亭翰林竊聞莖草炳陳玉宇法界皆然一毛恆轉法輪眾生盡爾然羈旅靡歸有假天王之賜屋險途思憩須憑智者之化城心珠久昏識浪方涌非毗婆舍那無以瑩淨釋妙奢摩他何因止停故有息心所棲名為精舍無諍之地號曰阿蘭藉緣閒寂之場蘄證菩提之果匪今斯尚自古攸崇須達倡建於祇園五竺因之棋布漢明肇營於白馬九州式以星羅錫飛驅鶴社結廬山之林袖委藏龍湖開邵武之剎至若丹霞黃雲之墟紫玉翠微之宇金璧燁如覩史閒侔秦望之鵲巢琳琅璨若爛陀寂等華林之虎穴慧幢布影妄知自破藤蛇梵磬流音塵夢頓空蕉鹿況夫白業挺離日之峻玄言擅彌天之長沛八水而起焦芽曜三明而導冥躅為九類智炬闢三界覺津諸有藉以拯溺眾聖由之發真哉信功首人天澤敷幽顯者也逮夫法季狐女登寶華之座波旬竊釋種之衣伊蘭糅出於栴檀野干混迹於獅子私法王之常住染毛道之貪婪致使業雲紛掩於法雲愛水混淆乎定水易首滌腸之侶望焉遠離煩羊渴鹿之倫眷茲相結韋馱太息樓至悲啼有雪峯上人以杜多禔身以毗梨範世深愍支那之頹流期復畢鉢之高軌嘗遊清涼山竹林嶺之獅子窟見其地喬木森沈雲興霞蔚層巒杳窱翠複紫環顧瞻爽氣而情塵銷容與靈區而陰宇廓上人以為可依神境弘啟慧門遵古宿之懿榘振我佛之玄綱於是伐煩惱之稠林薙無明之荒草唱導檀那締構法苑奠六度以為基樹三德而成廈抗十通之楹橑糺四攝之榱櫨飾以道品之彩繚以法空之垣聚是者必力荷如來志振宗風參禪則拔少林之二桂語教則探賢首之頂珠罔私眷屬惟事熏修俾瞻禮者不必入法華而對聖如神英安居者無事問飛閣而談真同道義動容流眄色總均提觸聽感心聲皆尊勝盤足而翱翔金色世界掩室而親近不動如來是則威音往會無閒斯時豈云大智徽猷徒懷先古行且澍甘露於十方綿佛日於三際實曠劫良因羣生盛遇也余嘉乃事敬錄其休至如淨住之規則具澄公所列銘曰惟人中師作甚深事妙樹法宇大庇無際金色東往蓮花西逝斯宇一椽靡不畢庇嗟嗟凡劣窳狹自棄於此神宇不能遊憩上人蒿目漚和解蔽鄧隱來儀波利攸戾厥在聖流罔或弗至凡聖同源廣狹弗二凡以有我居廣若細對物斯兩疇克攸濟聖惟無我入小無涘我不可得物何成異欲登斯宇觀無我義無我既證自在遊戲舉足下足曼殊室利附獅子窟淨業記明李世達涇陽御史清涼山中臺下獅子窟文殊室利乘獅化現地也雪峯光禪師等以約清眾侍佛結社於此準李秉法會靖恭開宇者凡二眾百二十三人踐匡廬大賢之迹使蓮漏世無絕聲而期生上品讀誦大乘共推法師空印澄公等十二座日闡摩訶衍雪峯同予鄉人荊山大慈自其社來乞記曰承第一座有言阿彌陀者西方佛也經傳後漢支婁迦讖像入東漢摩騰姊子真丹安養緣熟機通九類九品一折一攝也而是九類生本一佛心業動想成相為蠻觸寧為緇與素觝靈與蠢角若羣緇之分河羣靈之峻垣可謂鬬爭堅固矣至其競趨西方若天傾物老日沈月昇畫然決然無可禦止者賢首之教尊華嚴而華嚴勸生其師有軌以係念天台之教尊法華而法華授記其師有論以釋疑少林之宗尊楞伽而楞伽標往其師有文以料揀乃若天親五念慈恩十勝相宗者往焉南山般舟清照建閣律宗者往焉不空修儀金剛灌頂密宗者往焉唯是魯邦苦縣望兩楹三島而歸幾成弱喪然孔子之稱西方即列子之稱西方也修靜斂翮於東林曇鸞焚經於華陽無論矣彼龍舒舉魯論以習學引軻書之熟仁非念念常覺以臻極樂念念大慈以具資糧之謂乎言必稱堯舜口念也見不離羹牆心觀也範圍天地周流六虛道岸誕登聖域優入何取之下宗與天上從後之權語哉子記之矣不嘗疑伏羲女媧安得往生及觀正史載庾詵生彌陀淨域事竊謂史以傳信無足疑者彼康樂太白之讚淨土曰詞人飾說耳彼唐之房杜宋之文潞公王文正公德業炳著柰何亟亟於斯至司馬溫公每念中字何異執中心法而程子謂不如贈以念珠默求其說憬然有見於心具心造之旨嗟乎人之失心久矣障於五濁障於三教默守靈臺鬼窟丹扃徵其心雖英雄豪俊輒口呿而不下未迨百年肉團先腐其視河東鸚鵡潭州鴝鵒依十二光佛頓徹心原者可以愧死猶不勇猛精進求所謂無量壽無量光無量清淨平等覺於今日則一息不來定生黑處遊魂為變胡可執留耶是獅子窟青獅所吼今爾二眾獨不聞文殊師利之語法照者乎憫末世眾生之囂馳示覺體圓明之常住念一佛即念諸佛見色身即見法身身從念生不可得返觀能念亦復然窮無所得盡流念定生西方極樂界伐木當伐其本淨土必淨其心此大士先為戒護親見彌陀念苦眾生發此誠語二眾誦之名誦大乘法師示之名示大乘是清涼山主所垂明心之玄要也而欲得其詳於四土中更求棗柏歧分之十土一門中更求義和編輯之多門一念中更求懷感專稱之十念逗根施教文殊冥被法師法師顯示二眾取塗深入用志不分豈患喪家之久耶於是普慧且營入社螺髻瞥見珍林金華滿房行作光公瑞應矣爰作記與之附獅子窟十方淨土院規約序明釋鎮澄自古僧無常居一缾一鉢丐食而食巖木冢間隨遇而棲塵勞物境曾無戀著之心也後以出家者眾不得無統初心為道不可無教故設叢林推明眼者主之所以攝漫散而教初心也故四海之內凡為生死大事者來相依託與之決擇令其參究必期人人徹了而後已若馬祖選佛場百丈大義社之類是已故為叢林主者不以手自披剃為眷屬而以十方能為佛祖大事而來者為眷屬是謂法眷屬也至於後世則不然凡僧之有為者或乞檀那以創院或託權勢以鐫求集信心資財為之常產剃俗家子弟為之徒屬視嫡徒則若骨肉之親拒禪客則若累世之怨求若馬祖選佛場百丈大義社則不可得而聞矣悲夫近代以來天下叢林皆變為私家院矣雖有人師立十方院然亦不能不溺愛於子孫於其生也名曰十方及其沒也盡為子孫有矣至於分烟割井若俗家然此亦人師所為之不臧也然而人心之好義也尚矣故有一人立十方院者檀施爭趨之而吾徒不能為者蓋為封乎有我之私耳故天下私家院百而十方院一矣比來有等狡猾師見十方院多檀施始則假十方之名以邀利及其成也則廣剃貧民之子為嫡徒以付其業由此十方禪侶日見疎遠以至杜門而後已嗚乎非馬祖再生百丈復起斯風亦莫能返矣比丘智光淨立等慨然興義約諸宰官同袍共建十方淨土院卜之清涼中臺之陽竹林嶺畔曰獅子窟林泉清暢可為招提於是標草相與經營而建造焉肇事之初共立義約數條凡入社者遵此毋違庶乎古道復興而真風再振矣淨住規約列之于後是院既成永與十方為道者共不許火主子孫受業如有火主弟子家人爭主其業者坐盜十方僧物送官究治其主以大義共擯之是院無常主每歲首推有德一人為主事無大小悉聽施行至歲終告退如更請更住周歲貪位不退者共擯之招提財物火主不得親收當立十方庫司三人一收執一注記一支用三時粥飯一切平等若主若客不許私受飲食私受一餐罰米一石除為公務出入是院本為老病者設凡僧六十而無歸者入養老堂四方僧有病而無依者入延壽堂每月十五日僧布薩時皆集其所除百里之外不至者罰齋凡在社道友如有病難等緣在外即搬取歸養救濟等違者主事者出社凡在社者如有違情當和顏疏通不許失容惡諍犯者罰齋
