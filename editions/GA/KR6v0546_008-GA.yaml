body:
  text: 第十名公題詠紋鏤貝葉函傳摩竭之城色染蓮華香襲那伽之境鷲頭峯下常演金口之微言雞足山中時宣玉毫之祕笈影能摶而風能繫墨花飄灑非從一佛二佛三四五佛種善根偈可拈而唄可歌筆陣流傳直以百生千生萬億兆生作佛事況乎五頂奇巒甲于雲代九邊重鎮界作華夷為塞上之名山實人間之絕域故四方善信莫不瞻風千載詞壇咸思題韻於是深林密箐長留繡虎之詞邃谷幽巖不乏雕龍之句堪為名山生色用啟後人景仰志題詠五臺為雲代靈壤山川蟠鬱林木豐茂深巖大壑蘊秀藏雲朱甍翠桷浮乎青靄仙梵靈燈現乎杳冥至於生雲走霧開闔晦明千變萬態難以名言可謂人間絕域矣釋傳文殊聖者寓化於茲而四方篤信者罔不觀光焉士君子亦有向慕茲山者以地僻一方造詣惟艱故至者幾希惟宋丞相張無盡高尚覺皇之道預感夢徵銜命河東嘗登是山其所見聖境尤非泛常者所能得其少分既為之傳以紀其事復為之詩以攄其懷非一極至誠曷克至此今際聖明文化熙洽而士君子遊心澹漠者悉多釋氏故聞無盡清涼之作莫不賡和其見於詩林者往往有之雲中釋覺同者僧中白足也嘗南遊吳越凡見名公釋道詠清涼者採而歸選而成帙將壽諸梓以傳不朽命余為序余謂古有賡詩者賡意不賡其韻自唐始賡其韻至宋元尤盛焉茲詩不特賡韻亦賡其意矣且令曼殊境界煥然發乎吟詠之間則誦斯詩者不俟登臨而雲霞靈瑞草木山川了然契諸丹府矣而同公之用心可不謂之為賢乎時成化某年仲夏吉旦賜進士禮部侍郎前翰林學士直東閣同修國史致仕錢唐倪謙序詠五臺詩宋張商英丞相無盡迢迢雲水陟峯巒漸覺天低宇宙寬東北分明觀大海西南咫尺望長安圓光化現珠千顆旭日初昇火一團風雨每從巖下起那羅洞裏有龍蟠東臺披雲躡雪上南臺北望清涼眼豁開一片烟霞籠紫府萬年松徑鎖莓苔人遊靈境涉溪去我訪真容蹋頂來前後三三知者少衲僧到此甚徘徊南臺寶臺高峻近穹蒼獅子遺蹤八水旁五色雲中遊上界九重天外看西方三時雨灑龍宮冷一夜風飄月桂香土石尚能消罪障何勞菩薩放神光西臺北臺高峻碧崔嵬多少遊人到便迴怕見目前生地獄愁聞耳畔發風雷七星每夜霑峯頂六出長年積澗杯若遇黑龍奮霹靂人間妄念自然灰北臺中臺岌岌最堪觀四面林峯擁翠巒萬壑松聲心地響數條山色骨毛寒重重燕水東南闊漠漠黃沙西北寬總信文殊歸向者大家高步白雲端中臺五頂嵯峨按太虛就中偏稱我師居毒龍池畔雲生懆猛虎巖前客過疎冰雪滿山銀點綴香花徧地錦鋪舒展開坐具長三尺已占山河五百餘總詠五臺和詠五臺明唐文煥國華鎮江振衣扶杖上層巒臺上長吟老興寬地勝有緣方許到心空無法可能安淡烟滄海波光迥紅日中天塔影團笑指文殊埋髮處行人常見紫雲蟠東臺天風吹上妙高臺滿眼山光紫翠開鐘破晚烟清落澗履拖春雨亂黏苔水邊呪鉢龍飛出松底翻經鶴下來一坐清涼絕塵事浩歌歸去幾徘徊南臺淡烟籠樹靄蒼蒼環繞西臺古道旁月小更知山勢險天空應見地形方瀉來聖水迢迢綠流出仙花片片香最愛老禪棲隱處祕魔巖畔好風光西臺上方臺榭枕崔嵬躡磴捫蘿百轉迴鴉度晚林斜背日龍眠天井暗驚雷好山如對丹青畫滄海疑傾瀲灩杯歸去京華千里外白雲回首也心灰北臺笑登絕頂縱遐觀身在穹窿第一巒花雨亂飄千片錦松風常作九秋寒眼空海嶽塵中小心與乾坤分外寬記得鳳城明月夜幾回飛夢繞臺端中臺鐘磬泠泠落紫虛化人宮殿自成居光生珠樹佛燈近香散石壇花雨疎靈沼月來金鏡小遠山雲去翠屏舒朝簪羈卻登臨願北望清涼思有餘總詠五臺和詠五臺明史監元昭江蘇羣峯歷盡到巔巒極目清涼境界寬山入雁門真設險地藏佛國即長安雨來絕澗自成響雲度碧溪時作團花落經臺鐘梵寂袈裟香靄翠雲蟠東臺翠拔南天第二臺天成圖畫一方開巔崖有路皆懸石古樹無枝半是苔潭龍起處電光走木客嘯時山雨來俯仰獨懷千古意詩成倚杖漫徘徊南臺西臺屹立逼穹蒼紫翠遙分太白旁天設奇峯卑兩晉神開金地鎮殊方洞霞結彩春無際琪樹生花夜有香東望海門纔咫尺月明時復吐珠光西臺攀蘿捫磴上崔嵬十步丹梯九折迴夜盡高峯先見日雲深陰洞自藏雷飛泉影落銀千尺老桂香分露一杯到此都忘塵世念爭教心慮不成灰北臺上方樓閣聳奇觀金磬泠泠度翠巒深樹浮嵐晴帶雨陰崖積雪夏生寒鰲行奰屭星辰近雲氣氤氳宇宙寬何處紫簫吹落月不勝清思繞巖端中臺懸崖削壁勢陵虛中有金仙遁迹居天近星河常掩映雲深草木自扶疎六時花雨含香落五夜神光帶月舒絕頂登臨飛鳥外一聲長嘯海天餘總詠五臺和詠五臺明胡鎮涵素錢塘喜共真僧陟翠巒笑談殊覺道懷寬無窮世事機前息一點靈臺靜裏安險峻只宜扶竹杖清幽端可坐蒲團那羅巖下蛟龍惡彈舌從教鉢裏蟠東臺淡烟縹緲隔仙臺混沌鍾靈始鑿開霜葉半林紅露寺石碑一片綠封苔晴空花雨有時下樹杪金燈幾度來感應曾聞張相國令人追憶幾徘徊南臺老我登臨鬢已蒼孤吟倚杖翠微旁重重雲樹連西晉漠漠風烟控朔方獅子有靈曾印蹟蟠桃無歲不生香曼殊境界吾能到寶樹長懸不夜光西臺歷徧龍巖共馬嵬何如此地漫周迴遊人每憚峯頭雪定叟無驚檻外雷平見斗罡明似燭靜觀塵海大如杯老夫屢有棲山志爭柰凡心尚未灰北臺中峯高處縱吟觀四面芙蓉聳碧巒日影平臨金塔曉天光倒浸玉池寒隔林鐘梵徐徐度帀地樓臺望望寬為愛此中多勝槩都將收拾入毫端中臺五峯凝翠溢寒虛云是金仙舊隱居祇樹有花從代謝閒雲無意任親疎纔登絕頂頻回顧便覺愁眉一展舒萬壑千巖皆勝境芒鞋蹋徧肯留餘總詠五臺和詠五臺嘗夢遊五臺明朱友松代藩宗室夜來飛夢到雲巒境闊令人心亦寬佳致每從高處得浮生誰解靜中安蘿窗香散燒雲母竹院烟斜煑月團最愛白雲巖下景長松落落翠蛟蟠東臺夢中縹緲上南臺長嘯峯頭宿霧開問道頻敲松下戶尋幽徧蹋澗邊苔雲中樓閣憑高下谷口雲霞自往來淡月未移疎竹影莊周蝴蝶幾徘徊南臺西峯寒色暮蒼蒼夢入烟霞古澗旁紫府笑登山隱隱清涼坐愛石方方雲中採得薇偏美花裏流來水自香何處鐘聲幽夢破一窗蘿月淡秋光西臺夜來彷彿蹋崔嵬空自臨峯笑幾迴一枕梅花飛蝶夢半簾梧雨響蛟雷未聆石上三生話先獻巖前萬壽杯見說箇中生地獄夢魂塵慮悉全灰北臺夢上中臺縱大觀羣峯似髻聳晴巒石屏影落天涯暮瀑布聲來樹杪寒始覺心衷無所礙方知眼界自然寬滿腔贏得春如海無限波瀾到筆端中臺五點青螺印碧虛翠微深處有僧居花開曉嶂幽禽集雪擁衡門過客疎偶爾夢隨明月去悠然心共白雲舒歸來無限清涼興盡付愁吟醉詠餘總詠五臺和詠五臺高榮仲顯金陵雲飛霧卷露層巒日射瓊臺法界寬勢插斗杓千疊險根維坤軸萬年安樹聲入耳波翻海嵐氣蒸衣翠作團攀盡藤蘿嗟力倦何殊蜀路走千蟠東臺翠屏天設壯南臺臺上禪宮魏帝開日影浮香僧曬藥烟光破綠鶴眠苔化城鐘磬忘昏曉塵境輪蹄絕往來笑指赤崖幽寂處山雲孤鶴自徘徊南臺石磴崚嶒山色蒼登臨如在紫垣旁孤蟾入夜懸中界八水流春到下方日暮芙蓉呈好景秋深薝蔔散餘香題詩遠繼張天覺添得雲山草木光西臺嵐侵斗柄鬱崔嵬勞我躋攀恣往迴寒氣逼人飛夏雪泉聲落澗響晴雷靈蹤猶見心為石浮世空傳羽化杯最喜山房留款夜地鑪煨芋撥殘灰北臺憑高竚立豁遐觀五髻參差列翠巒嵐色夜浮禪榻冷鐘聲曉度雁門寒雲中樓閣重重現物外烟霞面面寬好景滿前吟興發自驚珠玉落毫端中臺嵯峨山勢半陵虛野衲相逢問起居天迥始知塵眼豁地偏應覺世情疎鷲峯雲斷青螺出龍沼光浮翠練舒我欲此中成小構殘陽歸老樂何餘總詠五臺和詠五臺明高得裕羽士金陵芒鞋竹杖躡層巒萬里烟波極目寬世事每驚流水去禪心常若泰山安花開錦樹霞千片鶴立蒼松玉一團昨夜瀾翻千嶂雨神龍只在鉢中蟠東臺杖藜迢遞上南臺臺上奇花映日開黃鳥鳴春依碧嶂紫蘿含雨滴蒼苔塵機盡向閒中息詩興多從靜裏來吟罷芙蓉新月上更堪拽杖一徘徊南臺瑤臺紫氣射穹蒼沱水行山繞四旁地涌奇峯標上界天成佳境異諸方日移芳樹高低影風動幽蘭遠近香百草頭邊明歷歷不須更覓白毫光西臺支郎結社傍崔嵬瑞鳥靈禽日往迴座上袈裟生雨霧筵前鐘磬雜風雷白雲拖練浮金井丹桂飄香入茗杯莫把豪華來換我五侯七貴久成灰北臺紫翠峯頭縱遠觀中臺氣概壓羣巒風來草木天香遠雨歇谿山松籟寒行處不聞絃管沸望中唯覺海天寬要知前後三三語須把玄機叩兩端中臺五朵芙蓉聳碧虛雲中臺殿梵王居法門靈迹觀來異人世囂塵到此疎菡萏華敷濃復淡兜羅界現卷還舒怪來空翠生衣上山谷嶙峋夜雨餘總詠五臺和詠五臺明釋覺同無辯雲中度險陵寒上翠巒東臺風景望中寬深藏佛國乾坤大遠鎮皇圖社稷安天雨寶花香冉冉海浮紅日影團團幾回笑指蓬萊島三點青螺似髻蟠東臺天連紫府聳層臺下控南溟一鏡開行繞羊腸通絕頂笑看虎迹印新苔毫光每自空中現雷雨翻從澗底來因想玉堂佳製在臨風追和獨徘徊南臺西頂巍峨接遠蒼回瞻鄉國白雲旁孤峯聳翠連三晉八水分流潤四方晴日野花鋪蜀錦秋風仙桂落天香當年獅子曾遺迹巖谷常浮五色光西臺北來乘興上崔嵬天外捫蘿鳥徑迴寒谷未秋先落葉陰崖不雨自生雷低懸銀漢星千點俯視滄溟水一杯笑指曼殊棲迹處幾經劫火不曾灰北臺中峯崒嵂可人觀勢入空濛聳翠巒良夜現燈能破暗炎天飛雪忽生寒川原渺渺諸山小海宇茫茫大地寬何用下歸塵世去願將蹤迹老臺端中臺山勢崚嶒翠靄虛神僧曾此卜幽居雲埋紫府龍蛇混地隔紅塵車馬疎五朵芙蓉從地涌一方圖畫自天舒誰知半榻清涼石遊客能容五百餘總詠五臺和詠五臺明釋鎮澄空印燕京翩翩一錫上巔巒極目乾坤逸興寬歷歷明霞窺大海重重紫氣望長安雲舒大漠綿千縷月涌滄波玉一團從把太行移北冀皇畿迢遞大龍蟠東臺巍峨㟮屼是南臺無限嵐光照眼開古佛巖前長吐瑞曼殊牀畔細生苔迢迢磵水流清去帀帀雲山疊翠來十載空懸青靄夢杖藜今日始徘徊南臺西臺鬱鬱接穹蒼樓閣門開八水旁見說善財詢有道卻疑曼室住無方坐霑雲霧袈裟溼行蹋莓苔草屨香莫向禪關重叩啟峯頭殘月露真光西臺梵王宮殿倚崔嵬鳥道穿雲天際迴山鬼吸呼生霧雨毒龍吟嘯即風雷仰瞻斗柄摩金剎俯瞰滹沱瀉月杯何事頭陀身寄此為渠心慮久如灰北臺中臺倚杖縱遐觀突出孤峯壓眾巒古木崖前看鶴逸太華池畔照人寒自憐世事塵中擾靜覺諸天象外寬覽盡烟霞無限境漫將吟興付毫端中臺金口曾談事不虛靈峯誰隔聖凡居情知大士身非遠叵耐眾生念自疎芳草和烟寒更綠山雲帶雨卷還舒狂機歇盡無生滅始信人人絕欠餘總詠五臺遊五臺詩明王道行方伯晉陽七寶遙瞻五色蓮一筇挑破上方烟懸崖徑仄危難度出谷峯迴缺又圓虎豹狺狺驕白日芙蓉面面插青天衝飆失卻投林鳥路滑須妨遇石遷入山臺引吳閶練影同雞鳴曉日已曈曨身名都付浮雲外眼界直窮滄海東一氣混茫何所有九霄縹緲若為通年年草色春先吐知是山靈長育功東臺伐木丁丁日影疎猿吟虎嘯傍僧居雲穿兩袂行相失雪散諸天畫不如南極老人迎杖屨西方大士