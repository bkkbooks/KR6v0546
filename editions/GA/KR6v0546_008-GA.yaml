鬼聽經餘曉月諸山淨神光繞石天花馨登清涼石賦明邢雲路四圍山面面九步石方方石方方何清涼廣容千萬眾傳者疑荒唐觸蠻蝸國戰大地黍珠藏睠茲九步石行者宜徜徉茲石能令來者行茲石能令行者悅茲石自清涼人心自煩熱懷五臺詩明王廷策對揚蒲圻五臺天下名山也轄代予守代三年矣而不得一覽其勝作詩懷之出守因緣有五臺登遊未遂重徘徊文殊聖迹千年在向子幽心五嶽催歲歲天花開法雨山山佛火映空陔何時兀坐清涼石悟到無生隻履回遙望臺山二首時宰五臺縣明高數仞孔垣關中曾涖五臺邑遙瞻紫府山疎鐘寒雨外野寺暮雲間至聖誰能覩遊人空自還欲明前後偈須過上頭關夢遊清涼嘗夢登一山高峻無極疑若五臺高數仞一夕清齋夢神登古佛臺嵐光長掩映雲影共徘徊煉性求真火逢僧問劫灰慈航何處是假我渡輪迴懷空印澄公高數仞萬木寒山外澄公遁迹居已空塵世夢樂誦覺皇書養性資禪悅支形藉飯蔬何當隨杖屨導我禮曼殊宿東臺詩明趙夢麟永年司馬瓊樓標象外日暮野雲孤北斗當窗列西天近座隅羣峯歸冥漠大地入虛無此際吾高枕乾坤一夢圖觀日趙夢麟晨起憑虛眺大東紅輪閃爍出龍宮圓明箇是真如相普照迷方萬國同送光上座歸臺山四首時撫甘肅明曹子登以薦巡撫飛錫東迴萬里賒玉關春色映袈裟塵寰不識曹溪路獨臥空山對月斜雲鎖山腰塔影孤禪林掃月聽猿呼衲衣猶帶天門色疑是百城訪道徒五臺高擁碧崔嵬不斷濤聲萬壑來遙看獅窩雲護杖老僧出定夜深迴寒潭月影淨禪心我愧無緣接道林見說雪山天萬里長風吹送海潮音遊臺山清明值雪明鷗江雲中故國清明雨高山作雪飛藏名甘闃寂遠市厭輕肥謝客雲連社虛窗霧染衣春鴻頻送目飄泊澹忘歸獅子窩訪空印禪師不遇鷗江結社傍山阿曇花繞澗多聲名傳宦海音問隔恆河雲障菩薩頂風號獅子窩特來尋不見應是問維摩登清涼石賦明鄭材進士勞勞遊宦子坐此清涼石頓似超苦海剎那化國適曇雲萬壑生寶山四面闢繄此五臺奇浩劫誰擘劃茲石不盈丈一何靈異積廣容八部眾廓然摩詰宅芥子納須彌斯談信確實清涼契道歌并引明釋德寶笑巖予登清涼冬觀五頂如銀即知菩薩示剝白淨露之真體夏覩千峯似錦即知菩薩彰圓融具德之妙行此二不二體用一如用心及此忽然念斷心境兩忘共曼殊大士於石火光中暫一見耳乃為歌曰權輿化物誰云造一切無心合至道道合無心渠自知知及無知渠不疑無心無知終無已可中有數自成褫成褫有數渠非豫脫體如愚任運去泝流任運復逢原芙蓉開徧我師軒我師深隱懸河辯萬疊錦峯雲夜卷登那羅窟有感明釋真可紫柏君不見太樸未鑿混沌始情與無情無彼此瞥然一念是誰生骨肉山河成礙窒那羅窟甚深密底裏空明不可測見說神僧向入中雲邊千古遺包笠聞其風我亦來幽巖感慨增徘徊自慙身見仍還在菩薩有門不為開一直上莫分別凡聖都盧乾屎橛當頭若許著思量石人腦後重加楔由是觀休外參眼聲耳色髑髏寒常光一片色非色乾坤攝取一毛端又不見維摩丈室十笏許百千師座皆容處若言老漢弄神通分明瞌睡成錯去這妙用孰不有吃飯穿衣記得否自是男兒不丈夫超踔金毛變癡狗風吹草本非賊望影狺狺吠不息及乎大盜劫主人煩惱刀鳴遂竄匿業酒醉何日醒碌碌浮華俱酩酊輕裘肥馬送時光愁殺相知多此病且由他各管自沐猴性躁方痛治好惡關頭林木深上下何曾有定止鞭其後即回首叱去呼來不敢扭掌中繩索尚相持禪翁謾笑狂奴醜明道易履道難習水情潭豈易乾不是一番拌命做說時似悟用時瞞話到此淚如雨滴滴皆從肝肺吐相逢罕遇箇中人愁人莫向愁人語既有苦必有甜陰盡陽回洞口乾閒來暴背解麻衲寧知身在重巒間夜來趣忘人情萬里烟波海月生設使侯王知此境便教弊屣視功名為寶峯禪師賦明釋真可紫柏馳馬試劍少所長一旦斷髮依空王日用維持我怕我誠乃觸境清涼方種來麻麥資主病四百四病難為殃南臺雅俊卓乎前朝暮雲物頻蒼黃鳥道迢遙車馬稀齋餘靜坐燒異香從他人代英雄生那知大地各分張君不見望中樓臺花錦處劫初浩渺魚龍藏功成名遂世為上道人視之如黃粱伏枕未經彈指頃入相出將何忙忙其如老衲居層峯萬事從來弗挂腸山居四首明釋德清憨山此身元是寄暫住即為生不屬人間有何居世上名大千觀去小萬物自來輕破釜沈舟計而今借令行塵海誰能度空居我獨任風雲千載事冰鐵萬年心古木留春淺寒巖積雪深祇因貪縱目長踞最高岑勞生如逆旅天地即蘧廬已見真非假纔知實是虛龍門依藉草鼠壤拾餘蔬儘有閒田地誰當共荷鋤日月誰將去春秋似大迷不知人寂寂但見草萋萋聚鹿勞揮麈羣峯費杖藜倦來方假寐何處叫山雞宿龍門精舍為衲雲讓公賦明釋寬悅長干珍茲玄徒人嘉遯逃空谷初中後夜分坐臥行來獨定慧等持心春秋良自牧室中竹篦語階下龍虎踧白石靜為鄰青天磬如屋厲風卷塞雲萬木驚號哭玉磵踐冰雪松杉蕩炎伏大智友文殊埋塵混魚目而我陟五頂參尋徧無複山風冷颼颼靈臺深穆穆芙蓉削空蒼錦繡敷林麓神光攝慈顏天花墮緇服布衲備頭陀金環覺一宿寂滅菩提場究竟隨飲啄丐此龍門居言陳願自復投身一壑中清涼謝煩燠不像四方人東西競馳逐登中臺有感明釋寬悅日月雙輪五頂明徘徊殊覺一身輕祥雲忽涌金毛現風雨時來舍利鳴塔控諸天光叶斗經函半偈勝連城若能析骨書弘願剎海菩提果頓成送僧遊五臺明釋洪恩雪浪徧參南北了無從瓢笠經行萬壑松螺髻雪中旋五頂鷲頭雲外宿諸峯平鋪世界光懸鏡倒射關門日下舂草樹總彰前後偈漫尋童子不知蹤夢遊神境詩并引明釋鎮澄往予於萬曆乙亥歲聽一江老人講華嚴於燕山之隆化於時景慕菩薩住處即馳神五頂託志清涼以塵緣碌碌復經五載至庚辰秋禪源教海一無措心自知根器淺陋不足以載斯道遂罷遊講肆而企慕清涼之心日益切矣是秋九月初夕俄爾一夢適茲神境然其所見萬狀交輝羣真穆穆實非人間山林境比也乃作古風一首略以志其萬一云耳久慕清涼境日遠凝機思月明半窗戶秋風淅瀝時杳然適清夢縹緲天之西五峯凝黛色千磵流清滋錦烟籠月殿寶樹磨瓊枝奇花香馥馥好鳥聲𪁚𪁚巍哉妙德尊飄然駕狻猊諸天擎翠蓋仙人散紫芝羣真率嚴衛釋梵相追隨光幢蔽白日天樂遏雲馳上懸百尺纛大書七佛師列聖馭雲霄蕩然而逶迤陟彼黃金殿地帀青琉璃中聳蓮華臺上有珠網垂文殊坐其中肅爾若冰池梵音洞玄賾為我宣真慈四句不可說百非亦以離向上有玄關千聖絕施為我聞如甘露既喜且復悲夜雨溼芭蕉忽聽聲凘凘驚覺開雙眼觸物仍沈迷何當得真詣一洗多生癡稽首大智王斯言當證知師子歌明釋鎮澄君不見五臺山上師子踞師子窩在雲深處師子說法師子聽百獸聞之皆遠去大師子小師子猛烈威獰誰敢擬爪牙纔露便生擒顧佇思惟言下死不說空不說有四句百非不著口金剛寶劍倚天寒外道天魔皆斬首不是心不是佛父母未生全底物無量劫來絕點痕癡人欲解夢中縛不屬迷不屬悟白雲斷處青山露丈夫拶透兩頭關天上人間信獨步也無玄也無妙一切平常合至道等閒拈得火柴頭擊碎人間無價寶達磨宗般若旨六代相傳祇這子馬師翻作塗毒聲眾生聞者偷心死師子吼逼乾坤直前跳躍忽翻身小師子兒猶迷影野干狐兔那窺真德山棒臨濟喝亦能殺亦能活臨崖一拶命根休三藏玄機無不奪師子王忽嚬呻虛空走須彌瞋無邊剎海現微塵文殊普賢忙不徹擁出如來大法輪法輪轉無休歇五十三人得一橛樓閣門開須善財頭頭拶出光明月闕俱圓圓俱闕一毛端上同發越眾生空界有窮時此法滔滔無盡竭懷妙峯澄印二師長歌有引明釋鎮澄蒲坂妙峯金陵澄印居龍門蓬壺道人守河東因視戍登清涼聞其道過龍門而見訪本分事外言及臺山之廢二師泣曰茲山賴有幽林深谷禪者藏修今山民砍伐殆盡公如不護則菩薩勝境不久殘滅矣況茲山實國家內藩保固邊防亦國宰之職也公頷之呈於撫台高君奏請禁革砍伐乃寢焉實二師之力也今乃舍此遠遁他山千巖隱者感慕依望有至泣下而不能自已者余乃發為長歌以頌其德亦以見茲山廢興所係云震旦有山名清涼五頂鬱鬱接穹蒼千巖萬壑嘉木長玉芝瑤草凝清香曼殊大士真寂鄉一萬開士協贊揚自古崇真帝與王生民得以沐休康棲寂之流數無央刳心咸得悟真常天龍扶衛不暫忘是故茲山久乃昌世遠道衰聖哲亡魔力盛兮法力尩凡民侵暴不可當靈木盡遭斤斧傷易我居兮奪我糧寒巖隱者皆驚惶大士端居常寂光潸然淚下沾天裳咄哉斯民何猖狂欲毀如來化法場顧彼一萬童真行誰能為我拯頹綱中有賢善二吉祥稽首合掌立其傍賢兮德比妙高眾寶莊善兮心澄海印湛汪洋自云我力能恢張即乘悲願為舟航二人握手且徜徉歸來卓錫叶斗峯之陽不知歲月幾風霜但見四山數數青復黃舌頭刺血血淋浪書寫雜華無盡章刻苦真修不可量嘉聲浩爾聆八方王公聞者來相將或從之求度或為之金湯乃以慈悲力驅彼豺與狼不敢折其枝況敢求棟梁由是道人居遐邇得安藏所作亦大奇於己猶粃糠功成而不有遂別臺山岡長空雲渺渺曲澗水琅琅哲人向何處令我長相望何啻長相望更有無限藏修老衲聞君歸去無不斷枯腸同李令君佩韋登南臺書於月川丈室明唐公靖理髯太原日朗雲開萬界明忻逢此地話無生齋分香積偏餘供諦聽如來若有聲解脫可能空五蘊昏沈轉覺墮三彭木魚敲罷人天寂會見眾生入化城送僧遊五臺二首明鍾英進士鄴下囫圇法界內策杖欲何求念歇無生滅機圓任戲游風生千壑爽雲捲萬山幽只這文殊是五臺一掌收箇裏雖無事法門行欲全一塵含大界百剎繞諸天知識參來徧菩提道始圓文殊非獨智莫惜草鞋錢贈竹林寺方丈月川禪師明吳用先浮渡法照重來開法筵香林翠竹宛如前坐揮玉麈超三乘定入蒲團悟十玄註疏毫端飛義虎談經舌上吐青蓮暫辭塵鞅來仙地入室同參不二禪文殊菩薩讚明王爾康進士誰為法王子誰作七佛師劫前證龍種雲外吼金獅去來杳無定語默恍難期持劍逼如來咄嗟亦何危三三重三三外人那得知緬彼金色界可見不可思清涼遐思明釋鎮澄久慕清涼境未遂清涼遊塵緣竟碌碌遐想空悠悠所思不在山希覯大聖顏聖顏在何處縹緲虛無間我欲往從之何由生羽翰羽翰不可到情關萬里漫報爾遊臺人休索別思量情忘關亦空當處即清涼文殊只這是元不離羹牆附錄山堂法師念佛修心術諸大乘經勸生淨土因通二種一定二散定謂即心觀佛想彼西方依正主伴唯心本具我心空故如來本空我心假故如來宛爾我心中故如來絕待或想蓮華開合我居其中合表即空開表即假四微體同即表中道故經云諸佛如來是法界身入一切眾生心想中是故汝等心想佛時是心即是三十二相八十隨形好是心作佛是心是佛此乃如來親示唯心三昧圓常觀體了彼淨土生佛依正色心悉我自心性具功德即境為觀心外無佛性外無土觀之不已證無生忍二者散善用純實心信有西方一心不亂繫念彌陀一日七日聲聲不絕念念無閒經云執持名號一日七日一心不亂其人命終阿彌陀佛與諸聖眾現在其前然事想彼國但無三觀名散善耳故三種淨業迴向願生咸登極樂吾祖智者云根有利鈍行有定散觀佛三昧名定修餘善業說以為散散善力微不能滅除五逆此經明觀故得往生是知若定若散或鈍或利皆淨土因咸趣無生永無退轉矣
