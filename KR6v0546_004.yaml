body:
  text: 菩薩顯應目録五髻仙人傳貧女乞齊傳三沙彌見聖傳明勖值聖傳西來化僧傳道明入聖域傳高節見海雲傳解脫和尚見聖傳杜順和尚傳波利入金剛窟傳普明見聖授長松傳無著入金剛窟傳李靖射聖傳神英入法華寺傳道義入金閣寺傳李長者見聖授道傳法雲求慧傳法照入竹林寺傳三昧姑傳道海設浴聖現傳衣蒲童子傳楊準見神燈傳第六菩薩顯應事徹形識之封隨時即顯理懸生滅之表觸類而彰月印千江示有感必通之旨日明萬國吐無微不燭之光故大聖示生心期利物至人闡化願在轉凡東涌西沒西涌東沒渾如大火聚燎卻面門看即有形覓即無迹何異弄潮兒滾成毬路見說婆羅門白髮曳杖忽然覿面正逢渠將謂金剛窟苧服牽牛認著依前還不是真詮當諦信不假沈吟大道斷攀援寧容佇想志顯應經云衆生如夢世界如化故得染淨融通聖凡交徹不離當處豈隔纖塵蝶蝴莊周蘧然成異是以澄神之士入清涼者或覩真容或窺妙域神光化燭爍破鈞天仙梵靈鐘沖開廣樂故知菩薩聖境初不遠人若能念念忘機管取頭頭示現如斯靈宇不唯茲山若天台之方廣鼓山之竹林終南之棕櫚白鹿之靈隱神境顯彰載諸傳記楞嚴云如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見今略録見聖境者以顯心淨則聖應誠極則感通耳五髻仙人傳漢明以前聲教未至臺山聖境聞者尚希況造者乎當是時五百里內林木茂密虎豹縱橫五峯無路人迹罕通其川原之處皆黃冠所居每望五峯之間祥光煥發神燈夜流皆以為神人之都自古相傳有仙人者髮結五髻衣挂三銖或獨一無侶或羣兒相逐遊行五頂間望之儼然近之則失或出或入人莫追尋或云周時即在此山或云莫窮其始後來人迹漸繁其出漸少當時黃冠目為素衣仙及騰蘭開山後遂不復現三晉異記云無恤登常山西瞻紫雲之瑞疑鴈代間有王氣因獵於五臺之阿倏爾雲淡若水見神人焉衣素容若金儼若熙若占之蔬祭吉遂罷獵而返後寶藏經至乃知五髻童子文殊化身也貧女乞齊傳元魏大孚靈鷲寺每春三月設無遮齊不𥳑道俗不別貴賤男女乞兒悉令飽足於食等者於法亦等有貧女莫知所從攜抱二子一犬隨之身無餘資翦髮以施未遑衆食告主僧曰吾有急務遽就他行請先分我食僧可之與饌三分意令二子俱足女曰吾犬亦當得食僧勉強與之女曰我腹有子更須分食僧怒曰汝求僧食無厭在腹未生若為須食濫叨之心乃至此乎貧女被訶即說偈曰苦瓠連根苦甜瓜徹蒂甜三界無著處致使阿師嫌即踊身虛空化菩薩相犬為獅子兒為二天童子雲光縹眇復說偈曰衆生學平等心隨萬境波百骸俱捨盡其如憎愛何時會千人悲泣向空曰大聖願示平等法門我等奉行空中偈曰持心如大地亦如水火風無二無分別究竟如虛空會主自恨不識真聖取刀欲剜其目衆遮乃止即以貧女所施之髮於身起處建塔供養萬曆初主僧圓廣重加修飾塔下掘得聖髮數綹其色如金視之不定塔在大塔院寺東側三沙彌見聖傳元魏大孚靈鷲寺有三沙彌聞山多仙靈相與裹糧而訪深林大壑靡幽不至餱盡不歸採葉而食誓以覩聖為期遊三月偶息樹下有大人沿嶺而來身黑如漆而有光明沙彌跪遮其前曰聖者願遺道術其人大罵排突而去沙彌追之數里見石窟即投入焉沙彌相與坐於窟傍忽見雲間飄然而下乃一丈夫顏色鮮白招三沙彌同入穴中入數十步視之碧琉璃色廣大穹窿懸明月珠光逾皎日中有數十寶窟沙彌從丈夫乞道術丈夫與之碗酒曰飲之得度沙彌不受曰師有戒誨不得飲酒丈夫曰汝既不飲仙不可得沙彌欲辭歸丈夫曰天色已晚留此一宿三人各宿一窟以女子事之各念求仙未得反遭魔妖遂各潛出既出已行數十里有天童飛來曰大師見汝奉戒堅貞故以神藥贈之人各一莖其色如玉食已飄然而舉歸而辭師未知所往明勖值聖傳高齊釋明勖定州人少懷倜儻志槩嶷峻嘗閲華嚴知清涼乃文殊所居遂負笈來遊深林幽谷靡不詢歷偶值異僧容貌甚奇乃相作禮各云大聖願度愚蒙俱困良久始問方來各言所居勖遂不疑欣得同志相隨三日至東臺半麓見一敝屋中有數僧容貌鄙陋威儀疏野勖意慢之日色已曛遂就寄宿中夜伴僧疾作困篤難堪呻吟至旦臭穢莫近伴謂勖曰我病且沈汝當先行勿相滯也勖曰吾遊禮畢當復相顧遂辭而去離庵數步忽聞其後錚然有聲回顧宿庵倏焉俱失方悟聖為自慨愚暗崩號痛絶幾至滅身懇求旬餘更無所見既歸白之耆宿耆宿曰公之罪有二焉見僧生慢伴疾棄行由斯雖入聖叢如隔山嶽也勖承斯誨終身持敬以事病為行焉西來化僧傳宇文周時有梵僧自天竺來云禮迦葉佛說法處及清涼山文殊住處適關西僧道信等數十人隨來至菩薩頂中夜入火光三昧現文殊像夜盡方殞了無遺物隨者乃知文殊化身也道明入聖域傳宇文周娑婆寺僧道明志業禪觀探求聖境攜一沙彌至東臺東花林山入谷偶聞仙藥奇香顧之見石臼方搗藥訖謂其徒曰吾求聖境日久倣佛在茲矣蹢躅間忽二丈夫深林而出形容光偉師即稽首求度丈夫曰且止待我白衆有頃一人來招謂沙彌曰汝且勿隨恐觸清衆沙彌強隨行數十步忽見茂林清泉名花異果堂閣殊麗儼若天宮清衆穆穆具大人相瞻仰無厭有一長者顧謂師曰此衆真實安容繁瑣汝速送沙彌出更來就座師如命方出數步回首俱失唯見山麓焉師徒歎恨而歸古云修安樂行者不將沙彌修遠離行者不帶眷屬恐妨白業難預聖流其見於此乎高節見海雲傳隋高節并州人學語之歲稱南無佛他語不道年十七忽厭塵勞志求解脫父母以其不勤業亦欲捨之一日辭親由代郡入臺山不避蟲獸志入幽深於北臺後谷見一頭陀苫茅為居草根木葉以為其食節見即喜生難值想長跪願得度脫隨師執侍僧曰汝能食我食而後得度節即採葉而食汲泉而飲居數日初無厭難復欲求度僧曰能誦法華而後得度節經七夕法華成誦復欲求度僧曰汝能攝念一坐七日必當得度節即飽食木葉澗漱已一坐七日起已但覺身心輕利法喜無量長跪白師曰至哉大師我得法力願以大慈度我出家僧曰我年老矣不能令汝至道今長安開度汝可速往彼有臥輪禪師汝當依之節曰請和尚道號弟子受持師曰我名海雲汝善受持節求度不遂泣拜而去至長安乃詢輪所而往見焉輪問所來答曰弟子自臺山來和尚遺語今故投師輪曰汝和尚名誰答曰我師海雲輪大驚曰海雲即華嚴經中善財所參第三知識非萬劫積德莫能一遇汝棄此大聖而來從我何其誤也節方悟恨不碎身遙望五臺猶希再覩辭輪而返及至舊處唯存荒麓焉解脫和尚見聖傳隋解脫和尚代州邢氏子丱歲辭親於臺山昭果寺披剃及具戒從抱腹山志昭禪師學出世道昭深器之一日告衆曰解脫禪學冲明非爾曹所及勿同常輩令執役也未幾返昭果晝誦大乘夜則禪觀嘗於東臺麓見草衣比丘跏趺石上即前叩首曰欲求文殊乞為指示比丘指金蓮華解脫顧之比丘即失脫於石畔哀慕頂禮日夜無息精苦彌勵久之於臺麓間再覩比丘於圓光中現半身語曰夫解脫者當求諸己而由人乎言訖不見於是狂機頓歇深契無生得大法喜即發願言我得此法不應獨善願與一切含靈共之說是語已即入三昧於三昧中諸佛即為現形說偈言諸佛寂滅甚深法曠劫修行今乃得汝能開曉此法眼我等諸佛皆隨喜解脫問曰寂滅之法若為可說得教人耶諸佛報曰方便智為燈照見心境界欲究真法性一切無所見州牧請師適州傳戒事畢東歸途中日暮自念不得燒香供養踧踖慙愧忽聞空中聲曰合掌以為華身為供養具善心真實香讚歎香雲布諸佛聞此香時復來相度汝今勤精進終不相疑誤自爾德雲彌布法澤普霑參玄之士罔不就焉得成禪業者十餘人盛化五十餘年後莫知所終杜順和尚傳唐法順和尚長安萬年杜氏子亦稱杜順如晦族長也少為隋文帝欽重給月俸供之有病者師對之危坐少頃即愈或生而聾者順召之與言耳即聰或生而啞者順就之與語即能言或狂而顛者順使人領住向之禪定少選彼即得心謝而去又嘗臨溪隨侍者懼不可濟順率同涉水即斷流其神迹類如此而順隤然初不以介意尤邃華嚴宗旨帝素敬重之嘗引入宮禁導迎善氣妃主戚里諸貴奉之有如生佛唐太宗召謂之曰朕苦勞熱師之神力何以蠲除師曰聖德御宇微恙何憂但須大赦聖躬自安上從之疾遂瘳因錫號曰帝心作法界觀門專弘華嚴弟子智儼尊者傳其教是為三祖弟子智冲辭往五臺禮文殊去師以𥳑緘而付之曰若見文殊當開視之及至臺山深林幽谷罔不悉至偶見山叟語冲曰子奔馳憔悴欲何求耶冲曰求見文殊未知何在叟曰文殊久化長安未歸此何求耶冲曰為誰是也叟曰法順和尚是也冲方旋踵老人即隱開緘視之有偈云遊子漫波波臺山歷土坡文殊祇這是何更問彌陀冲急歸長安順已遷化焉時貞觀十四年五月也波利入金剛窟傳唐佛陀波利北印度罽賓國人亡身徇道遍探靈迹及聞震旦有文殊住處遠涉流沙特來禮謁以儀鳳元年達此土至臺山南躡虒陽嶺俯仰之間林木干雲名花匝地翹首五峯生大欣慰五體投地向空白云如來滅後衆聖潛靈唯大聖文殊師利大悲無盡於此山中激引羣生教諸菩薩某痛恨生遭世難不睹聖容遠涉流沙故來瞻禮伏望大慈令我暫識真容聊接慈語言已悲泣向山頂禮忽見老人自谷中出作婆羅門語謂波利曰汝謂情存至道遠訪聖蹤漢地衆生多造罪業出家之士多犯戒律西土有佛頂尊勝陀羅尼經能滅衆生重惡業垢汝持來否波利答曰貧道直來禮謁不將經來老人曰既不將經徒來何益縱見文殊豈能識之汝當速返取此經來利濟此土多苦衆生即是面見諸佛親奉供養豈一文殊不能見哉波利聞已不勝欣慶禮老人足未舉頭頃忽然不見悲喜交切倍更虔誠畢志捐生復還西土求佛頂尊勝陀羅尼經於弘道元年回至長安具事上聞高宗大悅命日照三藏與波利參譯已而上賜波利絹三千匹經留於內波利泣奏曰貧道委命取經為濟羣品非以富貴也願陛下開一視同仁之心而流布焉上閔其志乃留唐本還其梵文波利將詣西明寺與沙門正順等再譯譯訖波利持其梵本往詣五臺山入金剛窟竟不復出或云既入窟已見光網莊嚴聖真穆穆顧同行在外復出招之未旋踵間聖境即失唯山穴存焉波利遂於巖畔坐脫其尊勝呪盛行於世華嚴云華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在故知金剛窟者誠不可以聖凡境界而思議也若波利入而不出則是諸聖化身權彰斯應耳既出而坐脫則謝斯凡纍入彼聖流矣普明見聖授長松傳唐釋普明濟州趙氏子始剃依泰山靈巖寺欣聞清涼荷錫來遊於南臺之北鑿龕修業有異僧時來相與言論每言煩惱未伏生死莫度言辭激切周旋久之但云努力偶羣賊至明意坦若無懼無惜僧至明向言之僧稱善焉後有猛虎哮吼而入明亦自若虎去僧至明復白之僧大嘉歎復言努力無何風雪駛飄俄深數尺寒凜倍常暮有女子儀容婉妍凍色苦甚求寄室中憫而許之女衣疏薄更深寒逼呻吟轉劇求寄禪牀明初不許夜半聲絶明起撫之身冷氣微恐致隕命引使登牀解衣覆之有頃更觸暖滑無喻欲情瞥起如火之熾方欲就之女已下牀以手援之倏焉而失明於是身肉綻爛眉鬚墮落痛不可言悔責無地日夜哀泣懺謝往愆如是辛勤俄經三月聞空聲曰汝無禪行不可度脫當服長松除患得仙明雖慶躍自恨不知長松所在彌加懇惻復經七日空聲報曰長松在汝庵前狀色若何明依言取服身瘡即愈神氣輕明時永昌元年八月辭其友具陳往事羽化而去無著入金剛窟傳唐無著永嘉董氏子天姿穎拔雄毅不羣年十二依本州龍泉寺猗律師披剃誦大乘經數萬偈天寶八年以業優得度二十一歲始紹師業既精毗尼即詣金陵牛頭山忠禪師咨決心要孜孜禪學不廢寸陰忠謂著曰汝以聰明之咎與理斯隔若無此咎且喜痛快三世諸佛於衆生心外無有一法可得幻翳若除虛空本淨著於言下頓開法眼自是倦遊湖海志慕林泉大曆二年夏抵清涼山憩華嚴寺跏趺於經樓前禪寂三日後夜見白光自東北來照無著頂久而方隱著但覺身心清涼得大法喜陵晨思光來處東北而行至樓觀谷口心思聖境禮數百拜跏趺小寐聞叱牛聲驚覺見一老人弊巾苧服牽牛而行至無著前著拜問曰老宿自何來曰山中丐糧來著曰家居何所答曰在此谷中老人曰子欲何往答曰欲入金剛窟不得門路老人曰且就吾家少息啜茶無著從之北行五十步許抵門闔老人呼均提有一童子啓扉接牛老人延無著入其地平正淨琉璃色堂舍臥具非世所有坐次老人問曰子從何來答曰南方曰將得好念珠否答曰有粗珠耳老人曰請拈出看無著度珠與老人老人曰將你自家的來著曰是我所有老人曰若是汝有底爭從南方來童子捧二玻璃盞盛滿酥蜜一奉無著一奉老人老人舉盞問著曰南方有這箇麼著云無老人云無這箇將甚麼喫茶著無對老人復問曰彼方佛法如何住持著曰末法比丘少奉戒律又問多少衆著曰或三百五百無著卻問老人此間佛法如何住持老人曰龍蛇混雜凡聖交參又問多少衆老人曰前三三與後三三無著無語老人復問常事何業答曰般若熏心不得其要老人曰不得是要又問汝初出家志求何事答曰欲期佛果老人曰初心即得復問汝年幾何答三十一歲老人曰三十八歲福必至矣今於此地徐徐而行無自傷足吾倦欲眠汝請歸去著曰日色將晡乞留一宿老人卻之曰汝有兩伴此是執處故不應住著曰我本無伴亦無戀著老人曰汝既無戀何求住此既有戀求豈非伴乎又曰汝持衣否答曰受具已來常持衣鉢老人曰夫沙門無難不得捨衣好去無著拜辭曰今有所疑敢問大德濁世衆生善根輕鮮當何所務即得解脫老人即為說偈曰若人靜坐一須臾勝造恆沙七寶塔寶塔畢竟化為塵一念靜心成正覺說偈已令童子送無著出無著問童子曰適來主人道前三三與後三三是多少數童子曰金剛背後的無著罔措著揖辭復問金剛窟所在童子回指云這箇是般若寺無著回顧童子與寺俱失但見山色蒼蒼長林鬱鬱悲愴慕戀倣徨久之忽覩慶雲四布上有圓光若懸鏡然多菩薩影隱映於中及有藻瓶錫杖蓮華師子之狀著不勝悲喜移時乃空無著感慨遂成一偈偈曰廓周沙界聖伽藍滿目文殊接對談言下不知開何印回頭祇見舊山巖說偈已尋路至華嚴寺具述其事厥後立化於金剛窟前雪竇題云千峯盤曲色如藍誰謂文殊是對談堪笑清涼多少衆前三三與後三三李靖射聖傳唐鴈門太守李靖其在京時先亦尚釋後見僧犯非法即怒志滅其教及任代大廢佛寺因獵縱馬中臺之野見僧與婦共浴於池靖大怒援弓射之望之袒一肩東南而去追之數步不及追至真容院見文殊普賢二像帶其箭靖乃悔泣禮謝而去神英入法華寺傳唐神英滄州韓氏子丱歲得度操越松筠志奪金石及壯依南嶽神會大師咨出世道久之一日會謂英曰汝緣在北清涼聖地好建法幢勿滯此也英承誨北遊開元四年至臺山憩華嚴寺一日齊後獨遊西林披雲深入忽覩一寺額曰法華院英既入循禮中有多寶佛塔一座珠玉為飾縹眇入雲龕室鈴幢不可稱數光明四達燒諸天香後有仁王殿黃金為瓦琉璃為壁棟梁椽柱悉是異寶中設文殊形像目髮紺青身紫金色其諸法堂僧舍窈窕深邃莫能遍探僧儀光偉各默不語英念欲依清衆修行未知可否叩問執事執事可之曰汝有衣鉢可即持來英回取衣鉢復尋其寺了無所見唯林木焉英悲歎發願誓終於此遂於其處建法華院今則破瓦頽垣無復存者矣道義入金閣寺傳唐道義江東人受業衢州龍興寺神清骨秀風彩動人開元二十四年與杭州僧普守同遊五臺於清涼寺挂囊二人同訪聖迹東北行數里道義自恨生逢季運衆聖隱伏唯此臺山靈迹不泯故洪纖隱顯咸露真機金相玉毫每出常境塵勞既重永隔聖真如是思惟忽增悲愴遙空叩首日夜忘疲一心正念物我兼忘探尋數月志行彌堅二人同至南臺西北嶺畔見一老僧神彩嚴峻鬚髮皓然乘白象循嶺而來二人避路稽首象行如風倏然而過舉首杳然莫知所向適欲追尋寒風驟起歸宿清涼寺明日復尋嶺上見乘象老僧拄杖而來謂義曰汝可急行及中齊也義叩首曰師欲何往老僧曰太原韋尹家齊汝勿遠去待回相邀義禮起不及瞻遂遠沒焉義與伴至齊所果預僧食義竊驚怪謂伴曰此事切勿輕泄伴僧以為山境變怪亦不介意二人徐出僧堂經行林中伴僧前行義念老人所誨徐行待之忽見童子黃衫麻履自東林出至道義前合掌曰我名覺一奉和尚命請衢州義闍黎喫茶義欲呼伴望之不見遂隨童子東北宛轉百餘步忽見金橋義即隨登舉首望之大寺一區三門堂殿僧舍垣牆普皆金色中有飛閣三層金焰騰輝眩神奪目唯地乃碧琉璃成義瞻仰不暇六情眩亂神志若失即起志誠稱南無文殊師利菩薩住心正念神思乃定即隨童子入東廂第一院見乘象老僧坐金繩牀云闍黎來耶義具威儀禮畢長跪不起老僧命童子扶起設小座令坐義問訊曰和尚赴齊道路無難否檀越至誠否去路尚遙還何速耶老僧答曰善哉闍黎道路無難檀越誠信道本非遠返亦無速又問和尚常說何法教人答曰春樹彌陀佛秋花觀世音又問此中為娑婆耶是淨土乎老僧以白拂擊牀一下云闍黎會麼義云不會老僧云你不會的為娑婆耶是淨土乎義云某甲適來遊山唯見丘陵草樹今見此處金玉樓臺是以淨穢不決聖凡莫辨老僧曰闍黎豈不見道龍蛇混雜凡聖同居汝但分別見盡聖凡安寄言畢童子即將茶藥與義啜香美清奇非世間味食已但覺諸根輕明快樂無喻茶畢命童子引令參堂歷十二院及大食堂遍觀聖衆或論法義或坐默然威儀穆穆望之儼然曾不知幾百千衆參畢道義私念同伴前去不得參預聖會出門欲招之數步回首即失其境悲號躃地五內欲裂伴僧尋至詢之具言所見歎恨而歸後人於此地建金閣寺焉李長者見聖授道傳唐長者李通玄嘗遊五臺於善住院逢異僧授以華嚴大旨將晚僧取別長者曰天色既暮師欲何適僧指北峯頂其行飄然若御風長者追之不及至夜望峯頂火光亙天詢寺主主以為野燒長者念異僧適彼此必神光非火也即曳杖而登無敢隨者至頂見火更熾周方里許視其中樹紫金幢見先異僧坐其下帝冠者數百圍繞梵音雄朗其語難解長者心念設我投中得覲聖者燒身無憾即踊身投入頓覺清涼法喜無量方趨前作禮奄然忽空長者即於是處一坐三日而後下山至西谷口見數童子眼光外射天衣飄颻乘風而過長者稽首童子曰疇昔之夜投身於吾師光中者非子耶長者曰然即問曰仁者師為誰耶童子曰吾師妙德耳長者欲挽衣隨之童子曰汝宿願弘經何得忘卻言已杳然飛去長者自念大士授旨欲造論釋大經見此地太寒遂南徙盂陽之方山鑿巖為龕居之造論柏葉和棗作餅如錢日食七枚時稱棗柏大士口出光以代燭嘗感猛虎駝經仙童汲水論成四十卷及決疑論並行於世開元二十八年春於方山石室禪寂而化法雲求慧傳唐法雲雁門趙氏子受質淳善毀譽淡然及就學癡鈍無記年十二父母送禮五臺華嚴寺淨覺為師拾薪汲水初不憚勞年三十六誦習未能衆以其愚呼為牛雲一日自恨愚質久生何為時方大雪跣足禮臺一心持念文殊師利願求大聖開決心眼如是而行寒不知衣食不知味內不知身外不知物唯聖是求逢人即問文殊住處既遍五峯了無所見至寺求食其志增鋭如迷如醉復至東臺見老人曝火即叩問曰大德文殊住何處老人云汝問他何為雲曰我生愚鈍乞為開明老人云那羸頽百拙漢汝不須見他好雲以為狂遂趣北臺既至見先老人擁雪而坐心生希有以為真文殊也趣前叩首以凍餒馳困倒地不起口吐血團忽若夢寐見先老人語曰汝於往生曾作法師貪他利養祕吝佛法以是因緣墮牛類中愚無所知償他宿債持法力故今得人身復預僧數慳法餘業故無誦習老人即以鐵如意鉤斫出心藏令其視之宛若牛心於天井洗蕩復與安之叱云起起於是忽醒無所痛恙遍體汗流更覓老人竟不復見但見祥雲驟起軟風拂衣仰視天際圓光若鏡見先老人坐蓮華上晃焉而沒法雲從此往世所持經論宛然記憶如獲舊物終身行道如救頭然一夕繞育王塔至三更見白光如水自北臺連接鷲峯中現天閣寶色燦爛額曰善住時開元二十三年春辭衆而終法照入竹林寺傳唐釋法照不知何許人大曆二年棲止衡州雲峯寺勤修不懈於僧堂內粥鉢中忽睹五彩祥雲雲內現山寺寺之東北五十里已來有山山下有澗澗北有石門入可五里有寺金榜題云大聖竹林寺雖目擊分明而心懷隕穫他日齊時還於鉢中五色雲內現其五臺諸寺盡是金地無有山林穢惡純是池臺樓觀衆寶莊嚴文殊一萬聖衆而處其中又現諸佛淨國食畢方滅心疑未決歸院問僧還有曾遊五臺山已否時有嘉延曇暉二師言曾到言與鉢內所見一皆符合然尚未得臺山消息暨四年夏於衡州湖東寺內有高樓臺九旬起五會念佛道場六月二日未時遙見祥雲彌覆臺寺雲中有諸樓閣閣中有數梵僧各長丈許執錫行道衡州舉郭咸見彌陀佛與文殊普賢一萬菩薩俱在此會其身高大見之者皆深泣血設禮至酉方滅照其日晚於道場外遇一老人告照云師先發願往金色世界奉覲大聖今何不去照怪而答曰時難路艱何可往也老人言但亟去道路固無留難言訖不見照驚入道場重發誠願夏滿約往前任是火聚冰河終無退衄至八月十三日於南嶽與同志數人惠然肯來果無沮礙則五年四月五日到五臺縣遙見佛光寺南數道白光六日到佛光寺果如鉢中所見略無差脫其夜四更見一道光從北山下來射照照忙入堂內乃問衆云此何祥也吉凶焉在有僧答言此大聖不思議光常答有緣照聞已即具威儀尋光至寺東北五十里間果有山山下有澗澗北有一石門見二青衣可年八九歲顏貌端正立於門首一稱善財二曰難陀相見歡喜問訊設禮引照入門向北行五里已來見一金門樓漸至門所乃是一寺寺前有大金榜題曰大聖竹林寺一如鉢中所見者方圓可二十里一百二十院皆有寶塔莊嚴其地純是黃金流渠華樹充滿其中照入寺至講堂中見文殊在西普賢在東各據師子之座說法之音歷歷可聽文殊左右菩薩萬餘普賢亦無數菩薩圍繞照至二聖前作禮問言末代凡夫去聖時遙知識轉劣垢障尤深佛性無由顯現佛法浩瀚未審修行於何法門最為其要唯願大聖斷我疑網文殊報言汝今念佛今正是時諸修行門無過念佛供養三寶福慧雙修此之二門最為徑要所以者何我於過去劫中因觀佛故因念佛故因供養故今得一切種智是故一切諸法般若波羅蜜甚深禪定乃至諸佛皆從念佛而生故知念佛諸法之王汝當常念無上法王令無休息照又問當云何念文殊言此世界西有阿彌陀佛彼佛願力不可思議汝當繼念令無閒斷命終之後決定往生永不退轉說是語已時二大聖各舒金手摩照頂為授記別汝以念佛故不久證無上正等菩提若善男女等願疾成佛者無過念佛則能速證無上菩提語已時二大聖互說伽陀照聞已歡喜踊躍疑網悉除又更作禮禮已合掌文殊言汝可往詣諸菩薩院次第巡禮受教已次第瞻禮遂至七寶果園其果才熟其大如碗便取食之食已身意泰然造大聖前作禮辭退還見二青衣送至門外禮已舉頭遂失所在倍增悲感乃立石記至今存焉復至四月八日於華嚴寺西樓下安止洎十三日照與五十餘僧同往金剛窟到無著見大聖處虔心禮三十五佛名照禮才十遍忽見其處廣博嚴淨琉璃宮殿文殊普賢一萬菩薩及佛陀波利居在一處照見已惟自慶喜隨衆歸寺其夜三更於華嚴院西樓上忽見寺東山半有五聖燈其大方尺餘照呪言請分百燈歸一畔便分如願重謂分為千炬言訖便分千數行行相對遍於山半又更獨詣金剛窟所願見大聖三更盡到見梵僧稱是佛陀波利引之入聖寺語在覺護傳即佛陀波利傳至十二月初遂於華嚴寺華嚴院入念佛道場絶粒要期誓生淨土至於七日初夜正念佛時又見一梵僧入乎道場告云汝所見臺山境界何故不說言訖不見照疑此僧亦擬不說翌日申時正念誦次又見一梵僧年可八十乃語照曰師所見臺山靈異胡不流布普示衆生令使見聞發菩提心獲大利樂乎照曰實無心祕蔽聖道恐生疑謗故所以不說僧云大聖文殊現在此山尚招人謗況汝所見境界但使衆生見聞之者發菩提心作毒鼓緣耳照聞斯語便隨憶念録之時江東釋慧從以大曆六年正月內與華嚴寺崇暉明謙等三十餘人隨照至金剛窟所親示般若院立石標記於時徒衆誠心瞻仰悲喜未已遂聞鐘聲其音雅亮節解分明衆皆聞之驚異尤甚驗乎所見不虛故書於屋壁普使見聞同發勝心共期佛慧自後照又依所見化竹林寺題額處建寺一區莊嚴精麗便號竹林焉又大曆十二年九月十三日照與弟子八人於東臺覩白光數四次有異雲靉靆雲開見五色通身光光內有圓光紅色文殊乘青毛師子衆皆明見乃霏微下雪及五色圓光遍於山谷其同見弟子純一惟秀歸政智遠沙彌惟英優婆塞張希俊等照後篤鞏其心修鍊無曠不知其終絳州兵掾王士詹述聖寺記云此傳因舊志所載失實故録高僧傳三集感通篇文三昧姑傳唐三昧姑未詳所從大曆間居華嚴嶺一坐靜室七日乃起故有三昧稱焉能驅使鬼神呼遣禽獸穿林開道以通四達力洞無畏其行如風入雲代行乞朝去暮歸大開社火廣濟饑寒遊禮之人由是浸廣唯一粥釜自把杓柄人無多寡悉令飽足而去一日禪寂不及把杓粥食將盡弟子白之粥盡奈何姑往攪之曰孰道盡耶粥復盈釜常告遊禮者曰諸人諸人三界沈淪可來此地作菩提因厥後代牧以為妖異訪之姑預誡徒衆立化于石上神火自焚了無遺物州牧歎息而歸時貞元三年二月也道海設浴聖現傳宋至道間真容院僧道海者結百僧會夏三月諷華嚴四月八日方為衆僧設浴羣藥煮湯好香熏室巾單鮮潔茶果清奇先請座首耆年數人入浴衆方解衣忽聞揮洗聲首座入視之見多童子色若金玉座既怪且疑問曰爾何來耶童子相顧而笑座出謂浴主曰衆僧未浴何處兒郎先入耶浴主大驚急入視之但見光明滿室異香凝結更無人焉乃知聖現相與著衣禮誦而後次第入浴浴者皆得身心輕明妙樂無喻七日乃已衣蒲童子傳宋紹興間太尉呂惠卿學通內外嘗注華嚴法界觀及出新意解莊子因視戍乘興遊五臺山至中臺忽雲霧四合暴風雷雨聲震林壑從者驚悚潛伏須臾有物狀若蒼虬半出雲霧間太尉駭甚移時稍霽外望見一童子體黑而被髮以蒲自足纏至肩袒右膊手執梵夾問太尉曰官人何見而震駭如此惠卿曰夙有障緣遇茲惡境童子曰今皆滅矣官人何求而來惠卿曰願見大士文殊童子曰欲見菩薩何為曰嘗覽華嚴大教旨深意廣欲望大士發起解心庶幾箋釋流行世間使幽夜頓獲光明大心者即得開悟童子曰諸佛妙意善順事理𥳑易明白先德注意可解如十地一品釋文不過數紙今時枝蔓注近百卷而聖意逾遠真所謂破碎大道也惠卿曰童子容貌若此而敢呵譏前輩乎童子笑曰官人謬矣此間一草一木無非文殊境界在汝日用觸事不迷此真文殊耳曷以凡情亂干思慮惠卿忽醒即叩首童子現大士形跨金獅隱隱沒於雲際惠卿因模其所見衣蒲童子之像傳於世楊準見神燈傳明萬曆丙午四月神宮監太監楊準奉使五頂進香給散茶米至龍泉關卻騎徒步誦消災呪一遍即以頭叩地作禮一拜如是一呪一拜行至金燈寺雨雪交作途路泥濘誦呪叩頭初無少怠至南臺日暮旋繞臺頂數十匝率同行僧俗數人於頂塔前禮三十五佛於時夜景寥寥羣峯黯黑澗下一燈飛來懸空對面久之準長跪叩首默禱曰願今上聖主御體康和萬安萬壽聖母御體康和萬安萬壽天下太平生民樂業果如我願燈必變多才舉此念所對一燈分成十燈俄爾之間分十為百有頃分百為千衆禮佛念至一切世間樂見上大精進佛忽見千山草樹萬燈交照成光明網準叩首血流悲喜無量忽生慚愧曰弟子殘形閹宦少年愚戇造罪尤多近雖齊戒禪慧未聞罪垢凡庸耳曷能感斯嘉應耶此乃上賴聖母聖主至誠不息廣大無疆之德乃有斯應也況今明時盛化三教九流士官百姓率多奉佛持齊凡一毫之善皆歸聖主蓋其風化有本故也是以菩薩所示自一燈分為萬燈故知萬燈咸歸一燈也若如此者願燈光還收為一須臾漸收為百為十乃至為一化為一大圓光光中隱然現金色童子跨青獅子移時乃隱音義方廣晉道猷度石橋入方廣寺見僧如舊識猷乞駐錫僧曰卻後十年自當來此及出過十年猷乃坐脫焉竹林高齊僧無名因事客僧病愈客感邀遊竹林名後與數人遊至處衆被田父逐退唯名遇客引入經宿出即不見棕櫚上音宗下音閭唐僧倩人擎襆入谷人不索直僧曰採薪當來食慎勿泄人後告妻遂啞求食處亦失靈隱高齊嵩禪遊白鹿山偶入一寺額曰靈隱堂空無人俄爾衆自棟出各言齊處後出者曰相州彼岸寺講會少年多俊秀難問鋒起殊為可觀故致遲來嵩欲敘話人寺忽滅
