body:
  text: 名公外護目錄晉士衡陶侃傳唐相國裴休傳宋丞相張商英傳宋祁陽太守傅其瓘傳宋吳興錢蓋傳元移剌楚才傳明李文進傳明高胡二公禁砍伐傳明雁平道張惟誠清糧傳明吏部尚書陸光祖傳明文震亨傳第八名公外護遊心奧義助闡發於靈山染指正因喻微淵於法海調御有末後之囑非王臣何以作金湯毗耶垂向上之機惟曼殊為能臻閫域矧茲入人心者最深紫陽發其異議感神化者至速天覺著以鴻篇所以聖像或沈或浮泥宿雲翔隨時節金燈忽隱忽現輪旋泉湧驗感通振法運於欲墜儼然未散拈華蕩魔力於繁興宛爾從空奮杵志外護愚謂外護云者自古名公大儒向慕此道者必能屏蔽此教也若漢之牟子吳之闞澤晉之謝安王珉桓伊隋之王通李士謙唐之房玄齡蕭瑀房融段成式裴休至於有宋斯為盛焉一時賢相名流若王旦呂蒙正范仲淹純仁文彥博富弼趙抃張方平楊億陳瓘蘇軾蘇轍張商英黃庭堅莫不以霑濡佛法發而為勳業文章朱晦庵云佛氏之教其入人心也易矣無賢愚貴賤悉爭尊奉之才智愈高而陷溺愈深吾人家住尚不能回妻子之心況身後耶況他人耶即晦庵此言足見佛法廣大斷非褊小之理學能以門戶之見抗拒而阻遏之者朱子自忘固陋反以為人心陷溺獨不思己所私淑者為二程二程所從學者為周茂叔茂叔所由得窺心性之學者以從東林壽涯二禪師遊朱子竟數典忘祖也而同時之陸象山後此之王陽明見道迥出朱子之上正以能精深佛理故能光大儒宗足證佛道乃聖賢大休歇處而造極之也今略錄有關于清涼山者一二其他備諸弘明集傳燈錄云士衡陶侃傳東晉陶侃字士衡嘗夢五臺僧從乞及建旟南海漁人每夕見海濱光流數丈因以白侃侃遣人摝之俄而金像陵波而起舉之上船座下銘阿育王所造文殊菩薩像梵書云昔育王既統閻浮斅鬼王制獄恐酷毒不甚文殊現處鑊中火滅湯冷生青蓮華獄卒白王王心感悟即日毀獄造八萬四千塔並聖像散布天下此其一也初侃未能深信佛法覩此嘉應乃傾心焉安置武昌寒溪寺後欲遷荊州百夫不移乃休沙門慧遠迎入廬山舉之飄然了無艱險斯即聖靈感應唯其人乎故諺有之曰陶惟劍雄像以神標雲翔泥宿邈乎遙遙相國裴休傳唐相國裴休字公美河東人出入百氏之學以儒業干爵參黃檗禪飽圭峯教隱淪金馬默契無生公幼時嘗值異僧云清涼來貽舍利三顆並一𥳑乃竺書人無識者置之笥中出仕後見黃檗圭峯栖心佛道不樂世位志脫塵網一日揀故紙忽得昔𥳑呈于圭峯峯令梵僧譯出成一偈曰大士涉俗小士居真欲求佛道豈離紅塵公閱偈竊喜遂不棄祿為道日切嘗序圓覺云血氣之屬必有知凡有知者必同體所謂真淨明妙虛徹靈通卓然而獨存者也其見諦雄論皆如此廣德間上命河東節度使李詵詣五臺請觀國師入京詵既至京裴公問曰清涼之遊樂乎詵曰風沙紫塞何樂之有且吾遭禪家虛誕之累矣吾聞清涼山文殊聖者所居其地風火不隳至其處者熱惱蠲除某五月至彼猛風摧浮屠僕兒患熱死而山僧每毆打諍訟其過不可勝舉安在其清涼無惱耶公曰甚矣子之謬也子持熱惱之心欲入清涼之界者猶披麻而度火欲其不燒豈可得乎夫清涼界者初非有外也不離當處物莫能閒無寒無暑匪形匪礙風吹不入雨灑不溼覰之者眼瞎聽之者耳塞故劫火不能燒毗嵐莫能壞無熱無災是之謂清涼界實非分別思量可能入也子持有心而入大似蚊子丁鐵牛蒼蠅投火聚不亦悲夫曰還許文殊入否答曰文殊者大智也智之大者到彼岸證離心念之妙智唯離念之智斯可以入矣謂大智光明即清涼不變清涼不變即大智光明非二物也子今欲入者當離心意識絕修證路勿以眼入乃至勿以意入以無生入無相入無我入無人入無一入無多入無閒入無入入如是入者拶透銀山衝開鐵壁偷心死盡求箇入的人了不可得到此方知舊來清涼非今始入也詵曰今聞子言頓覺清涼矣謝而退丞相張商英傳宋無盡居士張商英元祐丁卯春夢遊五臺金剛窟平生耳目所不接想慮所不到覺而異之時為開封府推官以告同舍郎林中林中戲曰天覺其帥并間乎後五月無盡除河東提點刑獄公事林中曰前夢已驗人事預定何可逃也勉矣行焉八月至郡十一月即詣金剛窟驗所見者皆與夢合但會天寒恐冰雪封途一宿遂出明年戊辰夏五臺縣有羣盜未獲以職事督捕盡室齋戒來遊六月廿七日壬寅至清涼山清涼主僧曰此去金閣寺三里往歲崔提舉嘗於此見南臺金橋圓光商英默念崔何人哉予何人哉既抵金閣日將夕山林漠然無寸靄僧正省奇來謁即三門見之坐未定南臺之側有白雲綿密如敷白㲲省奇曰此祥雲也不易得集眾僧禮誦願早見光相商英易公裳焚香再拜一拜未起已見金橋及金色相輪輪內深紺青色無盡猶疑欲落之日射雲而成既暝有霞光三道直起則所疑自釋癸卯至真容院止清輝閣北臺在左東臺在前直對龍山下枕金界溪北浴室之後則文殊所化宅也金界之上則羅睺足迹堂也知客䛒曰此處亦有聖燈舊有浙僧請之飛現闌干之上無盡遂稽首敬禱酉後龍山現黃金寶階戌初北山有大火炬䛒曰聖燈也瞻拜之次又現一燈良久東臺龍山羅睺殿左右各現一燈浴室之後現大光二如掣電金界南溪上現二燈亥後商英俯視溪上持燈者其形人也因念曰豈寺僧設此大炬以見欺耶是時䛒已寢即遣使王班秦愿等排門詰問䛒答曰山有狼虎彼處無人亦無人居商英始決又覩燈光忽大忽小忽赤忽白忽黃忽碧忽分忽合照曜林木即默省曰此三昧火也俗謂之燈耳乃跪啓曰聖境殊勝非我見聞凡夫識界有所限隔若非人間燈者願至我前如是十請溪上之燈忽如紅日浴海騰空而上放大光明漸至閣前其光收斂如大青喙銜圓火珠商英徧體森颯若沃冰雪即啓曰疑心已斷言已復歸本處光滿溪上愿等自旁見之如金色身屈曲而上妻孥所見又異於是有白領而紫袍者螺髻而跏趺者仗劍者戴角者老僧曰此金毛獅子及天龍八部也良久北山雲起於白雲中現大寶燈白雲既收復現大白圓相如明月輪甲辰至東臺五色祥雲現白圓光從地湧起如車輪百旋商英以偈讚曰雲帖西山日出東一輪明相現雲中修行莫道無撈摸只恐修行落斷空說是偈已大風忽起雲霧奔蒸如欲傾崖裂壑主臺僧曰巡檢下兵持肉燒煑今不可禁願來日屏去七月乙巳謝巡檢兵甲沈幣于北臺晚休于中臺大風不止四山昏晦䛒等失色臺側有古佛殿商英令灑掃攜家屬祈禮所與俱者䛒及臺主二人蒼頭四人北陟數步中臺之頂已有祥雲五色紛郁俄而西北隅開朗布碧琉璃世界現萬菩薩隊仗寶樓寶殿寶山寶林寶幢寶蓋寶臺寶座天王羅漢獅子香象森羅布濩不可名狀又於真容殿上現紫芝寶蓋曲柄悠揚文殊師利菩薩騎獅子復有七八尊者升降遊戲左右俯仰臺主戲曰本臺行者十九年未嘗見一光一相願假福力呼而見之既呼行者則從兵有潛隨竊見者矣日漸暝北臺畔有紅炬起商英問愿曰此處有何人燒火愿以問䛒䛒以問臺主主曰彼頑崖巨石且大風鼓山何火可停必聖燈也瞻禮之次現二金燈隔谷現一銀燈如爛銀色適會沿邊安撫郭宗顏遣人馳柬來商英指燈示之曰汝見否曰見曰為我謝安撫方瞻禮聖燈大風不可秉燭未及答柬於是再拜敬請願現我前先西後東一一如請末後西下一燈於紺碧輪中放大光明而來東西二燈一時俱至自北臺至中臺十里指顧之間在百步內遠則光芒近則收攝猶如白玉琢大寶盌內貯火珠明潤一色拜起之際復歸本所于時臺上之人生希有想慇懃再請連珠復至夜漏將盡寒凍徹骨拜辭下山東燈即沒二燈漸暗商英曰雖已奉辭瞻仰之心何時暫釋發是語已於一紺輪中三燈齊現如東方心宿紺輪之外紅燄滿山是夕大風達丙午昏霾亦然商英自謂曰昨夜中臺所見殊勝如此今日當往西臺菩薩豈違我哉行至香山則慶雲已罩臺頂沈幣已所見如初但無琉璃世界耳遂遊玉華壽寧寺還真容院郭宗顏及代州通判吳君偁五臺知縣張之才都巡檢使劉進保甲司勾當公事陳聿各以職事來集商英以所見告之雖人人稱歎不已未及親見也是夕清輝閣前再現金燈如初遣人白郭吳等五人同觀浴室後松上忽現羣燈如連珠諸君各叩額再拜頃之光隱眾散羅睺殿側現大白光如流星唯浴室後之松林白氣朦朧過夜分乃息丁未郭吳按東寨張之才還北天色亦大昏霾商英與陳聿及興善監鎮曹諝晚登梵仙山諝曰昨夕聞金燈現竊於公宇後見之聿問曰君所見處所安在諝曰在空中聿曰聖哉聖哉聿自高而視若在谿上君自下而視若在空中商英自以累日所求無不響應因大言曰為二君請五色祥雲即起更衣再拜默禱俄而西南隅天色虛朗慶雲絪縕紫氣盤繞商英曰紫氣之下必有聖賢請二君虔肅當現靈迹良久宮殿樓閣諸菩薩眾化現出沒商英啓曰願現隊仗使二人見言訖歘然布列二君嗟歎不已既暮欲去眴視之際失其所在二君曰聖哉聖哉若假雲氣而現者當隱隱沈滅豈遽然無蹤也哉其夕復止清輝閣念言翌日出山寶燈其為我復現乎抽扃啟扉則金界南谿上已現大炬浴室後三燈東西相貫起於松梢合為一燈光明照耀苒苒由東麓而南行及於林盡溪磧之上放大白光非雲非霧良久光中現兩寶燈一燈南飛與金界溪上四燈會集而羅睺足迹殿及龍山之側南燈一時同現商英即發願言我若於過去世是文殊師利眷屬者願益現希奇之相言訖兩燈揮躍交舞數四商英覩是事已發大誓願期盡此形衛護佛法所有邪淫殺生妄語倒見及諸惡念永滅不生一念若差願在在處處菩薩監護於是南北兩燈黃光白燄前昂後嚲騰空至前爾時中夜各復本處是日也商英先至羅睺足迹殿見其屋宇摧弊念欲他日完之其夜足迹殿所見燈光異即以錢三萬付僧正省奇修建戊申至佛光寺主僧紹同曰此解脫禪師道場也碑與龕存因閱碑中所載解脫自解脫文殊自文殊之語喟然歎曰真丈夫也以偈讚曰聖凡路上絕纖痕解脫文殊各自論東土西方無著處佛光山下一龕存日已夕見寺前慶雲紫潤成蕊問同曰此寺頗有靈迹否何因何緣見此瑞氣同曰聞皇祐中嘗有聖燈商英曰審有之必如我請問其方曰南嶺昏夜敬請嶺中果現銀燈一金燈二但比之真容院所現少差其己酉至祕魔巖未至之十里自臺有白氣一道直貫巖頭巖前恍若文殊乘金獅子現既至巖前則天色晦昧殊失所望有代州圓果院僧繼哲結廬於山之陽閱大藏經不下山三年矣即詣其廬問以居山之久頗有見否哲曰三年前巖上門開有褐衣黃衣紫衣三僧倚門而立久之復閉又巖間有聖燈哲聞而未之見也哲乃曰天色若此貧道住庵無狀致公空來空去雖然願得一篇以耀巖穴遂拂壁寫一偈云閱盡龍宮五百函三年不下祕魔巖須知別有安身處脫卻娘生鶻臭衫寫偈已出庵望見巖口有金色祥雲光彩奪目菩薩乘青毛獅子恍焉入於雲間若激電然商英曰今夕大有勝事必不空來也巖崖百仞嵯峨壁立率妻奴東向望崖再拜敬請逡巡兩金燈現於赤壁間呼主僧周同視之夜漏初下從兵未寢舉家歡呼人人仰見凡七現而隱周曰聖境獨為公現豈與吏卒共耶幸少需之人定周來白曰左右睡矣可再請也商英更衣叩請忽於崖左見等身白光菩薩現於光中如是三現商英得未曾有發大誓願如前唱曰我若於往昔真是菩薩眷屬者更乞現殊異之相言訖兩大金燈照耀崖石商英又曰若菩薩以像季之法付囑商英護持者願愈更示現言已放兩道光如閃電一大金燈耀於崖前流至松杪於是十寺主僧及其徒眾確請曰謹按華嚴經云東北方有處名清涼山從昔已來諸菩薩眾於中止住現有菩薩名文殊師利與其眷屬諸菩薩眾一萬人俱常為說法即我山中眾聖遊止不知過去幾千劫矣自漢明帝元魏高齊隋唐至五代歷朝興建有侈無陋我太宗皇帝既平劉氏即下有司蠲放臺山寺院租稅厥後四朝亦罔不先志之比因邊倅議括曠土故我聖境山林為土兵所有開畬斬伐發露龍神之窟宅我等寺宇十殘八九僧眾乞丐散之四方則我師文殊之教不久磨滅今公於我師有大因緣見是希有之相公當為文若記以傳信於天下俾後世之人以承菩薩所以付囑之意商英曰懇哉言乎人之所以為人者目之於色耳之於聲鼻之於香舌之於味身之於觸意之於法不出是六者今乃師之書曰色而非色聲而非聲香而非香味而非味觸而非觸法而非法則迥脫乎見覺聞知之表其膠聲固色區宇世相之徒不以為妖則怪矣且吾止欲自信而已安能信之天下後世耶已而郭宗顏吳君偁以書來言曰假公之力獲覩盛事自昔傳聞而未之見今皆驗矣宜有記述以信後人商英三思曰以聖語凡以寂語喧以妙語粗以智語愚以真語妄以悟語迷畛域不相知分齊不相及譬之阿修羅王手撼須彌山而螻蟻不能舉一芥迦樓羅王七日徧四天下而蟭螟不能飛尋丈商英非不願書懼言之無益也宗顏曰公如言之使天下後世知大聖之所寓歸仰企慕漸以覺乎長夜之迷其益大矣公必懼謗而不言是自私者所好非大士所以冥託之意也且公今欲避謗而自私乎欲作利益於天下後世乎苟能傳百而信一則傳千而信十傳萬而信百矣百人信之一人行之猶足以破邪宗扶正法況百人能行之乎商英曰善哉喻乎吾一語涉妄百千億劫淪於惡趣謹書之以附清涼傳後云耳是年八月傳既成以錦囊盛一本文疏一通遣人齎送至真容院文殊前表白其文曰昨者親詣臺山獲瞻聖像慈悲赴感殊勝現前慶雲紛郁於虛空寶燄熒煌於巖谷阿僧祇之隊仗不可說之聖賢大風昏霾愈彰瑞相赤壁峭崖更示金身商英直以見聞述成記傳庶流通於沙界或誘掖於信心使知我清涼寶山眷屬萬人常在金色世界天龍八部之同居叩梵宇以贊明冀導師之證察僧正省奇集僧眾八十有餘讀疏訖菩薩殿內忽現金燈四十餘盞商英聞之思仰愈切即自塑聖像十一月八日出按民兵八十賷像於真容院供奉發願其文曰一切處金色世界真智無方東北方清涼寶山幻緣有在無方則一塵不立有在則三界同瞻是以五體歸依兩淚悲仰伏念商英昔在普光殿內或於大福城東一念差殊四生流浪出沒於三千剎土纏綿於十二根塵以往善因值今勝事荷剎那之方便開無始之光明揣俗垢之已深恐慢幢之猶在託之土偶明此願輪三界空而我性亦空孰真孰妄十方幻而我形亦幻何異何同伏願菩薩攝入悲宮接歸智殿起信足於妙峯山頂資辯河於阿耨池中誓終分段之身更顯希奇之作讀文訖殿內現金燈三是日大雪雪止後五色祥雲徧空其夕清輝閣前羅睺殿左右現銀燈十四黃嵬嶺上現大白光三翌日五色雲自辰及申盤繞不散至夜雪作商英祝曰昨日銀燈光燄微細與六七月所見不侔豈商英黑業所招抑聖賢變化亦有春夏秋冬之異嘗聞諸佛諸大菩薩身光蔽映魔宮猶如聚墨若隨時小大則一大藏教乃是虛言於是閣前雪中見向所現大金光三商英即踊躍拜辭曰大雪現燈非所求也命開菩薩殿取前傳續書所見於後既開殿愛慕不能自已又祝曰待罪本路儻未罷去明年五六月乃可再來一瞻光相滿願而去良久於閣前再見大金光四明年夏六月以并亢旱詣山祈求雨澤因安奉羅睺寺菩薩聖像乙巳平旦至中天閣東南林麓忽變金色有青赤光直起鮮明奪目移時乃隱日晚金山有五色異氣為菩薩騎獅子之像丙午至真容院具威儀迎所安羅睺寺聖像比至寺門而報者曰殿中燈旦現矣既謁菩薩瞻仰之次頂上寶蓋忽爾明朗主殿僧曰此殿旛蓋無數掩蔽稠密而頂蓋最高隱莫能辨今爛若此未之有也是夕東臺暨羅睺殿左右現十餘大金燈往來上下或移時或移刻或良久丁未詣菩薩前白言華嚴經中世尊八處放光表法此光若是法性本有無相之光視之不見則商英不疑若是諸佛果德圓滿之光使人可見則願為示現於是頂上寶蓋忽然通明孔隙流光迸射四出已而襟領間如意間各放寶光燁燁閃動又於殿前金蓮華葉燈燄交輝開合無數是時遠近僧俗千數雲集呼而視之歡呼震動繼以悲淚各各歎言無始已來罪戾深重請從今日改往修來戊申詣中臺日將暝四山青黯忽有異氣橫跨北臺山如爛銀刻畫長十丈眾呼銀橋現商英曰非也此殆白銀階道聖賢所遊躡者俄而現寶燈一分而為二時有遊僧十數人已歸臺屋止宿呼而視之眾僧禮讚不已商英曰此處當有三燈各各諦視良久三燈齊現商英取續傳示之曰吾去年所書如東方心宿豈妄語耶己酉太原僉判錢景山及經略司管勾機宜文字邵壎來會於東臺而商英已還真容院即遣人招二君還二君曰適已於東臺見圓光及攝身光但未見聖燈也是夕遂與二君祈燈而觀焉庚戌宿佛光寺祥雲異氣繽紛無數辛亥往祕魔巖未至巖之三里直光現既至巖而盧舍那佛面門光放照耀滿殿初夜於層崖間現大金燈五壬子出巖於空中現金橋一此橋不依山谷不依雲氣不假日光亙空黃潤如真金色嗚呼當處出生當處入滅非大幻善巧方便其孰能預於此哉是行也既以亢旱祈雨在山三禱三應但須臾即霽癸丑還至代州大雨彌日將槁之苗變為豐歲商英即以其事奏聞其略曰臣近以本路亢旱躬詣五臺山文殊像前及五龍池祈求雨澤晝夜所接靈光燄燄殊形異相赫奕顯耀莫可名狀是時四方僧俗千餘人同共瞻覩歡呼之聲震動山谷已而時雨大降彌覆數州臣之始往草木萎悴農夫愁歎及其歸也木麻蕎菽青綠生動村落謳歌指候大稔此蓋朝廷有道眾聖垂祐有司推行詔條布之於名山異境其應如響勘會五臺山十寺舊管四十二莊我太宗平晉之後悉蠲租賦以示崇奉比因邊臣謾昧朝廷以其地為山荒遂摽奪其良田三百頃以養鄉兵因此僧徒分散寺宇隳摧臣竊以六合之外蓋有不可致詰之事彼化人者豈以土田得失為成與虧但昔人施之為福田後人取之養鄉兵於理疑若未安欲乞下本路勘會如臣所見所陳別無不實即乞檢會累奏早賜施行是歲承旨還田僧寺雖然如是彼大士以十方三界為一毗盧遮那座體而商英以區區數百頃田浼之其志趣狹劣不亦悲乎朽庵曰夢中說夢夢中喚醒寐人光外尋光光外識得本性此天覺張公欲以文殊大覺之道而覺後世未信未覺之徒期至等覺妙覺者也吁繼天覺而遊清涼者可不篤信而覺踵先覺之芳躅歟或謂大士固聖且靈豈獨天覺一人從心所禱而輒應之耶是必其好事而自為之也愚曰天覺參兜率悅曾觸翻蹋牀眼空佛祖見出常流豈區區以幻相縈惑於世哉將與大聖有夙緣而會契之耶抑德重垢薄故易致斯應耶是必有以真知灼見固不得已而形於言誠不可以凡情迷識而窺測之也祁陽太守傅其瓘傳宋元祐間傅其瓘守祁陽一夕夢五塔陵空其色紺碧紫衣數十列拜於前瓘亦從之瞻望久之既覺則以為思慮所致耳目未接之境現乎精神矣默而志之無何張無盡行部過郡以所撰清涼記出示瓘覽之竊以為誕焉是歲五月遷副綏之任假道五臺既登絕頂天氣清明涼飆吹衣極目千里了無片雲命僧禮誦祈瑞竟日無覩瓘謂德明長老曰僧不誠乎聖不靈乎久祈無應何也明曰昔者文王作而鸞鳳儀仲尼興而麒麟至天地禎祥必待其人而兆也且夫大人者信己而後信民況大聖乎公心且疑而欲希靈瑞則誤矣瓘承誨大慙懺謝不一乃與僚友二人齋心肅容冥祈聖應移時夕陽落山晚雲橫谷望臺東畔則有圓光人之徘徊舞蹈皆現其中瓘以為雲日相映而現故不為奇至夜魂清不寐星河湛湛夜景寥寥共十餘僧經行臺上相與長跪禮誦佛名經未訖有大月輪光現於石上咫尺之間從者未之見也移時乃隱余以是而諦信焉即命刻石於叶斗之陽以示後之君子知余讀聖賢書者言不自欺也吳興錢蓋傳宋建中靖國元年吳興錢蓋受命守河東六月自鴈門趣定襄三日至臺山真容院與樂安任良弼太原王直方偕是夕於法堂前設香案祈靈瑞至子夜四望黤然二子怠曰山間城市一天地也彼既無靈此曷獨有拂袖而起入室而寢蓋亦就榻披衣而坐俄而當軒一燈其色如銀遽呼二子其寢已沈出而視之闃然無迹須臾圓光狀若金盤現於松杪及三禮而隱唯余童子及老衲覺幻同見諸人皆寢焉明日告二子二子色慚自責曰某誠不至故耳五日登東臺眾皆至誠唯覩慶雲變態萬狀六日由北臺至中臺烈日無雲相與齋心虔禱久之忽爾白雲停岫空澄若水有大圓光懸於空際中有寶座玉樹芝草之狀任公見樹王公見芝草蓋與童子三物俱覩至夜更肅至誠禱祈中夜有黃金橋現于雲際見一獅子厥色若銀奮迅而過移時大風卒起黑雲蔽空諸子焚香長跪于文殊像前俱發誓言某等而今而後歸命三寶為護法城惟文殊大聖常相攝受七日至真容院諸子皆傾囊設供禮謝而去移剌楚才傳元丞相移剌楚才道號湛然居士得法于萬松老人嘗請萬松評唱天童頌古公為之序其略曰佛祖諸師埋根千丈機緣百出隨處生苗天童不合抽枝萬松那堪引蔓湛然向枝蔓上更添芒索穿過尋香逐氣者鼻孔絆倒行玄體妙的腳跟向去若要腳跟點地鼻孔撩天也須向這葛藤裏穿過始得其見諦玄談蓋如此先是元世祖將西征有司奏五臺等處僧徒有能呪術武略及有膂力者為部兵扈從西征楚才止之曰釋氏之高行者必守不殺戒奉慈忍行故有危身不證鵝珠守死不拔生草者法王法令拳拳奉行雖死不犯用之從兵豈其宜哉其不循法律者必無志行在彼既違佛旨在此豈忠王事故皆不可以從王師也帝從之大夫蕭守中曰沙門不征不役安坐而食耗國累民必此類矣請除之楚才曰人之生也萬事天定于未生之前故人力不能加損與奪于既生之後世有辛苦而飢餓者有安逸而飽足者修短苦樂壽夭窮通萬狀不齊雖孔明之智項羽之勇顏回之賢尼父之聖亦不能移其毫髮豈彼沙門能窮吾民耗吾國耶故萬物係天天與則生天奪則死沙門亦天地間一物耳其亦天養之也天且宥之子獨不容隘亦甚矣守中曰釋者不自生活從民乞食民與則飽不與則飢猶乳母之哺赤子公言天養不亦謬乎楚才曰今夫赤子咽疾不能下食母能乳之乎富貴之家列鼎而食一朝疾作粒米不度非天命乎農夫之家早春耕植盛暑耘鋤秋未熟夜霜殺禾民飢而死故歲豐民不疾而後得養乃天養也故天之于物不揀夷狄禽獸使各遂其生各得其養此其所以為天也大君子當處心如天可也今子病斯類而欲除之恐天將病子而奪之子將柰何哉李文進傳明總督宣大都御史巴蜀李文進初在部時嘗以釋氏為異端請除之上未之從歸而不樂者久之方山人者見而問曰公色不豫何慮乎公曰事有未遂余心耳某幼時始讀聖賢書即知釋氏之教有蠹於聖道者誠可疾矣不達則已達則必除之今既達矣復不能除將柰何哉方曰大哉君子之用心也憂夫聖道之賊為萬世斯民之害與憂國財不充賊盜不弭者亦霄壤矣敢問夫子今欲除釋必嘗閱其書而其為吾聖道之蠹者果何云乎哉公曰吾聞晦翁之說以為異端虛無寂滅之教據虛無寂滅豈不為仁義忠信之賊乎方曰甚矣夫子其不自重也柰何以皓皓之明而蔽囿於他人之一言乎且余聞之釋氏毗盧有萬德普賢有萬行安在其虛無寂滅耶今夫子必欲除之當熟玩其書果無一善可取力以除之則天必助其成功而無所取誚於天下後世也公然其言退閱佛書過三月謂方曰荷子之誨得見大聖人之心法與吾聖人曾不少異而尤深切著明矣且夫佛謂眾生心者亦名如來藏義有空不空所謂空者從本以來無私欲之染無物累之患廓然大公虛寥沖漠者也所謂不空者真體無妄中實靈明淨德滿足者也然空與不空初非二物唯吾一心耳朱子所謂虛無寂滅者但見其空而不識不空之德也昔者程子以仁義禮智四者為性具且曰天命理賦今觀佛旨如來藏中固有河沙性德妙善則不啻四者而已矣天地萬物固吾心光影則天理本我心非我自天也大哉旨乎非出世大聖何以及此吾常以為天地生我今知我生天地矣方曰夫子破格矣他日見道固不難也嘉靖辛酉公將命總督宣大為道之心日切思有以抉其膜者詢諸方山人山人因遊五臺山值楚峯和尚有道僧也請詣雲中會於公館公以昔悟告之峯曰噫公見影矣若吾法王之心猶未夢見在公聞之悚然曰法王之心若為可見耶峯曰公欲究法王之心必極其空而後可以契不空之德不然則為物欲塞矣情愛蔽矣念緒紛紜生滅流注昏瞢汩沒未有了時尚何見法王之心法哉公於是修空三昧六月目不受色耳不受聲鼻不受香舌不受味六情悄然運動如偶一日聞秋風落木聲忽爾念盡廓然大空楚峯一日見而問曰公於斯道信乎公曰祇是箇李文進更信阿誰峯曰夫子信矣先是永樂間上勅五臺十寺為國祝釐上以山寒地僻五穀不生乞化唯艱命該縣月給僧糧至嘉靖初有司以為僧無勞而食國遂約令從軍役不數年寺廢僧殘梵宇為墟時兵部侍郎昌邑葛公縉銜命雲中聞臺山之廢行帖山西道以為沙門從軍非兵利遂罷之及葛公退任奸吏弄權復役諸僧至是年釋楚峯訴之李公公曰澗飲木食固僧之宜既食國食寧逃國役遂行帖山西道糧役俱免焉明高胡二公禁砍伐傳自古相傳五峯內外七百餘里茂林森聳飛鳥不度國初尚然爾後諸州傍山之民率以伐木自活日往月來漸砍漸盡川木既窮又入谷中千百成羣蔽山羅野斧斤如雨喊聲震山寒巖隱者皆為驅逐奪其居食其食莫敢與之爭當是時清涼勝境幾為牛馬場矣然興廢相尋無往不復萬曆庚辰間東萊順庵胡公來貢守河東道視兵鴈門因登清涼冥識聖境目擊其廢即有感焉於時巴蜀鳳渚高君文薦巡撫山西胡公歸郡因白之高公公具本題准嚴加禁革砍伐乃寢其題本云臣竊照山西自平刑以抵偏老為邊者千有餘里東則車輔雲朔西則比鄰虜巢總之華夷之限一山之隔耳所幸北樓寧武之間林木蔥鬱資為保障而五臺一山重岡深樹恃為內藩父老相傳謂兩山之樹往者青靄相接一目千里即為胡馬跳梁曾不得一騁而去今砍伐殆盡所存者百之一耳自前巡按賀一桂題請申飭之後人心稍稍斂輯而弊端尚未盡絕蓋在北樓一帶則大同渾應居民莊窩盤據以砍伐為本業詰之則連逮黨眾不能盡舉而置之法稍稍治其首惡而餘者又復放縱如故且渾應州官秦越異視往往護其奸民輒歸罪於山西之緝捕者五臺則奸商視販木為奇貨往歲依山取利每年動以萬數今自題禁之後各商垂涎舊事心未遽已年年以搜買舊木為名乃私竊砍伐希圖夾帶且深山之中人迹罕至舊無設官而山寺僧官勢力微弱又不能與之抗衡是以奸商之輩夏則千百為羣肆行竊取秋則假買舊木因之駕運在官府以為舊木業已出山無用之物矣與其以天地之材任其朽敗而無用孰若稍稍變價取千百之利以濟邊殊不知舊木非天降地涌何以歲歲不絕而此輩知有變賣舊木之例轉相砍伐何有已時臣自去年稔知此弊是以嚴行禁止一切寸木不許變賣此輩不遂其奸又或投託勢要廣布大言假以真定抽印以供造辦為因且供造辦與固邊疆孰重損其所重益其所輕非所以為國也矧抽印之木民十公一耳內不足以充其材具外有以虛其邊防而奸商勢要藉以抽印大言恐嚇以致官司莫敢誰何臣看得地之所恃以為險要者山也山之所依以為屏蔽者木也今邊疆為蠹者有二焉礦夫穴山奸民伐木而邊臣徒知穴山為患而禁之不知伐木為患尤為大耳況五臺一山為天下名勝而今萬阜童童矣又何名勝之有種弊已久材木將盡然猶三年之病可及畜艾時也若復姑息不為嚴禁將來孰任其咎且無根之民不務稼穡伐木苟延山木有盡歲月無窮豈以為久常之計為今之計在北樓則備行渾應二州無籍人等盡行驅逐而兩州掌印官亦當以邊疆為重不許黨護編民別生異議其在五臺僧官巡檢帶領弓兵日夜巡緝一有奸商豪勢砍伐入山擒獲赴道以憑問罪以後不論新木舊木不開變賣之端但有一木出山至河川者即坐本官以賣放之罪奸商勢要不得假抽印之名復滋砍伐庶乎事有責成人無異念而封疆藉以永固矣伏乞皇上軫念邊防屏固久弊勅下該部再行查訪速賜題覆俯從末議施行等因奉聖旨兵部知道准議施行明鴈平道張惟誠清糧傳萬曆辛巳聖旨丈田畝清浮糧以蘇民困有司因觀五臺山地前此未有徵稅今亦應與民同編徵糧等因於時永清張君字豫吾守鴈門申帖云看得五臺山寺俱係先皇勅建祝釐之所其地原非縣民額田曾無徵糧事例況俱瘠薄山岡陰寒陡磵春回暑際霜落秋前五穀不生其窩陽之處草麥半熟居山之僧多食瞿麥而籍僧不過百數餘皆四方來遊依山暫住今欲與民一體編派理必題請一入縣額僧輸不前必致逃竄得其稅不足以裨國儲貽其害適足以累百姓且聖旨欲清浮糧今無度更張是不應也由此撫按准議施行該縣五臺山仍舊免徵稅由是僧行安生矣明吏部尚書陸光祖傳陸光祖平湖人弱冠閱藏教於文殊本智有深契遂以五臺稱之以自誓也邇來爵位日隆而信心彌固門庭嚴正不容謁客唯屬三寶因緣無拒焉凡佛法之難不避危嫌力以護持嘗臥病不食者數日僧有為勢豪所困欲奪其寺為塋地者求救公即起手為數書委曲縫掖不知其病也家人諫曰衰殘若此奈何不自愛耶公曰我非三寶力安有今日萬曆辛卯春以致仕歸田假道清涼稅駕龍泉寺紫柏尊者遣開侍者謂公曰昔東坡居士對佛印一籌不及輸玉帶以鎮山門今奉紫柏命有一問答得即與相見答不得則傚東坡故事耳問曰盡大地是箇清涼言未已公以手掩開口曰老夫未出部庭早輸此帶了也用問奚為即度帶與開開曰先生鼻孔得恁麼長公曰莫謗人好舉似紫柏柏曰這老漢申東坡老子四百年來之冤即遂與相見贈八大人覺經并偈帶留紫霞谷之妙德庵焉文震亨傳明崇禎辛巳中翰文震亨字啟美吳縣人奉差齎大同兵餉謁見代藩即入山頂禮曼殊聖像與山中耆宿蘊真律師有舊偕遊祕魔巖虔禱於大士矢願求龍神現身巖下有二小潭如盂滴泉注之住持代為宣疏訖俄頃於上潭現二龍一蒼一白下潭龍現不計其數大若巨鍼而鱗角畢具夭矯騰躍水為汎溢良久兩潭俱空無所覩矣驚歎希有作五臺遊記以敘其神異傾囊營建道場於真容院七日圓滿復覩金燈七盞懸於松杪如斗杓然蘊公亦吳人為歷敘累朝使命及內臣至者龍現大小身者非一身大至尺許即有風雨隨之惜乎失紀其全耳法運之隆雖係於時必藉有力大人而維持之是以名公巨儒游心冲澹寄迹青雲忠輔聖明仁匡佛化其夙昔之悲願乎抑文殊之影響乎而乃持法輪於既墜存聖境於將殘至德神功誠不可測也附錄妙峯大師募三名山大士像并銅殿事略按明妙峯福登禪師福慧洪深誓願廣大一生所作大功德莫能殫述素願造滲金文殊普賢觀世音三大士像并銅殿送五臺峨眉普陀以供養之于萬曆二十七年己亥杖錫潞安謁瀋王王適造滲金普賢像送峨眉矣師言銅殿事王問需金若干師曰每座須一萬金王願造峨眉者即具資送師往荊州監製殿高廣丈餘滲金雕鏤佛菩薩像精妙絕倫殿成送至峨眉大中丞王霽宇撫蜀聞師至請示心要遂發心助普陀者乃采銅於蜀運荊鑄造及成運往普陀至南京逢普陀僧力拒蓋恐海寇悞認為金防搶劫耳因卜地寶華山時寶華頗衰敗遂奏懇勅修得以安置師又募五臺者于三十三年春躬送至山議安顯通寺又蒙勅修其寺趙吉士寄園寄所寄中謂陳太后勅四川造三座者傳聞失實耳今略撮其事附錄於此俾後世知其大略云憨山夢遊集妙峯傳
