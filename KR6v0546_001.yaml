body:
  text: 第一總標化宇神州莽莽幻境紛陳衆生藝藝夢魂顛倒況乎區分六道形殊四生同酣火宅之嬉遊遂致苦輪之長轉倘非大聖乘權現身弘護不幾貧兒客作沒齒無歸乎能識心無不在竟虛空以為軀即知智罔弗通透山河而作眼機用絶思議之表建立闡顯密之樞自性毗盧流出五峯矗峙現前覺海結成三昧清涼揆厥根株非為別有藉茲鉛槧永用光揚志化宇東震旦國清涼山者乃曼殊大士之化宇也亦名五臺山以歲積堅冰夏仍飛雪曾無炎暑故曰清涼五峯聳出頂無林木有如壘土之臺故曰五臺雄據鴈代盤礡數州在四關之中周五百餘里左鄰恆嶽秀出千峯右瞰滹沱長流一帶北陵紫塞遏萬里之烟塵南擁中原為大國之屏蔽山之形勢難以盡言五峯中立千嶂環開曲屈窈窕鎖千道之長溪疊翠回嵐幕百重之峻嶺巋巍敦厚他山莫比故有大人狀焉其間鳴泉歷歷萬壑奔飛嘉木森森千巒彌布幽涵神物滀泄雲龍縈紆盤據無非梵行之棲隱顯環匝盡是真人之宅雖寒風徑冽瑞草爭芳積雪夏飛名花競發白雲凝布奪萬里之澄江杲日將升見一陂之大海此其常境也若夫精心鑽仰刻意冥求聖境靈區有時而現或神燈觸目或佛光攝身或金閣浮空或竹林現影金剛窟裏列聖森森百草頭邊神光赫赫披雲撥霧或登物外之天躡險捫蘿每入非常之境實百靈之冲府乃萬聖之玄都其間靈境有不可得而名言狀示者不思議界非人間也徵其源也乃曼殊大願之所持如幻三昧之所現無方無體非色非空觸類而彰隨緣而顯矣故得染烟嗅氣咸資般若之光觸石沾雲悉植菩提之種華嚴大疏云自大師晦迹於西天妙德揚輝於東夏雖法身常在雞山空掩於荒榛應現有方鷲嶺得名於茲土神僧顯彰於靈境宣公上稟於諸天漢明啓兆於崇基魏帝中孚於至化北齊數州以傾供有唐九帝以回光五天殞命以奔風八表忘軀而競託自非大士慈雲彌漫智海汪洋廓法界以無疆盡衆生而為願孰能感應若茲其有居神州一生不到者亦奚異舍衛三億之徒哉願皆修敬焉或問域內名山有五東曰泰山南曰衡山西曰華山北曰恆山中曰嵩山是為五嶽上古帝王四時巡狩則臨四方之嶽以時祀之而泰山梁父為四嶽長故稱岱宗自古帝王于茲封禪焉載諸經史詳矣今曰文殊大士居清涼山而令海內傾心於茲蘄嚮亦有何據乎答於修多羅有良證耳故大華嚴經云東北方有處名清涼山從昔已來諸菩薩衆於中止住現有菩薩名文殊師利與其眷屬諸菩薩衆一萬人俱常在其中而演說法斯言猶漫又寶藏陀羅尼經云佛告金剛密迹主言我滅度後於南贍部洲東北方有國名大震那其中有山名曰五頂文殊童子遊行居住為諸衆生於中說法及有無量天龍八部圍繞供養等斯言審矣此外自古及今神人顯彰甚多略引數條一漢明帝時摩騰法蘭者四果聖人也始至此土以天眼觀即知此山乃文殊住處兼有育王所置佛舍利塔二宇文周時有化人來遊此土云禮迦葉佛說法處并往清涼文殊住處至山現文殊像殞空不見隨者乃知文殊化身三唐初師子國僧九十九夏三果人也跣足而來禮清涼山四唐道宣律師行超三界道重百靈感諸天人常侍衛焉嘗問諸天冥遠之事無不明答乃知清涼文殊所居上皆出感通傳故藍谷云此土名山雖嵩岱蓬瀛皆編外典未有若清涼出於金口傳於龍藏宅萬聖而敷化自五印以飛聲美曜靈山利周賢劫者也問有云劫火洞然此山不壞言非妄誕者乎以今觀之山石之崩隤林木之代謝擊之則裂火之則灰安得三災而不壞也答化相則壞真相不壞故法華云大火所燒時我淨土不毀如身子見娑婆丘陵土石斯可壞者也螺髻見如自在天宮斯不可壞者也問真之與化相去幾何為一為異一則真應同化粗弊可壞異則真居化外應非人間答真之與化非一非異如鏡中像既非是鏡亦非離鏡有像可得如夢所見雖非本身然離本身無別夢境故楞嚴云譬如目眚矚燈光中別現圓影彼非眚人則無所見以況衆生以無明故妄見山河諸有為相聖則不見又如入法界品中如來入師子奮迅三昧逝多園林即有無盡功德莊嚴二乘在會不見不聞乃至云如是皆是普賢菩薩智眼境界不與一切二乘所共以是因緣聲聞不見等是知真界無殊悟迷斯隔推此可知清涼真化矣據上所辨真土無邊獨曰此處不壞者欲令歸心專一又如窺一隙之空即見無盡之空也第二略紀化主分十七佛未出世天生大德以為師九世祖瞿曇人仰能仁而秉教過去是龍種上佛現在即摩尼寶積為無量數諸佛之母現十瑞相妙德之身色等紫金圓明映徹毫同白玉光網莊嚴或稱為童子或喻作小男蓋登妙高之峯信為基址發菩提之樹智乃根芽大士寄位在信表德屬智故也鎔頑鐵而作精金示本明而非新得化秉聖基智原德母志化主一原聖或問常夫之謂凡通明之謂聖曼殊大士凡歟聖歟答究論法身尚不名聖豈得謂凡今就應迹是聖非凡也問聖有世出世異洞明物理德被黔黎精一傳家至仁修己此世間聖堯舜周孔是也永離生死證大涅槃慈育四生光含三有此出世間聖大雄氏等是也曼殊師利是何聖耶答出世間聖非世間也問出世之聖亦有四焉一曰聲聞聞四諦法厭苦斷集修道證滅者也二曰緣覺觀緣變易自覺無生者也三曰菩薩萬行圓修自他兼利宅心法界德用難思者也四曰如來朗萬法之幽邃覺大夜之重昏纖塵淨盡萬德圓明者也於斯四者文殊大士當何聖耶答久成第四示居第三者也問何所據耶答首楞嚴三昧經云佛告迦葉過去久遠無量無邊不可思議阿僧祇劫爾時有佛名曰龍種上如來十號具足於此南方過千國土有國名平正地平如掌龍種上佛於彼國土得無上覺乃至云彼佛即文殊師利法王子是也又處胎經云昔為能仁師今為佛弟子二尊不並化故我為菩薩此皆已成正覺現處菩薩也又央掘經說北方有國曰常喜彼土有佛曰歡喜藏摩尼寶積即文殊是此則現成正覺者也又悲華經言阿彌陀佛為轉輪王時第三王子名曰王衆於寶藏佛所發阿耨多羅三藐三菩提心願於來世行菩薩道無有齊限莊嚴佛剎令三千大千世界恆河沙等十方佛土為一佛剎大寶填廁又無惡觸及諸女人及其名字亦無聲聞辟支佛等一生菩薩充滿其中佛即號為文殊師利於未來世南方世界名曰清淨無垢寶填成阿耨多羅三藐三菩提號普現如來問準寶積經說文殊於未來成佛名曰普現混無量佛土為一淨土以彌陀淨土比之不啻大海毛滴耳則未來實成過去乃因中示成也答據實而論過現當來或因或果無非隨宜示現攝化羣生在本則無成無不成無現無非現不可得而名言矣二釋名問菩薩何故名文殊師利答至人無名名所不能名也今以無名之名隨德立稱耳文殊師利或云曼殊室利梵音楚夏也此云妙德亦云妙吉祥以萬德圓明皆徹性源故稱妙德生有十徵見聞獲益故稱妙吉祥也十徵者菩薩誕生時現十種徵一天降甘露二地涌七珍三倉變金粟四庭生蓮華五光明滿室六雞生鳳子七馬産祥麟八牛生白澤九豬誕龍豚十六牙象現是也三生緣問文殊大士示生何地誰氏之子功德神用說法利生歸真返寂之事可得聞乎答淨法界身本無出沒大悲願力示現受生故文殊般泥洹經云佛告跋陀羅此文殊師利以大慈悲生此國多羅聚落梵德婆羅門家其生之時家內屋宅化如蓮華從母右脅而生身紫金色墮地能言如天童子有七寶蓋隨覆其上十徵如上多羅聚落即舍衛國佛正在此說故又準華嚴經云東方去此界十佛剎微塵數世界有世界名金色其佛名不動智文殊大士將十萬菩薩從彼而來據此則為遊方大士故知法身一為無量無量為一即此即彼非一非多不可得而思議矣四德相言德相者因功浩渺果德難思備諸藏教今略示一二以識端倪文殊般泥洹經云文殊具三十二相八十種好則相好同佛矣又華嚴入法界品舍利弗告諸比丘汝可觀察文殊師利清淨之身相好莊嚴一切人天莫能思議汝可觀察文殊師利圓光映徹令無量衆生發歡喜心光網莊嚴滅除衆生無量苦惱乃至云汝可觀察文殊師利曾供養佛善根所流一切樹間出莊嚴藏諸世間主雨供養雲以為供養一切如來將說法時白毫相光來照其身等又彌勒菩薩告善財言文殊師利所有大願非餘無量百千億那由他菩薩之所能有善男子文殊師利童子其行廣大其願無邊出生一切菩薩功德無有休息善男子文殊師利常為無量諸佛之母常為無量菩薩之師教化成就一切衆生名稱普聞十方世界等其文甚廣皆菩薩德相也五神用言神用者如聖智怖心聞聲揚而劈地寶藏經云東方光相佛弟子名聖智說法第一立于有頂說法聲蔽大千文殊至彼立光音天說法其音普震大千世界魔宮振裂惡道休息聖智比丘聞是聲已即驚怖尋便劈地不能自持譬如猛風吹于小鳥即墮人間因問彼佛佛答文殊大士至此威德殊絶非爾曹所及與文殊論義聖智屢屈寂順思覩入隱身而立空寂順思見文殊文殊不起本座入隱身三昧即于彼前空中而現帝釋欣喜雨天花而至膝經云諸天子欲見文殊神變文殊身遍三界現神變已天子歡喜發菩提心雨天花至膝以為供養弊魔愁憂行拄杖而垂泣如幻三昧經云善住意天子白文殊同見佛文殊現三十二部交絡重閣有諸菩薩先至佛所身子覩變問佛佛答文殊住降毀諸魔三昧將至佛所于是文殊住是三昧時大千世界百億魔宮一時皆敝不樂其處各各懷懼時魔波旬自見老耄羸毀少氣拄杖而行宮人彩女亦復羸老宮殿崩壞虛空暗冥波旬大怖身毛為豎心自念言此何變怪令吾宮殿委頓乃爾將命終盡天地遇災劫被燒耶時魔波旬斷除貢高捨惡思想文殊所化百億天子在交絡者住諸魔前謂魔波旬莫懷恐懼汝等之身終無患難有不退轉菩薩大士名文殊師利威德殊絶總攝十方德過須彌智超江海慧越虛空今入降毀諸魔三昧是其威神時魔恐怖見化菩薩即求救濟菩薩言汝可往詣釋迦佛所有無盡慈悲令汝無畏言訖不見魔即詣佛請救云我等聞文殊名即懷恐怖畏亡身命佛即廣讚文殊魔欲求脫佛令待文殊後文殊至佛令捨魔文殊問魔汝惡此身耶魔答云爾若爾當厭離貪欲不住三界魔敬從命即復本形此降魔神用也劫火燒剎蹈水芝而上行寶篋經云舍利弗曾與文殊遊諸佛土有佛國土劫火洞然文殊神力自然蓮華遍布其中蹈上而行水芝即蓮華也霖雨絶供化鉢飯而無盡寶篋經云佛在舍衛八百比丘萬餘菩薩連雨七日不能行乞阿難乞文殊濟衆文殊在室為釋天說法不起本座入城乞食魔蔽檀門文殊神力令門俱開令魔唱道當施文殊得福無量既得食已以鉢置地令魔持行魔不能動曰我之神力舉沙陀山今此小鉢盡力不舉文殊取鉢授魔令持前行歸祇陀林無量大衆悉令飽足飯無所損示多身以抗迦葉世尊自恣日文殊三處過夏迦葉白槌欲擯出才拈槌乃見百千萬億文殊迦葉盡其神力槌不能舉世尊問曰汝擯那箇文殊迦葉無對放一鉢而發本源佛在祇桓精舍二百天子學菩薩業未就不任勤苦心欲退還求二乘道佛即化一人持鉢飯奉佛文殊白佛當念故恩分我鉢食佛置鉢入地下度七十二恆沙佛土懸于空中佛令諸阿羅漢菩薩各入多三昧求鉢不得後命文殊文殊不起本座申莊嚴臂度七十二恆河沙界取鉢而上彼界菩薩疑問彼佛佛答文殊神力于是取鉢彼菩薩欲隨文殊來彼佛頂光上燭娑婆所經世界皆有多菩薩隨來廣聞法要末發其本曰過去無能勝幢佛出世比丘乞食見乳母抱一兒兒見沙門即喜下抱趣之沙門分兒蜜兒噉之又隨沙門索復與之且行且索遂至佛會兒見佛喜從沙門乞蜜奉佛沙門授鉢蜜兒即奉佛發菩提心彼時比丘者今文殊是小兒者如來是我以比丘蜜食故今得成佛詳大藏毀字函普超三昧經持異身而說妙法寶上天子語文殊令內波旬于腹中免彼向行人作難文殊不爾欲令波旬處獅子座如佛妙辨說法魔即欲隱文殊神力所持卒不能去變身如佛處座說法舍利弗歎羡文殊知之告曰吾能持一切草木樹林無心之物變相說法皆如佛也舍利恐文殊變己如佛戲弄於我欲隱去不能文殊神力即變舍利弗成佛與波旬酬酢宛如二佛廣說深法三萬人發菩提八百比丘成道詳大藏大字函第七卷化火網以返迷途文殊一時說甚深法所謂不用見佛不用求法等二百比丘不了第一義諦以為錯亂說捨佛而去文殊即於中道化作大火比丘欲以神足飛空上見鐵網生大恐怖回視祇園道徑遍布青蓮華比丘即回佛會禮足白上所見佛告比丘內火未盡欲度外火無有是處汝諸比丘墮在見網欲度鐵網亦無是處乃至云此之見愛無所從來亦無所至從妄想生無我無我所等二百比丘聞是法已餘漏永盡成阿羅漢詳寶篋經掌握恆沙之剎毛吞無盡之海如斯神用劫舌難宣備諸龍藏不能俱引佛告善勝天子文殊童子所有威神如我所知無有量也所謂能令恆沙國土莊嚴一土中現能令恆沙佛土聚為一處斷送上方恆沙界外不足為難能以一毛內十方海衆生不覺能以十方國土內芥子中衆生不嬈等天子我於一劫若一劫餘說其神變猶不能盡文殊即入神變自在王三昧現如上事魔乃發菩提心六法要其說法者一代時教不共般若一乘性宗皆文殊大士激揚酬唱備諸龍藏不能廣引今托其要略數條冀為道者各銘心焉觀佛三昧海經言時世尊為諸大衆說觀佛三昧已文殊菩薩復告大衆言過去寶威德如來時有長者子名曰戒護在母胎時受三歸依年至八歲父母請佛於家供養童子見佛安行徐步足下生華有大光明見已歡喜為佛作禮禮已諦觀目不暫捨一見佛已即能除卻百萬億那由他劫生死之罪從是已後恆得值遇百億那由他恆河沙佛是諸世尊皆說如是觀佛三昧其後有百萬佛出皆同一字名栴檀海時彼童子親侍諸佛閒無空缺禮佛供養合掌觀佛觀佛功德因緣力故復得值遇百萬阿僧祇佛從是已後即得百萬億念佛三昧得百萬阿僧祇旋陀羅尼既得此已諸佛現前說無相法須臾之間得首楞嚴三昧時彼童子受三歸依一禮佛故諦觀佛相心無疲厭由此因緣值無數佛何况繫念具足思惟觀佛色身時彼童子豈異人乎即我身是佛告阿難汝持文殊師利語遍告大衆及未來世衆生若能禮拜者若能念佛者若能觀佛者當知此人與文殊師利等無有異文殊發願經云願我命終時滅除諸障礙面見阿彌陀往生安樂剎生彼佛國已成滿諸大願阿彌陀如來現前授我記嚴淨普賢行滿足文殊願盡未來際劫究竟菩薩行文殊摩訶般若經文殊師利白佛言世尊當云何行能速得阿耨多羅三藐三菩提佛言文殊師利如般若波羅蜜所說行能速得阿耨多羅三藐三菩提復有一行三昧若善男子善女人修是三昧者亦速得阿耨多羅三藐三菩提文殊師利言世尊云何名一行三昧佛言法界一相繫緣法界是名一行三昧若善男子善女人欲入一行三昧當先聞般若波羅蜜如說修學然後能入一行三昧如法界緣不退不壞不思議無礙無相善男子善女人欲入一行三昧應處空閒捨諸亂意不取相貌繫心一佛專稱名字隨佛方所端身正向能於一佛念念相續即是念中能見過去未來現在諸佛何以故念一佛功德無量無邊亦與無量諸佛功德無二不思議佛法等無分別皆乘一如成最正覺悉具無量功德無量辨才如是入一行三昧者盡知恆沙諸佛法界無差別相世尊一日升座文殊白槌云諦觀法王法法王法如是世尊便下座世尊一日見文殊在門外立乃召曰文殊入來文殊曰我不見有一法在門外者云何如來教我入門世尊教文殊入不思議解脫三昧文殊曰我即不思議云何更入不思議耶世尊謂文殊曰如汝文殊更有文殊是文殊者為無文殊文殊曰如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相菴提女問文殊曰明知生是不生理為甚麼卻被生死之所流轉文殊答曰其力未充三十二菩薩各說不二法門竟卻問文殊文殊曰如我意者於一切法無言無說無示無識離諸問答是為菩薩入不二法門於是文殊問維摩詰仁者當說何等是菩薩入不二法門維摩默然文殊讚曰乃至無有文字語言是為真入不二法門文殊一日令善財採藥曰是藥者採來善財遍觀大地無不是藥卻白文殊文殊曰是藥者採將來善財遂於地上拈一莖草度與文殊文殊接得以示衆曰此藥亦能殺人亦能活人善現問出世間法文殊答曰我覓世間相了不可得子欲誰出又曰貪瞋癡即平等法界我於是中非已出離非未出離若出不出則墮二見靈山會上五百比丘得通未得忍以宿命智各見過去殺父害母及諸重罪於自心內各各懷疑於甚深法不能證入於是文殊仗劍逼佛佛言文殊住住吾必被害吾被害矣吾誰害吾於是五百比丘自悟本心了法如夢皆得法忍說偈讚曰文殊大智士深達法源底手自握利劍逼持如來身如劍佛亦爾一相無二相無相無所生是中云何殺上略引顯教其祕密門大藏甚多今托其要以便持誦文殊師利根本一字陀羅尼唵齒𡄦二合𡄦字去聲彈舌呼之佛言此是文殊師利童子行輪呪法為欲守護諸衆生故一切如來所有極祕密心大神呪王若有持者我記是人則為已持一切諸呪悉皆圓滿一切所作皆得成就文殊師利常來擁護乃至消除一切諸惡重罪成辦一切世出世事詳大藏能字函第九卷曼殊室利菩薩五字心陀羅尼阿囉跛左娜若人有能持此呪者即入如來一切法平等印速得成就摩訶般若才誦一遍即持八萬四千法藏五字義者所謂阿者無生義囉者清淨無染離塵垢義跛者無第一義諦諸法平等左者諸法無有諸行娜者諸法無有性相言說文字皆不可得善男子汝知此要當觀是心本來清淨無所染著離我我所分別之相入此門者名三摩地是真修習當知是人如來印可功德殊勝不可量也曼殊室利菩薩八字陀羅尼唵痾去聲末囉𤙖卻浙囉佛告金剛手菩薩此八字大威德陀羅尼者乃往過去無量恆河沙諸佛所說為擁護一切十善國王令得如意壽命長遠福德無比兵甲休息國土安寧能大利益一切衆生斷三惡道遂諸願求若人暫聞憶念此呪即滅四重五逆等罪何况常念是人福德十地補處所不能奪况餘天等若持呪人事緣匆迫不必局法修持但能禁制身口意業十惡永絶即能持此陀羅尼呪亦得成就除不正心不發菩提心若能發心能憶誦者若誦一遍即護自身二遍護父母三遍護國王四遍護眷屬五遍護聚落六遍護城邑七遍護天下有情又云若我具說是呪功德無量千劫不能令盡七利行言利行者文殊般泥洹經云此菩薩住首楞嚴三昧力故於十方界或現初生或現滅度饒益衆生故有偈云文殊大菩薩不捨大悲願變身為異道或冠或露體或處小兒叢遊戲於聚落或作貧窮人衰容為老病及現飢寒苦巡方而求乞令人發一施與滿一切願令發信心已為說波羅蜜統領萬菩薩居住五頂山放億種光明見者罪消滅又菩薩處胎經偈云我身如微塵在於他國土三十二相明在在無不現等皆菩薩利行也佛名經說過去無量恆河沙佛皆是文殊令發初心故清涼云度二十億佛現說法者持地猶存佛告師子音過去七十萬阿僧祇恆河沙劫有佛名雷音于東方無生國成佛彼時文殊為王名普覆詣佛修供發菩提心其隨從者二十億人亦隨發心修六度行至成菩提入般涅槃文殊師利悉皆供養其中一佛名持地山在此下方持地世界成等正覺佛壽無量于今猶住現在說法詳大藏官字函第九卷化百千諸龍立登正覺王女是一法華禮妙慧而不忘敬本王舍城長者女名妙慧年始八歲詣佛問法佛為說四十行法妙慧曰我若於斯四十行中一行不修則違佛教則為欺誑如來我言不虛大千必動言訖大千世界六種震動又曰我當決定成佛此言不妄令此大衆皆作金色言已會衆即變金色文殊問曰汝住何法發如是願女曰文殊非所問也何以故於法界中無所住故乃至佛告文殊此童女者已於過去發菩提心經三十劫我乃發趨無上菩提亦令汝住無生法忍爾時文殊即從座起為其作禮白妙慧言我於往昔無量劫前已曾供養不謂今者還得親近詳大藏制字函第八卷勸善財而增長發心華嚴入法界品無言於不二法門維摩悉力於安樂行品法華教龍吉祥之分衛下位莫知儒首菩薩入舍衛城分衛無量大衆從之時龍首菩薩亦從之二大士酬唱廣談深法乃至云行衛時無念舉足無念下足無行無住無屈無伸無念分衛無分衛者無心無物城郭聚落長幼男女一切皆無是念亦無廓爾清淨是名菩薩分衛道也在會聲聞罔知其說詳大藏翔字函第四卷答琉璃光之光明正覺稱妙涅槃經佛廣說大涅槃聞所不聞之義高貴德王菩薩難佛不容有聞不聞義乃至云是大涅槃非世攝若非三世則不可說云何而言修大涅槃聞所不聞佛印善說時大會中忽有大光非青見青非黃見黃非色見色非明見明遇斯光者身心快樂如入三禪文殊白佛今此光明誰之所放如來默然迦葉菩薩卻問文殊文殊亦默無邊身問迦葉亦默然五百菩薩皆亦如是雖相咨問然無答者佛即問文殊曰是何因緣有此光明文殊答曰是光明者名為智慧智慧者即是常住常住之法無有因緣云何佛問何因緣故有此光明是光明名大涅槃涅槃常住不從緣生云何如來而問因緣因茲廣說常住之法後佛告曰汝莫入第一義諦應以世諦而說文殊方說其事乃東方不動佛國琉璃光菩薩所現也談般若之玄致屢質本師說權實之雙行頻驚小聖皆說法利生之事也談般若廣如大藏權實雙行不思議經文殊說菩薩行云菩薩行於世間不為世法所染現處外道諸見所不能動雖斷煩惱而不捨菩薩行雖不住有為而亦不住無為法此義諸經頗多二乘罔測也八涅槃言涅槃者此云滅度亦曰圓寂應緣既畢斂迹復真之義也文殊般涅槃經云佛滅度後四百五十年文殊師利菩薩當至雪山為五百仙人宣揚法化令成熟已即與諸仙飛騰虛空至本生地即舍衛國尼拘樹下結跏趺坐入首楞嚴三昧三昧力故身諸毛孔出金色光遍照十方諸有緣者悉令得度作佛事已有大火光從毛孔出鍊金色身成琉璃像於兩臂上有諸佛印文相分明琉璃像內有真金像正長六尺坐蓮華臺了了分明火光滅已此像宛然其五百仙人各現神變皆入涅槃既滅度已八大鬼王舁琉璃像置金剛山頂起塔供養或問文殊大聖入滅於彼住持於此彼為真滅耶不真滅耶適言真滅住此者誰適言不滅胡不存形而遊此乎答華嚴經云為令衆生生欣樂故出現於世欲令衆生生戀慕故示現涅槃而菩薩身無有出世亦無涅槃何以故菩薩常住清淨法界隨衆生心示涅槃故譬如日輪普照世間淨水器中影無不現普遍衆處而無來往或一器破便不現影非日咎也是知大聖或出或沒皆適衆生而法身湛然曾無生滅去來之相體既真常用亦無閒但淨我心聖無不現耳此涅槃之相也九釋住問聖有三身當以何身住清涼耶答三身俱住住相云何謂法身住者毗盧遮那自體遍故器界之性即法身故經云普賢身相如虛空依真而住非國土今約佛法性相義分身土則以法身住法性土契證難思義言住耳實無能所二體也報身住者即智與理冥德稱體周如日合空即名為住故東坡云溪聲盡是廣長舌山色無非淨妙身似斯義耳化身住者即文殊以三十二相之身與萬菩薩常住其中若夫隨類之化如牧童皤叟貧女嬰兒等種種變現是也蓋法報為體應化為用體涵諸用用根諸體體周則用遍故三不相離問若爾則體既無邊用亦遍應奚獨住五臺答現五臺者為應震旦之機欲令歸心有在耳若剎塵機感法界圓應夫何所拘哉十辨益或問自古國家祀諸名山大川者所以報一歲之功為生民祈福也今夫清涼海內之民吞冰嚙雪委命忘疲歲歲登禮至於燒身燃臂而投敬者往往有之且曰文殊大士住於此山而文殊有何義利於人而令其若是耶答由此菩薩於無量劫事無量佛捨無量身修無量行一一行門恆為利樂一切有情由昔大願所任持故今得如是等流功德令諸有情見相聞名悉能成辦世出世益乃至遠離生死證大涅槃譬如雪山大藥王樹若有見者則無眼病若有嗅者則無鼻病乃至觸者則無身病等菩薩功德亦若是也故寶積經說若有得聞文殊名者皆當成佛唯除已入離生之位即二乘也又云若有得聞文殊名者是則名為面見諸佛若有受持百千萬億諸佛名號不若受持文殊師利一菩薩名福多於彼何以故以彼等佛所作一切益衆生事不及文殊一時作故又般涅槃經云若聞文殊名或見形像者百千劫中不墮惡道若稱念文殊名者設有重障者不墮阿鼻極猛火處常生他方清淨國土值佛聞法得無生忍據此則假使住於蓬壺仙域須彌天宮經百千劫不若舉一步向清涼山何以故樂彼天仙常淪七趣向我文殊必得菩提故也故藍谷云昔博望張騫尋河源於大宛沙門法顯求正教於西乾况咫尺神州寰中絶境可不暫策昏心聊揮懈足為覺路之津梁乎音釋醜虜上昌九切下即古切即胸奴腥膻醜陋者浮圖具云窣覩波義翻淨剎藏舍利處盤礡下匹各切盤曲廣博四關東龍泉南伏馬西鴈門北平刑滹沱音呼陀瞰苦暫切視也毗盧遮那此云光明遍照泥洹即涅槃云圓寂央掘云世間現舍衛云豐德國豐衆德魔具云魔羅此云殺者陀羅尼云總持總一切法持無量義窈窕上於鳥切下徒鳥切深遠貌滀泄上音蓄下音薛雲龍潛化張騫漢人尋河源至西域大宛國得良馬進武帝封博望侯法顯晉僧隆安間西域求佛法須彌山名云妙高帝釋天居其頂神州即中夏舍衛三億舍衛九億人三億見佛三億聞佛三億名亦不聞附録普賢願王撮要附此文與文殊願生極樂正同文尤詳切行願品普賢菩薩於逝多林末會發十大願王其一一願皆云虛空界盡衆生界盡我此大願無有窮盡是人臨命終時最後剎那一切諸根悉皆散壞一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏無復相隨唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛其人自見生蓮華中蒙佛授記得授記已經無數劫普於十方不可說不可說世界以智慧力隨衆生心而為利益乃至能於煩惱大苦海中拔濟衆生令其出離皆得往生極樂世界又下偈云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界
