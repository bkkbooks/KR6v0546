body:
  text: 高僧目錄摩滕法蘭傳靈辯法師傳祥雲大師傳令休大師傳窺基法師傳道宣律師傳清涼國師傳豐干禪師傳巨方禪師傳祕魔和尚傳隱峯禪師傳智通禪師傳仰山和尚傳法空大師傳光嶼和尚傳金光照師傳業方大師傳志遠法師傳無名和尚傳智頵大師傳取性道者傳必救都綱傳趙州禪師傳孚上座傳降龍大師傳三大師傳慧悟大師傳成覺大師傳善慧大師傳蘇陀室利傳慧洪大師傳法沖大師傳佛日圓明傳華嚴菩薩傳真覺大師傳真覺國師傳了性法師傳弘教大師傳金璧峯傳大寶法王傳具生吉祥傳釋迦也失傳孤月禪師傳大巍禪師傳寶印禪師傳楚峯和尚傳無邊禪師傳瑞峯禪師傳如馨律師傳遠清律師傳紫柏大師傳妙峯大師傳密藏幻余傳蓮池大師傳鎮澄法師傳憨山大師傳䒢溪禪師傳阿王老藏傳老藏丹貝傳悟塵和尚傳章嘉國師傳源修釋柱傳達天和尚傳第五高僧懿行食揀沙之飯披離塵之衣入那伽定者髮可被體爪可圍身住阿練若者影不離山履不蹈俗無非欲解六情之稠網出五欲之汙泥榘範人天紹隆佛種是故什師頭首八百高流大鑑兒孫千七列祖罔不夙解塵纓越愛河而昇彼岸早祛俗累炳慧炬以出重冥他若杭標霅晝采樂府於靈山閩懷浙曇資美談於江表覽此清涼入傳蓋同滄海一漚略紀先正之典型庸作後來之矜式志高僧傳載高僧者所以彰夫清涼寶山實陶化聖賢之域自佛法入中土凡能出塵體道以極佛化者稱高僧且以一德言之神通若摩滕超逸若寶志心空若達摩神悟若大鑑高潔若遠公淵默若羅什觀智若天台窮微若賢首嚴淨若宣公至誠若僧會在是例者莫能盡舉或是根熟多劫或是乘願再來罔弗體備萬善克證無生眼目人天舟航生死者而其清涼入傳者特萬分之一耳今之所載凡有二焉或久棲勝地道著清涼或暫入茲山感通大聖參而錄之以冀後之住清涼者見賢而思齊焉摩滕法蘭傳漢印度國有摩滕法蘭二菩薩以天眼觀震旦有情有大乘根器者已熟并觀五臺文殊所居而聖教未至知歸者少遂賷釋迦文佛畫像並四十二章經將東適震旦時漢孝明帝於永平七年正月夜夢金人身高丈餘赫奕如日來詣殿庭旦令占之通人傅毅對曰臣覽周書異記云西方有大聖人出其沒千載教當及此今陛下所夢無乃是乎帝遣王遵等十八人西訪至月氏值滕蘭延而歸漢於永平十年丁卯十二月至洛陽以經像上帝帝披㲲覩像果與夢符帝以預夢告滕蘭對曰此如來以大法囑累於陛下也願陛下勉之帝問法王出世何以御不及此對曰大聖應必以時形必以感彼土乃大千世界之中羣靈並集根器先熟他機未感故佛不應譬之池澄而月皎否則晦矣豈月之咎哉雖然教光所及各有遲速亦隨其宜也帝問此土豈無聖人居化耶對曰此土有五臺山者乃文殊大士所居攝化無量天龍鬼神然非戒定澄神者莫能覩也即譯出四十二章經明年春禮清涼山迴奏帝建伽藍滕以山形若印度靈鷲山寺依山名也帝復以始信佛化乃加大孚孚即信也始度僧數十居之先是此山皆黃冠所居佛化既至異道無光於是十四年正月五臺道士白鹿等與五嶽道士褚善信等謀奏帝焚經以辨真偽真則作之偽則逐之帝許之十五日帝幸白馬寺道士立壇設祭集七十二子書於壇中滕以佛舍利經像置於道西齋訖道士執香炬繞壇泣曰臣等上啟太極大道元始天尊眾仙百靈今胡神亂夏人主信邪正道失蹤玄風墜緒臣等敢置經壇上以火取驗欲使開示蒙心得辨真偽便縱火焚經經從火化悉成煨燼道士失色欲禁不能時佛經像烈火不燒舍利光明旋空成蓋滕蘭踊身虛空現十八變為帝說偈曰狐非獅子類燈非日月明池無巨海納丘無嵩嶽榮法雲垂法界法雨潤羣萌顯通希有事處處化羣生事畢即旋印度焉唐太宗文皇帝登焚經臺詩云門徑蕭蕭長綠苔一囘登此一徘徊青牛謾說函關去白馬親從印度來確定是非憑烈燄要分真偽築高臺春風也解嫌狼藉吹盡當年道教灰靈辯法師傳元魏靈辯未詳氏族出家於懸甕山熙平初頂戴華嚴經日夜行道於五頂之間足破血流曾無少怠如是三載精勤如初一夕松下坐忽爾心光凝湛見異比丘摩其頂曰子勤苦且久當以信心入三摩地矣自是若夢忽醒一切文字觸目冰釋造論一百卷以釋華嚴為孝明帝所重請於式乾殿敷揚奧旨宰輔重臣皆北面而聽後終於清涼祥雲大師傳高齊祥雲并州周氏子童年依本州僧統靈詢披剃詢欲觀其宿習開經藏任其探取乃得涅槃經讀之不期年一部成誦日誦一徧率以為常及聞清涼靈境負經往遊觀光五頂棲止大孚寺持誦彌勤一日偶數官服者光明俊偉至雲前拜起曰我方潔吾居願神足降重行道七日以福我家耳師即隨行北趣數里忽雲霧晦冥俄頃雲開眼景非常前入大宅庭室甚嚴富麗無並雲方昇堂就坐竊疑而問曰子何人也巨富乃爾答曰我山神也辱師慈駕一至于此所進食饌味非世有行道七夕神以珍奇數品為贈雲不受神固進之雲曰貧道道業未成所患微命不長不及造修檀越如不棄貽我靈藥得延天年是我願也神曰斯亦可耳取藥一莖狀如童子色白如練奉之雲受即噉遂獲登仙還經師所陳謝而去令休大師傳隋釋令休河南人樂尋聖迹徧歷名山始至臺山志求神悟經行林間值一異僧師叩首曰聖者某嘗聞文殊大士住五臺山我既徧求了無所見僧曰汝安能無所見乎汝蓄有見是以不見汝之無見是亦見耳若果無見斯見文殊且汝舉足時蹋破文殊面門擡手處捉著文殊鼻孔有甚迴避處休曰然則山河草木是文殊乎僧曰若道山河是者則二文殊若云非者則為妄語於中實無是非二相且汝無始至今在文殊眼睛裏虛生浪死玩水遊山文殊祇在汝眉睫間轉大法輪汝曾不委休聞有省稽首再告曰某柰有痼疾道業無成大德可能療之乎僧曰無心之草名瞢𧄼汝當服行服之既久瞢𧄼即汝汝即瞢𧄼是疾可差休徧探林谷求草不得即自悟曰非服草也使我空心滅煩惱也且夫我身一瞢𧄼也萬物一瞢𧄼也幻相似有其體元空由是了心法脫然無繫矣開皇二十年端坐而逝春秋七十有三窺基法師傳唐窺基姓尉遲父敬宗任松州都督伯父即鄂國公敬德也基童時依玄奘披剃永徽甲寅年方十七帝特旨度基沙彌為大僧入慈恩寺參譯一切經論過目成誦義亦能解從奘師受瑜伽唯識宗旨法相大乘至基大振著論凡百部時號百本論師天性尚侈每出必載三車經書食饌時呼之曰三車法師南山律師嚴持戒品兢兢細行見基侈態故薄之律師常有天神送饌基訪律師坐時過午天饌不至基去天乃至律師責以後時天曰適大乘菩薩在翊衛甚嚴故無敢入律師聞之大駭悔過永隆中基來遊臺山棲託一載有詔旋京將行有異僧出林止之曰法師報緣殆盡何不就終於此而欲他行基曰吾宿緣在彼異僧曰師善行明年來會基行華嚴寺行者疑問異僧曰彼師何人異僧曰彌勒弟子也異僧入林行者追之竟無所見基至長安明年永淳改元臨終謂徒曰十方剎海遊戲之場生死涅槃等閒戲具兜率故苑吾將歸矣言訖而蛻世壽五十有一御製像讚而傷悼焉道宣律師傳唐道宣彭祖之後吏部尚書錢申之子母夢日輪貫懷而孕生而好禮正視聽肅容儀其天性也少事習誦長叩玄關講師宗匠無遠不參外通百氏內洞三學戒香芬布逆順咸聞慧炬高懸幽明俱徹存護法城著述無輟尤攻律藏窮極幽微七聚五篇煥然冰釋行高三界道重百靈感諸天常侍衛焉纂靈記云律師嘗遊清涼至中臺夜方禪寂有天童子侍于右師問曰子何人也曰我名玄暢乃天人也奉天帝命巡狩聖境聞師屆此故來相候師曰準華嚴說此山乃文殊住處今見丘陵草樹宛是凡居聖人境界果何有耶天童答曰大聖境界固非凡夫二乘可得而知我凡夫也師二乘也若以有思惟心求不思議境則殆矣師豈不聞一法無異三人殊見者乎蓋隨其各具業報之眼有殊而所見亦異若某所見清涼山碧琉璃色諸臺麓間皆雜寶林光明煥發日夜無閒而菩薩住處非我所及也言訖而隱乾封二年冬律師入滅於長安西明穆宗製讚曰代有覺人為如來使龍魔歸依嶽神奉侍聲飛五天辭驚萬古金烏西沈佛日東舉稽首歸依肇律宗主清涼國師傳唐清涼國師諱澄觀字大休會稽人姓夏侯氏生於玄宗開元戊寅身長九尺四寸垂手過膝口四十齒目光夜發晝乃不眴天寶七年出家肅宗二年受具是年奉詔入內勅譯華嚴初受具時即以十事自勵曰體不捐沙門之表心不違如來之制坐不背法界之經性不染情礙之境足不履尼寺之塵脅不觸居士之榻目不視非儀之綵舌不味過午之餚手不釋圓明之珠宿不離衣鉢之側從牛頭忠徑山欽問西來宗旨遙稟於賢首國師華嚴圓旨代宗大曆三年詔入內與大辯正三藏譯經為潤文大德既而辭入五臺大華嚴寺覃思華嚴以三地聖人棲身佛境心體真如猶於後得智起世俗心學世間解由是博覽六藝圖史九流異學華夏訓詁竺經梵字及四圍五明聖教世典等書靡不該洽德宗建中四年下筆著疏先求瑞應一夕夢金容當陽山峙光相顒顒因以手捧咽面門既覺而喜以謂獲光明徧照之徵自是筆無停思乃以信解行證分華嚴為四科理無不包觀每慨舊疏未盡經旨唯賢首國師頗涉淵源遂宗承之製疏凡歷四年而文成又夢身為龍矯首南臺尾蟠北臺宛轉陵虛鱗鬣曜日須臾變百千數蜿蜒青冥分散四方而去識者以為流通之象初為眾開講感景雲凝空盤旋成蓋久而不散又為僧叡等著隨疏演義四十卷隨文手鏡一百卷貞元十二年上遣河東節度使禮部尚書李詵備禮迎觀入京特旨同罽賓般若三藏翻譯烏茶國所進華嚴後分梵夾帝親預譯場一日不至即差僧寂光依僧欲云皇帝國事因緣如法僧事與欲清淨觀承睿旨翻宣既就進之帝命開示華嚴宗旨羣臣大集觀陞高座曰我皇御宇德合乾坤光宅萬方重譯來貢東風入律西天輸越海之誠南印御書北闕獻朝宗之敬特回明詔再譯真詮光闡大猷增輝新理澄觀顧多天幸欽屬盛明奉詔譯場承旨幽贊抃躍兢惕三復竭愚露滴天池喜合百川之味塵培華嶽無增萬仞之高極虛空之可度體無邊涯大也竭滄溟而可飲法門無盡方也碎塵剎而可數用無能測廣也離覺所覺明萬法之幽邃佛也芬敷萬行榮耀眾德華也圓茲行德飾彼十身嚴也貫攝玄微以成真光之彩經也總斯七字為一部之宏綱則無盡法門思過半矣將契本性非行莫階故演普賢行海行起解絕智證圓明矣帝大悅賜觀紫方袍號教授和尚其後相國齊抗請撰華嚴綱要三卷相國李吉甫請述正要一卷又為南康王韋皋著法界觀玄鏡一卷僕射高崇文請著鏡燈說文一卷司徒嚴綬請撰三聖圓融觀一卷節度使薛華拾遺白居易請製七處九會華藏世界圖心鏡說文十卷又與僧錄靈邃等十八首座三學上流製華嚴圓覺四分中觀等經律論關脈三十餘部皆古錦純金隨器任用耳十五年受鎮國大師號四月帝誕節勅有司備儀輦迎教授和尚澄觀入內殿闡揚華嚴宗旨觀陞座曰大哉真界萬法資始包空有而絕相入言象而無迹妙有得之而不有真空得之而不空生滅得之而真常緣起得之而交映我佛得之妙踐真覺廓淨塵習寂寥於萬化之域動用於一虛之中融身剎以相含流聲光而遐燭我皇得之靈鑑虛極保合太和聖文掩於百王淳風扇於萬國敷玄化以覺夢垂天真以性情是知不有太虛曷展無涯之照不有真界豈淨等空之心華嚴教者即窮斯旨趣盡其源流故恢廓宏遠包納冲邃不可得而思議矣指其源也情塵有經智海無外妄惑非取重玄不空四句之火莫焚萬法之門皆入冥二際而不一動千變而非多事理交涉而兩忘性相融通而無盡若秦鏡之互照猶帝珠之相含重重交光歷歷齊現故得圓至功於頃刻見佛境於塵毛諸佛心內眾生新新作佛眾生心中諸佛念念證真一字法門海墨書而不盡一毫之善空界盡而無窮語其定也冥一如於無心即萬動而常寂海湛真智光含性空星羅法身影落心水圓音非叩而長演果海離念而心傳萬行忘照而齊修漸頓無礙而雙入雖四心被廣八難頓超而一極唱高二乘絕聽當其器也百城詢友一道棲神明正為南方盡南矣益我為友人皆友焉遇三毒而三德圓入一塵而一心淨千化不變其慮萬境順通於道契文殊之妙智宛是初心入普賢之玄門曾無別體失其旨也徒修因於曠劫得其門也等諸佛在一朝諦觀一塵法界在掌理深智遠識昧辭單塵黷聖聰退座而已帝時默湛海印朗然大覺顧謂羣臣曰朕之師言雅而𥳑辭典而富扇真風於第一義天能以聖法清涼朕心乃以清涼賜為國師之號朕思從來執身心我人及諸法定相斯為甚倒羣臣拜賀頂奉明命於是中外台輔重臣咸受益戒一日帝問師曰華嚴所詮何謂法界師曰法界者一切眾生身心之本體也從本已來靈明廓徹廣大虛寂唯一真境而已無有形貌而森羅大千無有邊際而含容萬有昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分非徹法之慧目離念之明智不能見自心如此之靈通也故世尊初成正覺歎曰奇哉我今普見一切眾生具有如來智慧德相但以妄想執著而不能證得於是稱法界性說華嚴經總該萬有即是一心無礙融通故名法界帝天縱聖明一聽玄談廓然自得於是勅有司鑄印遷國師統冠天下緇徒號僧統清涼國師開成三年三月六日師將示寂謂其徒海岸等曰吾聞偶運無功先聖悼歎復質無行古人恥之無昭穆動靜無綸緒往復勿穿鑿異端勿順非辨偽勿迷陷邪心勿固牢鬬諍大明不能破長夜之昏慈母不能保身後之子當取信於佛無取信於人真離玄微非言說所顯要以深心體解朗然現前對境無心逢緣不動則不孤我矣言訖而逝師生歷九朝為七帝門師九朝者唐玄宗肅宗代宗德宗順宗憲宗穆宗敬宗文宗七帝者即代宗以下春秋一百有二僧臘八十有三是為華嚴六祖文宗深沐法澤崇仰慟悼特輟朝三日重臣縞素奉全身塔於梵川華嚴寺梵今訛作樊未幾有梵僧到闕表稱於葱嶺見二使者陵空而過以呪止而問之答曰北印度文殊堂神也東取華嚴菩薩大牙歸國供養有旨啟塔果失一牙唯三十九存焉遂闍維舍利光明瑩潤舌如紅蓮色仍諡號清涼國師妙覺之塔相國裴休奉勅撰碑其銘曰寶月清涼寂照法界以沙門相藏世間解澄湛含虛氣清鍾鼎雪沃剡溪霞橫緱嶺真室寥敻靈嶽崔嵬虛融天地峻拔風雷離微休命實際龐鴻奉若時政革彼幽蒙炯乎禹質元聖孕靈德雲冉冉凝眸幻形谷響入耳性不可為青蓮出水深不可闚才受尸羅奉持止作原始要終克諧適莫鳳藻珍奇遺演祕密染翰風生供盈二筆欲造玄關咽金一像逮竟將流龍飛遷颺疏新五頂光銜二京躍出法界功齊百城萬行分披華開古錦啟迪羣甿與甘露飲燮讚金偈懷生保乂聖主師資聿興遐裔貝葉翻宣譯場獨步譚柄一揮幾回天顧王庭闡法傾河涌泉屬辭縱辯玄玄玄玄紫衲命衣清涼國號不有吾師孰知吾道九州傳命然無盡燈一人拜錫統天下僧帝網冲融潛通萬戶歷天不周同時顯晤卷舒自在來往無蹤大士知見允執厥中西域供牙梵倫遽至奏啟石驗嘉風益熾勅俾圖真相即無相海印大龍蟠居方丈哲人去矣資何所參即事之理塔鎖終南文宗御讚曰朕觀法界曠闃無垠應緣成事允用虛根清涼國師體像啟門奄有法界我祖聿尊教融海嶽恩廓乾坤首相二疏拔擢幽昏閒氣斯來拱承佛日四海光凝九州慶溢敞金仙門奪古賢席大手名曹橫經請益仍師巨休保余遐曆爰抒顓毫式揚茂實真空罔盡機就而駕白月虛秋清風適夏妙有不遷緣息而化邈爾禹儀煥乎精舍豐干禪師傳唐豐干不知何許人居天台山國清寺翦髮齊眉布衣裘人或問佛理止答隨時二字嘗誦唱道歌乘虎入松門眾僧驚畏本寺廚中有苦行曰寒山拾得二人執爨終日晤語潛聽者都不解時謂風狂子獨與師相親一日寒山問古鏡不磨如何照燭師曰冰壺無影像猿猴探水月曰此是不照燭也更請師道師曰萬德不將來教我道什麼一日師謂寒山拾得曰若與我遊五臺即我同流若不與我去非我同流曰我不去師曰汝不是我同流寒山卻問汝去五臺作甚麼師曰我去禮文殊曰汝不是我同流師尋獨入五臺巡禮逢一老翁師問莫是文殊否曰豈有二文殊耶師作禮未起忽然不見遂遊五頂徧歷巖阿將三載還南適閭丘胤出牧丹丘將議巾車忽患頭疼醫莫能瘉師造之曰貧道特來謁使君閭丘即告之病師乃索淨器呪水噴之病斯須差閭丘異之乞一言示此去安危之兆師曰到任記謁文殊普賢曰此二大士何在師曰天台國清寺寒山拾得是也閭丘自後尋至山寺問寺主豐干住處主僧道翹曰豐干舊居在經藏後今闃無人矣復問寒山拾得今在何所翹曰廚中執役閭丘入豐干房唯見虎迹復問豐干在此作何行業翹曰唯事舂穀供僧閒則諷詠閭丘遂入廚見寒山拾得圍鑪語笑閭丘即禮拜二人連聲咄叱寺僧驚愕曰大官何拜風狂漢耶寒山復執閭丘手笑而言曰豐干饒舌自是寒山拾得相攜出松門更不復入寺師示寂於天台山巨方禪師傳唐巨方安陸曹氏子幼從明福朗公薙度徧探經論後參荷澤及造北宗秀問曰子何來答曰清涼山問曰如何是清涼境答曰白雲覆古頂又問白雲散處如何答曰不昧又問如何是境中人答曰一衲臥千峯不知天地老又問此後如何答曰一枝橫出五葉芬芳秀默許之遊化上黨座盈千眾後於五臺闡化二十年而終焉秘魔和尚傳唐祕魔和尚不知何處人得馬祖之道居五臺祕魔巖常持一木叉每見僧來禮拜即叉卻頸曰那箇魔魅教汝出家那箇魔魅教汝行腳道得也叉下死道不得也叉下死速道速道學人鮮有對者霍山通禪師來訪纔見不禮拜便竄入懷裏師拊通背三下通起拍手曰師三千里外賺我來三千里外賺我來言已便回師以大法為務與世漠然後終於巖下隱峯禪師傳唐隱峯福建邵武人姓鄧氏幼若不慧父母聽其出家初遊馬祖門而未窺其奧復來往石頭雖兩番不捷語見馬祖章而後於馬大師言下契悟師在石頭時問云如何得合道去頭云我亦不合道師云畢竟如何頭云汝被這些多少時來了師不對一日石頭剗草次師在左側叉手而立頭以飛剗子向師面前剗一莖草師云和尚只剗得這箇剗不得那箇頭即提起剗子師接剗子乃作剗勢頭云汝只剗得那箇不解剗得這箇師無對師一日推土車馬大師展腳路坐師云請師收足大師云已展不縮師云既進不退乃推車碾過大師腳損大師歸法堂執斧子云適來碾損老僧腳底出來師便出於大師前引頸大師乃置斧師到南泉眾僧參次泉指淨瓶云銅瓶是境瓶中有水不得動著境與老僧將水來師便拈淨瓶向南泉面前瀉南泉便休師後到溈山於上座頭解放衣鉢溈山聞師叔到先具威儀入堂師見山來便作睡勢溈山即歸方丈師乃發去少閒溈山問侍者師叔在否曰去也山云去時有何言句曰無山云莫道言無其聲如雷師以冬居衡嶽夏住清涼唐元和中薦登五臺路出淮西屬吳元濟阻兵違拒王命官軍與賊交鋒未決勝負師曰吾當去解其患乃擲錫空中飛身而過兩軍將士仰觀事符預夢鬬心頓息師既顯神異慮成惑眾遂入五臺金剛窟前將示寂時先問眾云嘗見諸方坐臥遷化還有立化者無眾云有師云倒化者有否眾云未有師乃倒立亭然而化衣裳順體時眾議舁就茶毗屹然不動遠近瞻觀驚歎無已師有妹為尼時在山乃撫而咄曰老兄疇昔不循法律死更熒惑於人於是以手推之僨然而踣遂就闍維收舍利塔於北臺之頂智通禪師傳唐智通初在歸宗會下忽一夜連叫曰我大悟也眾駭之宗明日上堂示眾曰昨夜大悟底僧出來師曰某甲在宗曰汝見甚麼道理便言大悟且試道看師曰師姑元是女人作宗異之師便辭去宗送與笠子師接戴頭上拂袖便行更不回顧後居臺山法華寺臨終有偈云舉手攀南斗回身倚北辰出頭天外看誰是箇中人仰山和尚傳唐仰山和尚一日遊五臺迴僧問和尚近日何往山曰五臺曰見文殊否曰見又問文殊向和尚道甚麼山曰文殊道你生身父母在深草裏法空大師傳唐法空隋末任雁門鷹擊郎將年四十以隋室荒淫即生厭離乃棄冠劍妻子獨詣清涼構茅深谷草根木葉以為其食嘗誦華嚴唯心作佛之偈無所參叩時賊寇交起府司追繫復歸至禁所正念趺坐不語不食不瞬不息幾兩月守令以下莫不驚愕因而放之任其所往空至山居一隱三十餘載禽獸忘形人事絕交後有異僧授般若玄旨豁爾心空臨終謂眾曰自被拘獄之後天機不動自遇我師爍破虛空了也言訖而逝光嶼和尚傳唐光嶼金城韓氏子幼業儒有青雲之志嘗夢神人曰若意干仕祿若志鄙哉若必求道莫若如者也嶼曰我將何之而可曰五臺山者聖賢所棲汝與斯地且有宿緣宜速歸之即往清涼真容院出家因讀淨名至依義不依語遂求講學稽諸大乘唯華嚴圓極即終身奉持波濤於無盡義海游泳於法界重玄後還臺山頂戴華嚴五峯行道顯德七年冬示疾謂諸子曰猶龍者厭乎大患如鳳者悲於逝川諸行無常是生滅法門人問四大百骸既屬生滅如何是不生滅法師曰四大百骸言訖而化世壽六十僧臘四十六燒得舍利甚多金光照師傳唐金光照澠池李氏子年十三依寶雲靈粲師披剃十九入洪陽山事迦葉和尚服勤三載衣不解帶寢不就席負舂植刈罔不克勤一日問葉如何是出家當為底事葉曰無為是當為底事曰無為何用為乎葉曰汝若不為焉至無為又問欲為無為作麼生為葉曰豈不見圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實斯為無為之方也又問為與無為一耶異乎葉曰諸有智者以譬得明如金作器就金求之未嘗有器就器觀之器相宛然金常非器然離金外無器可得金喻無為器喻有為且金之與器一耶異乎是以經云於有為界示無為法而不壞滅有為之相於無為界示有為法而不分別無為之性故道常無為而無不為佛常無應而無不應雖恆沙異名終會一實感應權殊隱顯同體照既聞師法遂有沒齒山林之志聞清涼勝境忻然而歸適西北戎馬生郊道路艱阻師復入姑射山事超禪師接以微言豁然啟悟乃知三界一心了無別法大曆二年方達五臺宿菩薩頂夜方禪寂見金色光自北臺飛下金色蓮華於中涌現諸化佛身坐蓮華上其金色光流灌照頂化佛舒臂摩照頂曰善哉男子汝今善入金剛三昧汝從今去名金光照當以般若之水滌濯其心無以玄途而生窠臼照即問曰諸佛之身是有為耶無為乎為有生耶無生乎化佛曰善男子諸佛之身離諸言說永絕心路如大火聚中不容他如是分別盡屬戲論言已而隱自此定起四威儀中常住三昧壽七十有二而終焉業方大師傳唐業方解脫和尚法孫身長七尺五寸貌古神奇垂手過膝目有重瞳精勤白業日夜無怠方一日於中臺入定是日有人見在代州持鉢行乞太原信士數人造文殊像送山滹沱泛漲因不能度方振錫前行水為斷流眾人隨過水復湍激大曆元年於祕魔巖畔翹足而化州宰建塔藏之塔方成一夕火光亙天明日視之但見塔內燒痕了無一物灰燼亦無異香數日乃已志遠法師傳唐志遠汝南宗氏子幼孤事母以孝聞母能誦法華經遠從母聞亦自能誦母為議婚遠固止曰某他時別有事在願勿以世網繫兒遂止年二十八母故既葬即投高德出家事師尤謹眾中有難行苦行以身先之後參南北二宗兼綜經論及聞臺山聖地有志歸焉遂結侶同遊棲華嚴小院大弘天台宗旨會昌四年告門人曰吾平生無他善行但心口不相欺耳因得二種現報睡安覺安而今衰窮覓箇夢想心了不可得言訖而逝所著法華疏止觀釋義並行於世壽七十七僧臘四十八無名和尚傳唐無名渤海人高力士之後幼年慕道落髮臺山志克上乘精求悟理心淵湛寂出語成文貪瞋不擾其神喜怒不形於面沖淡自居名利灰冷孜孜禪道如救頭然年雖垂老其志彌堅貞元二年沐浴更衣禮三寶畢示誨寺眾跏趺而逝其徒埋龕塚上每有神光夜發民以為金寶所藏啟之乃龕其徒闍維身骨棱層鉤鎖而住瑩潤如玉準涅槃經十地菩薩身骨鉤鎖也智頵大師傳唐智頵中山人未詳姓氏依五臺善住院賢林披剃戒珠圓潔性天虛朗衣鉢之外一無所畜愛老如親視病如己久參大通之禪兼閑教旨其才有餘其德不形斂迹靈峯雅不事物志雖韜晦囊錐穎脫元和中眾請典僧事俛仰而從由是清規肅肅玄綱大振遠近依歸適觀國師大疏成眾請頵講猶國師無恙由是義學星馳檀施雲委院僧圓義亦諸僧之巨擘以頵久典常住意其有私乃構流言謗頵心非平等志負貪婪修德競時豈宜若是頵聞之不辯退休而已是夜有神叱義曰頵和尚乃千佛之一也爾敢輕言若是可速求懺免沈惡趣義即大怖至旦詣頵禮懺所愆義感眉鬚墮落頵辭眾曰夢幻空花愚夫自保圓明獨脫誰與纏縛曾不反照翻恨輪迴逐妄長迷是誰之咎遂入靜室一坐三日而化春秋七十七僧臘五十八取性道者傳唐取性道者未詳其鄉里氏族出家於五臺福聖院外相粗鄙內行莫測衣敝衲食眾殘無得失之心絕是非之念舉世謗而不怒舉世譽而不喜雖眾妓舞前中無所動千難加之淡然自若德無所形人欽若聖囂囂自得而輸誠施物者惟恐不受嘗有偈曰幽哉幽哉曼殊五臺百花春至元為誰開每見僧則曰取性取性勿助勿正和爾思量共爾做夢每入山即操刀見蛇即斬唯云取性取性卻戒弟子勿殺弟子難之師咄曰老僧取性何曾斬蛇後莫知其終必救都綱傳唐必救未詳氏族住王子燒身寺曾掌僧務為都綱道行超邈神鬼欽畏古之清涼府即今五臺縣邑宰王有相夏夜獨坐於公廡之下忽見二使狀類殊人至前曰大帝遣余追爾赴對有相大駭起謂使曰死者古今常然余不懼也但老親在堂唯憑薄祿奉養無人可託若待百年我死無憾貽君千金可奏大帝寬宥得否使者曰大帝嚴命某未敢擅奏臺山必救長老帝所畏事公可求之必能為矣有相夜趨救居啓扉叩室救方禪寂有相拜曰某邑宰也帝使追之老親無養求師解之救曰公能皈依三寶否能行十善否相曰唯命是聽救令趨避默念閻老閻老遣使至長跪報救曰大帝奉師慈力益彼十年之壽彼念老親歸命三寶信行十善更當彌福耳是年更加祿位過十二年乃卒趙州禪師傳唐趙州觀音院從諗禪師曹州郝鄉人姓郝氏童稚於本州扈通院從師披剃未納戒便抵池陽參南泉泉偃息而問曰近離什麼處師曰近離瑞像曰還見立像麼師曰不見立瑞像只見臥如來曰汝是有主沙彌無主沙彌師曰有主沙彌曰主在什麼處師曰仲冬嚴寒伏惟和尚尊體萬福泉器之而許入室異日問泉如何是道泉曰平常心是道師曰還可趣向否泉曰擬向即乖師曰不擬時如何知是道泉曰道不屬知不知知是妄覺不知是無記若是真達不疑之道猶如太虛廓然虛豁豈可強是非耶師言下悟理乃往嵩嶽瑠璃壇納戒卻返南泉異日問南泉知有底人向什麼處休歇泉曰山下作牛去師曰謝指示泉曰昨夜三更月到窗師作火頭一日閉卻門燒滿屋烟叫云救火救火時大眾俱到師云道得即開門眾皆無對泉將鎖於窗間過與師師便開門又到黃檗黃檗見來便閉方丈門師乃把火於法堂內叫云救火救火黃檗開門捉住云道道師云賊過後張弓又到寶壽寶壽見來即於禪牀上背面坐師展坐具禮拜寶壽下禪牀師便出又到鹽官云看箭鹽官云過也師云中也又到夾山將拄杖入法堂夾山云作麼師曰沁水山曰一滴也無沁什麼師倚杖而出師九遊五臺每遊必經夏而返一日將遊有僧作偈留云何處青山不道場何須策杖禮清涼雲中縱有金毛現正眼觀時非吉祥師曰作麼生是正眼僧無對師自此道化被於北地眾請住趙州觀音院上堂示眾云如明珠在掌胡來胡現漢來漢現老僧把一枝草為丈六金身用把丈六金身為一枝草用佛是煩惱煩惱是佛時有僧問未審佛是誰家煩惱師云是一切人煩惱僧云如何免得師云用免作麼師掃地有人問云和尚是善知識為什麼有塵師曰外來又僧問清淨伽藍為什麼有塵師曰又一點也又有人與師遊園見兔子驚走問云和尚是大善知識為什麼兔子見驚師云為老僧好殺僧問覺華未發時如何辨真實師云開也僧云是真是實師云真是實實是真僧云什麼人分上事師云老僧有分闍黎有分僧云某甲不招納時如何師佯不聞僧無語師云去師院有石幢子被風吹折僧問陀羅尼幢子作凡去作聖去師云也不作凡亦不作聖僧云畢竟作什麼師云落地去也師問一座主講什麼經云講涅槃經師云問一段義得否云得師以腳踢空吹一吹云是什麼義座主云經中無此義師云五百力士揭石義便道無大眾晚參師云今夜答話去也有解問者出來時有一僧便出禮拜師云比來抛塼引玉卻引得箇墼子有僧遊五臺問一婆子云臺山路向什麼處去婆子云驀直去僧便去婆子云又恁麼去也其僧舉似師師云待我去勘破這婆子師至明日便去問臺山路向什麼處去婆子云驀直去師便去婆子云又恁麼去也師歸院謂僧云我為汝勘破這婆子了也僧問恁麼來底人師接否師云接僧云不恁麼來底師還接否師云接僧云恁麼來者從師接不恁麼來者如何接師云止止不須說我法妙難思僧問如何是囊中寶師云合取口有新到僧謂師曰某甲從長安來橫擔一條拄杖不曾撥著一人師云自是大德拄杖短僧無對師敲火問僧云老僧喚作火汝喚作什麼僧無語師云不識玄旨徒勞念靜新到僧參師問什麼處來僧云南方來師云佛法盡在南方汝來這裏作什麼僧云佛法豈有南北耶師云饒汝從雪峯雲居來只是箇擔板漢僧問如何是佛師云殿裏底僧云殿裏者豈不是泥龕塑像師云是僧云如何是佛師云殿裏底僧問如何是學人自己師云喫粥了也未僧云喫粥也師云洗鉢去其僧忽然省悟師上堂云纔有是非紛然失心還有答話分也無樂普在眾叩齒雲居云何必師云今日大有人喪身失命有僧云請和尚舉師便舉前語僧指傍僧云這僧作恁麼語話師乃休僧問久嚮趙州石橋到來只見掠彴師云汝只見掠彴不見趙州橋僧云如何是趙州橋師云過來過來又有僧同前問師亦如前答僧云如何是趙州橋師云度驢度馬僧云如何是掠彴師云箇箇度人師聞沙彌喝參向侍者云教伊去侍者乃教去沙彌便珍重去師云沙彌得入門侍者在門外師問新到僧什麼處來僧云從南來師云還知有趙州關否僧云須知有不涉關者師云這販私鹽漢僧問如何是西來意師下禪牀立僧云莫道這箇便是否師云老僧未有語在師問菜頭今日喫生菜熟菜菜頭拈起呈之師云知恩者少負恩者多僧問空劫中還有人修行也無師云汝喚什麼作空劫僧云無一物是師云這箇始稱得修行喚什麼作空劫僧無語僧問如何是玄中玄師云汝玄來多少時耶僧云玄之久矣師云闍黎若不遇老僧幾被玄殺僧問萬法歸一一歸何所師云老僧在青州作得一領布衫重七斤僧問夜生兜率晝降閻浮於其中間摩尼為什麼不現師云道什麼其僧再問師云毗婆尸佛早畱心直至如今不得妙師問院主什麼處來曰送生來師云鴉子為什麼飛去院主云怕某甲師云是什麼語話院主卻問鴉子為什麼卻飛去師代云為某甲有殺心在師托起鉢云三十年後若見老僧畱取供養若不見即撲破一僧出云三十年後敢道見和尚師乃撲破有僧辭師問什麼處去僧云雪峯去師云雪峯忽若問汝云和尚有何言句汝作麼生祇對僧云某甲道不得請和尚道師云冬即言寒夏即道熱又云雪峯更問汝畢竟事作麼生其僧又云道不得師云但道親從趙州來不是傳語人其僧到雪峯一依前語舉似雪峯雪峯云也須是趙州始得玄沙聞云大小趙州敗闕也不知僧問如何是趙州一句師云老僧半句也無僧云豈無和尚在師云老僧不是一句僧問如何是出家師云不履高名不求苟得僧問澄澄絕點時如何師云這裏不著客作漢僧問如何是祖師意師乃敲牀腳僧云只這莫便是否師云是即脫取去僧問如何是毗盧圓相師云老僧自幼出家不曾眼花僧云豈不為人師云願汝常見毗盧圓相問和尚還入地獄否師云老僧末上入曰大善知識為什麼入地獄師云若不入阿誰教化汝一日真定帥王公攜諸子入院師坐而問曰大王會麼王曰不會師云自小持齋身已老見人無力下禪牀王公尤加禮重翌日令軍將傳語師下禪牀受之少閒侍者問和尚見大王來不下禪牀今日軍將來為什麼卻下禪牀師云非汝所知第一等人來禪牀上接中等人來下禪牀接末等人來三門外接師寄拂子與王公曰若問何處得來便道老僧平生用不盡者師之玄言布於天下時謂趙州門風皆悚然信伏矣唐乾寧四年仲冬二日右脅而寂壽一百二十諡號真際大師孚上座傳唐太原孚上座久住清涼徧歷諸方名聞宇宙遊浙中登徑山法會一日於大佛殿前有僧問上座住五臺久麼師曰久矣曰還見文殊麼師曰見曰什麼處見師曰徑山佛殿前見其僧後適閩川舉似雪峯峯曰何不教伊入嶺來師聞乃促裝而邁初上雪峯廨院憩錫因分柑子與僧時長慶問什麼處將來師曰嶺外曰遠涉不易擔負得來師曰柑子柑子師參見雪峯禮拜訖立於座右雪峯纔顧視師便下看主事異日峯見師便指日示之師搖手峯曰汝不肯我師曰和尚搖頭某甲擺尾什麼不肯和尚曰到處也須諱卻一日眾僧晚參峯在中庭臥師曰五州內只有和尚較些子峯便起去峯問師曰見說臨濟有三句是否師曰是曰作麼生是第一句師舉目視之峯曰此猶是第二句如何是第一句師叉手而退峯深契之室中印可師三年不他遊而掌浴室焉一日玄沙與峯相見峯曰此間有箇老鼠子今在浴室裏玄沙曰待與和尚勘破言訖到浴室遇師打水沙曰相見上座師曰已見了也沙曰什麼劫中見師曰瞌睡作麼玄沙卻入方丈謂峯曰已勘破了峯曰作麼生勘伊沙舉前語峯曰汝著賊也鼓山宴和尚問師父母未生前鼻孔在什麼處師曰老兄先道宴曰如今生也汝道在什麼處師不肯宴曰作麼生是師曰將手中扇子來宴與扇子再徵之師默然宴罔測乃毆之一拳師在庫前立有僧問如何是觸目菩提師踢狗子作聲走僧無對師曰小狗子不消一踢師藏修五臺二十餘年竟不出世諸方目為太原孚上座降龍大師傳唐誠慧靈丘李氏子其親無嗣禱於臺山者三返後感娠既生特秀不凡及長不願婚娶辭親詣五臺真容院從法順和尚披剃心澄秋月行潔冰霜向道之心食息靡閒東臺東百里有毒龍池龍常害物四十里內人畜不入師攜淨缾錫杖廬其側一夕暴風怒雷自池而出師呪之龍即入缾風雷皆寢師繞缾誦大乘經呪居七日龍革毒心白光洞室師乃釋之乘風雲而去師嘗誦華嚴於李牛谷木葉草根為常食每誦經時或五七儒服者坐聽每持異花鮮果而獻師怪問之答曰某山神也蒙師法力無以為報願充執侍焉師心不樂遂捨其處所至不月即成叢林莊宗同光元年帝聞師高行製書并紫衣賜之書云師鷲嶺名流雞園上哲精持護鵝之戒弘宣住雁之談潛括三乘深明四諦忍草長新於性苑覺花不染於情塵高蹈靈峯栖心勝境泛慈舟而拯溺持慧炬以照迷五百龍王皆降懿德十千聖眾盡繼玄蹤為萬姓之甘霖作空門之標格朕方興景運大闡真風直旌精行之名以奉無為之教崇號廣法大師兼賜紫衣師固辭不受續降勅勸其略曰爰遣內臣遠班成命師號既旌於道行紫衣無爽於受持久屬當人匪宜多讓同光元年囑門人已吉祥而逝世壽八十諡曰法雨大師塔號慈雲此五代後唐莊宗同光元年也三大師傳唐道忍道超道信三人俱南陽人同發誓約求生兜率忍以弘法利人為行而信獨精進居終南禮誦無間日中一食衣唯粗敝行林清苦罔不克為道超稟性敦朴喜怒自平逆順常一別無行業栖託五臺三十年迹不出山一日假寐見草衣童子顧超曰三子之功爾其先也兜率在近子曷昧耶超曰某平生雖有志願且無奇行安在其先耶答曰以子久居清涼道懷虛曠無所執著故冠於二子超曰以二子之行勤篤精至必能生乎答曰二子皆相繼而生但品位在次耳及寤超即盥沐禮佛更延三日而終塔於鷲峯之北周歲忍信二人聞風而至於超塔前燒香散花哀哭戀慕至夕忽見超立於空際天衣飄然望之含笑以水沃二子身明日忍坐脫於華嚴寺及半載信方入滅異香盈室白氣貫天俱葬於鷲峯之北焉慧悟大師傳宋慧悟行唐李氏子其伯母日誦妙法蓮華經洎終火化舌不壞悟母嘗夢其伯母執蓮華一莖授之即有娠及生面貌端嚴舌長覆鼻紅蓮之色音聲雄朗聞者悅服才學語即稱妙法蓮華見僧即喜從父母索食而與之及齠年父母識其宿因遂捨送五臺真容院為僧戒慧嚴明丰姿挺特見者敬畏元祐初上詔入內庭應對稱旨賜以紫衣授僧正之職師力辭之孜孜禪業朝夕勿怠崇寧改元上詔赴京師辭不起天使再至師行至佛道店師曰既逢佛道吾將歸歟言訖屹然而化上聞傷悼不已勅還龕本山建塔藏焉成覺大師傳宋成覺代州張氏子覺生方學語能誦金剛經母見善相送依善住院和希大德受業無何上聞希有道授僧統加號慈懿大師住清涼寺師即從侍咨決無替及受具戒聞師講調御丈夫四事謂近善知識能聞正法思惟義理如說修行由此發機志求聖道服勤三載師知其器乃令參訪囑以確守戒律究深般若隨方開化報佛祖恩覺唯命奉行徧謁師匠聞明教大師即往依焉朝夕砥礪咨決心要洞明唯識一日辭歸五臺教曰吾道北矣至即有絕祝紅塵之志唯欲深造而學者日盛法幢大樹四方之民望若慶雲焉嘗曰學者志於道持心有三要曰大曰專曰遠大則佛祖得處我必當得不為人天小利所牽專則唯究一事不為名相所引遠則以證為期死而後已具此三心必能至道其謙光導物曾不少怠壽八十而終焉善慧大師傳金善慧崞邑霍氏子母夢神人授珠有孕月盈誕慧神彩嶷峻過目成誦兒時以泥作浮圖採野花陳俎豆禮厥父歎曰此兒如是若釋家徒吾失望矣遂婚之居三載脫無染觸父母叱之慧歎曰生死業輪欲為其本三界勞生愛為其根輪迴汩沒無始迄今吾安能復襲斯愆耶父母知其志不可奪聽其出家詣臺山清涼寺依覺成為師成見而驚曰此吾家麒麟兒也孜孜學業罔敢或怠天會間遭兵火殘其寺構茅以居厥師勉令募造慧曰幻影浮光須臾即變己躬下事未能愜心吾安能為他閒事長無明耶囂囂自適曾無他欲天德間有司以慧行聞於帝賜號宣祕大師鑄印令掌治教門四方僧庶既敬且懷望其風者狂夫正懦夫卓油然而興焉臨終謂弟子曰昔伯夷餓死不食周祿後世稱聖賢故知身重乎利義重乎身德重乎義道重乎德君子所以捨其所輕全其所重也吾二十年來己事未純為僧務累殉輕而遺重其德虧矣爾曹勉旃勿踵陋迹也言訖而逝蘇陀室利傳金蘇陀室利西域中印度那蘭陀寺僧內閑三藏外徹五明能誦華嚴經久慕清涼文殊住處年八十五與弟子七人航海來此土七人三還三殞唯佛陀室利一人隨之凡六載始達清涼每一臺頂誦華嚴十部禪寂七日不息不食每入定則見紫磨金城玻璃紺殿寶蓮香水珠網交輝功德莊嚴不可稱述諸天童子遊戲其中後於靈鷲峯化去弟子室利收舍利八合璀璨如珠持歸西土焉慧洪大師傳金鐵勤院慧洪字子範因閱楞嚴一人發真十方銷殞忽悟曰諸佛心印本無玄妙今日始為無事人矣遂造河朔汶禪師所陳其所見汶可之臨終有偈云六十春光又八年浮雲收盡露青天臨行踢倒須彌去後夜山頭月更圓言已更衣坐脫法冲大師傳金大定三年黃冠蕭守真奏上請與沙門角力上許之即召五臺法冲大師入京止昊天寺明日於殿庭相試蕭能飲斗酒自若謂冲曰沙門能飲乎如不能則出吾下矣冲曰吾能一飲十斛不足為難但吾佛有戒沙門不得飲酒請加砒霜鴆毒於中我與若飲庶不為犯若能飲之乎蕭曰請沙門先之冲誦呪飲之即命蕭飲蕭不能飲冲曰汝出吾下矣蕭猶大言矜高冲於地畫金剛圈呪之蕭不覺投入圈中汗下如雨不淨流出帝勸師捨之冲曰若不是帝前吾以金剛鎚擊碎爾由是金主嘉歎賜儀仗送至五臺勅建萬歲寺以師居之無何即化去焉佛日圓明傳元佛日圓明關西人禮中觀沼公為師沼公頗有禪行師從沼於患難中乞食奉養二十餘年初無少怠沼將終師問曰某後當依何人了此大事沼曰慶八十去後至燕之慶壽忽憶前讖遂就中和老人參叩久之一日和謂之曰吾有正法眼藏密付與汝師掩耳而出厥後其道大振暮年入清涼居華嚴寺嘗以偈寄寂庵英禪師偈曰舊來諸事付憨癡不似秋來更喪疑堪笑嶺雲閑不徹臨崖撒手脫毛皮又曰毛皮遠付寂庵子莫謂當人墮生死了知誰是我知音獨有寂庵舊知己未幾命畫工於方丈徧畫海水行雲約當日就工辭不能師曰今日不就事不濟矣至夕泊然而逝華嚴菩薩傳元華嚴菩薩諱正順尉州高氏子生而穎悟志脫塵垢父母不忍拒送詣臺山壽寧用公座下祝髮披緇依年受具結廬深樹唯閱華嚴數盈千部常作華藏觀一夕入觀聞空聲曰和吞山水少會風雲即有契入頂戴華嚴經行住無違世稱華嚴菩薩嘗建華藏閣下為海水出大蓮華毗盧金像坐蓮華上每對佛禪觀三五日方起大元皇太后三詔不赴授五路總攝之職固辭不受成宗幸山大加禮重臨終謂眾曰無盡剎海不離當處妄情未瞥悟入無時門人法忍問未審師今向甚麼處去師喚忍闍黎忍諾師云虛空剖出一莖骨門人乞偈師援筆書之歷劫本無去住應用何思何慮轉身蹋破虛空一切是非不顧言訖恬然而逝是日靈几上有龍瑞五彩飛光燭於庭宇居三日化火自焚拾舍利門人建塔藏之真覺大師傳元真覺諱信明五臺清涼疃高氏子依本山清涼寺洪公披剃年十四業講二十四受大戒述盂蘭等鈔名振叢席日誦大乘殊無少怠元主詔入燕京賜座殿庭應對稱旨命貴戚從師受菩薩戒授以僧統之秩從慶壽海雲和尚咨決心要雲以金書金剛經及菩薩戒授之曰持此二法可為人天眼目師終身持此法修己治人年六十九示疾著三衣趺坐怡然而化真覺國師傳元真覺諱文才字仲華隴西楊氏子少孤事母以孝聞博學能文述慧燈集釋賢首疏內據佛經外援儒老曲盡般若之旨構庵松間人以松堂老人稱之元成宗特旨建寺臺山賜額大萬聖祐國寺詔師主之誨人不倦嘗遊松下一坐忘歸弟子尋之三日而得請歸師曰我方安逸汝何頻呼弟子曰師坐三日矣大德六年卒火化獲舍利百餘粒聞於仁宗詔諸沙門問之曰舍利果何致法弘對曰和氣之浹蒸為菌芝精誠所致其理必然故萇弘死忠其血成碧況道與神會浩養之至者乎夫朽敗之餘標異於烟滅灰飛之際豈非行業堅白神氣凝結者上嘉其論勅歸塔於本寺追封邽國公了性法師傳元釋了性號大林武氏子宋武公之後以諡為姓少即好學聰叡天啟初依安和尚薙髮登具戒歷諸講席精究三藏後遇真覺國師啟迪厥心既而周遊關陝河洛襄漢訪諸耆德從而學焉如柏林潭關輔懷南陽慈諸公皆以賢首之學著稱一時性悉造其門領厥玄旨及歸復參真覺于壠坻乃曰佛法司南其在茲矣乃從真覺至五臺未幾真覺化去遂北遊燕薊晦迹魏闕之下優游渤海之濱與世若將相忘成宗徵居萬寧聲價振蕩內外至大間太后創寺臺山曰普寧延性居之性為人剛毅頗負氣節不能俯仰媚悅于人故足迹不入城闉不謁權貴人或忌之性聞嘗曰予本以一介苾芻蒙天子處之以巨剎惟乃夙夜宏法匪懈圖報國恩不暇餘復何求雖有臧倉毀鬲之言其如青蠅止棘樊耳顧予命之不遭道之不行則納履而去何往而不可也時元世因尊寵西僧其徒眾甚盛出入騎從擬若王公或頂赤毳峨冠岸然自居天下名德諸師莫不為之致禮摳衣接足丐其按顱摩頂謂之攝受性惟長揖而已顧謂眾曰吾敢慢于人耶吾聞君子愛人以禮何可屈節自取卑辱苟為之屈非諂則吾自為道于彼何求識者高之至治元年九月三日示寂塔于竹林之墟諡曰宏教弘教大師傳元弘教諱慧印關西張氏子少攻儒典長業佛書始逾河東從普救月公學圓覺了義又逾河而南從白馬寺大慧國師學華嚴圓極之教復從栖巖益公學唯識等論二十二歲從五峯信公受苾芻大戒於鄢陵二十四以靈峯燦公之勸嗣法於栖巖是歲葛氏設百僧會請印充第一座說法遂知名於世又從律師秀公講四分律二十五從心崖和公學因明等論二十八從大通驗公講華嚴疏三十厭遊盡屏所學居太行之阿修一相三昧七年方得根塵虛靜皇慶元年聲聞遠播承詔至京於安國寺講經王公緇素罔不服化及歸山上賜紫衣香藥遣旌幢送至臺山萬聖祐國寺以主法席至治元年從帝師受祕密之訣二年英宗幸臺山師陪駕遊至南臺帝命師祈嘉應師即禪定帝見白光若水彌滿空際大士影像渺然現中帝慶信無量賜幣及玉文殊像七寶念珠詔陪駕至京師於永福寺校正藏典令太子貴人從師受菩薩戒事訖還山文宗詔住承天寺授司徒一品銀印師固辭上使再至師辭不起至元三年壽六十七示寂火之收舍利建塔藏焉金璧峯傳明寶金字璧峯乾州石氏子母張氏嗜善弗怠有沙門授觀音像囑曰謹事之生智慧兒未幾生兒白光貫屋幼多疾因歸釋依雲寂溫公剃落受具後窮性相學言辭落落若貫珠聞者聳動一日歎曰三藏玄言皆標月指如來心法果如是乎遂棄其所學習禪觀叩晉雲海公公問曰萬法歸一一歸何處師答之不契遂疑之三年一日擷蔬於囿忽凝寂久之海問曰子定耶峯曰定動不關海曰定動不關是甚麼人峯以筐示之海非之峯撲筐於地拱而立海又非之峯低頭不語海把住云道道峯築海脅下仆之海猶未之可爾後工夫益切遁峨眉柏葉為食脅不至席者三年每一坐七日乃起一日聞伐木聲忽悟汗下如雨命根始斷乃曰妙喜謂大悟十八豈欺我哉後歸白之海公公方可之曰無用和尚云汝座下出三虎一彪爾其彪耶爾緣在北當詣朔方必弘吾道師北遊至五臺棲靈鷲庵檀信爭奉逢歲儉檀信恐其饑所施益多師恐民饑止而不受施者不解師遁去乃息歲旱元帝詔祈雨師入城大雨千里帝贈千金師不受帝益敬賜號寂照圓明大師師每聞己過必稽首感懷嘗曰生我者父母教我者師友寧無生我不可無教我有生而無聞幾於牛馬者有之生而有聞至於聖賢者有之是以師友之德父母之德也蓋父母生其身師友能生君子聖賢者也世有愛佞己而惡宣過者乃下愚人也洪武戊申上詔至奉天殿應對稱旨命居天界日接天顏訓唱法義賜紫衣金鉢及御制詩有玄關悟盡成正覺之語一日示疾著衣危坐唱別弟子智信請畱一語師曰三藏法寶尚為故紙吾言何為怡然而逝茶毗得舍利若干五色燦爛齒舌念珠皆不壞門人收之建塔文岫山普光寺師嘗製華嚴佛事梵音清雅四十二奏盛行於世大寶法王傳明大寶法王名葛哩麻烏斯藏人道懷冲漠神用叵測聲聞於中國永樂間上遣使西土迎之師適有五臺之遊應命至金陵道啟聖衷誥封如來大寶法王西天大善自在佛師性樂林泉朝廷之下恐妨禪業奏辭遊五臺上眷注殷勤畱之不已乃賜鑾輿旌幢傘蓋之儀遣使衛送於五臺大顯通寺更勅太監楊昇重修其寺兼修育王所置佛舍利塔以飾法王之居先是上與法王幸靈谷寺齋感塔影金光之瑞及法王入臺山上眷戀不釋然因思前瑞再幸靈谷上默有所禱覩瑞倍前丁亥四月上制書遣使於臺山大寶法王大善自在佛其書略曰朕四月十五日與弘濟大師詣靈谷觀向所見塔影文彩光明珍奇妙好千變萬態十倍於前雖極丹青之巧言論之辯莫能圖說其萬一此皆如來大寶法王大善自在佛道超無等德高無比具足萬行闡揚六通化導羣品實釋迦佛再現世間而乃顯茲靈應不可思議朕心歡喜難以名言略此相報如來亮之明年師奏疏別上入滅火化無遺物是年函谷關吏見師適西貽上所賜玉玦回奏上驚歎追慕勅太監楊昇塑像於顯通法堂具生吉祥傳明具生吉祥中天竺迦維羅國剎帝利種三藏五明無不徹究自謂語言非究竟法入雪山習定十有二年得奢摩他證於迦羅室利尊者尊者可之且令護持明初因禮五臺特來此土浮信度由高昌所經諸國王臣畏敬緇素風靡四越寒暑始達甘肅洪武二年既遊五頂駐錫壽安禪林恆山之民翕然從化七年上聞其行詔住蔣山開化京師聽法者風雲駢集雖很戾之夫見師慈相善心油然而興焉四方檀施填門塞路師漠然自若悉濟飢貧八年春上賜詩慰之有笑談般若生紅蓮之句十四年足患疾不能行上勅醫療之師奏往五臺上疑其狂師白眾曰今日五臺之行有能從我者否弟子曰某從之師舉患足曰汝無這一足安能從我乎至午盥沐更衣危坐弟子請最後垂訓師舉念珠示之弟子曰和尚教我念佛耶師擲念珠在地長吁而化焉茶毗得五色舍利及烟燄所及皆薰成舍利掇於松枝若貫珠焉門人建塔於西林庵有示眾法語三卷并譯七枝戒本傳於世釋見心復公為碑銘釋迦也失傳明釋迦也失天竺迦毗羅國世尊之裔也功德罔極神用難測仰文殊之道來遊清涼永樂十二年春始達此土棲止臺山顯通寺冬十一月聞於上遣太監侯顯詔至京入內預勅免拜賜座大善殿應對稱旨上大嘉歎勅安能仁方丈上制書慰勞所賜甚厚明年上制書賜金印寶誥封妙覺圓通慧慈普應輔國顯教灌頂弘善西天佛子大國師之號無何辭上入臺山每一定七日乃起上數數制書遣使致慰至於宣宗尤加欽崇禮出常格宣德六年旋西域焉孤月禪師傳明孤月禪師諱淨澄燕京西河漕張氏子師生時偶二僧至厥父喜即請安名僧曰此兒非常應名清正父母亡後即有出家志行至雙城於路逢僧求落髮詢其來緣乃初立名僧也遂就金河寺剃落其師令習經業師不悅只願修行示以念佛法門師拳拳奉行未周歲厥師卒復詢知識偶遇五臺壽寧寺僧清善即易其名曰淨澄到山執僧務久之自覺工夫不純即走古華巖煉磨日夜逼拶幾一載一日凝滯頓開如去重負即詣北京求證於廣恩月溪老人陳其所悟溪拶數語汗下不能對溪曰汝得信念爾遂令參狗子無佛性語疑情頓發打成一片第三日忽有省溪問汝連日受用如何師曰風清月白地厚天高溪喝師掩耳而出一日打坐僧問曰汝不看經作甚死模樣師喝曰還我活句來僧無語居無何溪可其悟即付之拂子手卷南遊度黃河舟沒所有俱失師附浮木而出自思所得未愜即發願曰此行若不大悟誓不北歸自此工夫益切入蜀川飛雪山磨鍊身心獨居過三年一日造飯中得定及出定飯生白醭矣一日方坐聞聲曰祖順蹋破腳了三日後人到印對前言無差在百里之外蓋靜極徹聽也師於地上打坐冷氣傷足不能行眾荷至後山將息好眾請開示師固辭一日木頭上坐正爾湛寂忽聞爆竹聲豁然心空自此方得一切時中洞然明妙師辭眾詣圓覺法鑑和尚處陳其所悟覺曰子向後還做工夫否師曰隨分覺曰若然則飢餐渴飲去也師曰終不作如是見解覺頷之後造廣福雲谷和尚挂搭久之谷見其一向孤迥迥底即問曰你恰似死人一般我且問你大死底人卻活時如何師曰眉毛眼上橫鼻孔大頭垂又問如何是無字意師云風行草偃水到渠成又問大地平沈虛空粉碎汝向什麼處安身立命師曰雲消山嶽露日出海天清谷肯之遂付衣鉢天順改元返清涼道聲遠震代王請詣內掖問道感光明庭煥王心大悅而師禮焉王斥俸金建寺臺山華嚴谷請額曰普濟後坐脫於本寺焉嘗有居山詩云寰中獨許五臺高無位真人伴寂寥一任諸方風浩浩常空兩眼視雲霄甘貧林下思悠悠竹榻橫眠枕石頭格外生涯隨分足都緣胸次為無求自住丹崖綠水旁了無榮辱與閒忙老僧不會還源旨一任山青葉又黃亦有清涼錄行於世大巍禪師傳明大巍淨倫禪師雲南康氏子古庭堅和尚住皖城浮山師往叩室中機契後出世顯通上堂無孔鐵椎當面擊黑漆崐崙攔路坐莫有捱拶得入拈弄得出底出眾道看僧問如何是臺山境師曰不是天晴便是下雪如何是境中人師曰金剛窟裏萬菩薩未審尋常所說何法師曰清風吹幽松近聽聲愈好僧問如何是佛法的的大意師曰今年調雨水農家好種麥僧問如何是祖師西來意師曰待萬仙山即金剛窟轉身即向汝道乃曰拈砒霜作醍醐亦曾有也撒珍珠如瓦礫那箇不然開眼上樹特地喪家聲夢昇兜率未免揚家醜不動情思轉魔女盡成菩提寶器不勞腕力指娑婆便為妙喜淨邦長水璿岳積而來瑯琊覺冰消而去信腳蹋翻琉璃穽等閒擊碎珊瑚枝冬至示眾五頂瓊瑤堆千松珠玉枝盡臺山泉石烟雲飛樓涌殿總是文殊一隻智眼真光是汝諸人常在於其中經行及坐臥還知從不曾動著渠一莖眉毛麼若也與麼見得便爾攝大千於毫端廓塵沙於法界其或未然切忌東卜西卜老僧為汝真實告報今朝冬至一陽生珍重寶印禪師傳明臺山龍樹庵寶印禪師親近大川洪和尚一日晨興覩明星有省述偈曰日出東山月沈西嶂昨日今朝曾無兩樣師初與楚峯玉堂同參臨行大川授以讖曰向去三人載一車後至蛇溝三人同結庵而居遂成叢林蓋蛇溝俗名車溝也將入滅預知時至說偈辭眾念佛而逝楚峯和尚傳明楚峯和尚初居祕魔巖十餘載木食磵飲人不堪其憂師泊如也後參大川和尚聞火爆聲豁然大悟作偈曰眼睛突出死柴頭赫赫神光照四洲觸處現成人不委幾回春去又逢秋無邊禪師傳明僧無邊嗣楚峯和尚峯嗣大川洪洪嗣天奇瑞邊溯臨濟為二十八代孫峯嘗囑曰爾後有鉢飯當共衲子食嘉靖四十三年於紫霞谷掘地得銅鉢受斗餘遂成叢林即以大鉢名其庵瑞峯禪師傳明瑞峯三際廣通禪師久侍笑巖室中機契付以偈曰一念不生諸數滅萬機休罷十方空界空數滅漚澄海諸佛眾生影現中後居臺山僧無明經參問曰某於古德機緣每多疑處乞師指示師曰試舉看經歷舉數則師逐一答之末云趙州勘破臺山婆子未審勘破在甚麼處師笑曰卻是婆子勘破趙州經乃呈頌師皆可之無明經乃大徹後徧參諸方不可獃認為未悟而參也如馨律師傳明如馨律師字古心溧陽楊氏子嘉靖間禮棲霞素庵節公薙髮精嚴五德禮誦尤勤事師三載一念無違其時談經者多弘律者尠馨喟然曰佛法住世功在毗尼盍專律學以報佛恩因閱華嚴至菩薩住處品知文殊大士常住清涼冀瞻慈相辭諸法侶腰包而行三踰寒暑方眺寶峯於金剛窟畔景值餘暉徘徊瞻眺忽見老母形枯髮白冠敝衣鶉捧僧伽黎自林間出呼馨而告曰大德禮懇殷勤不憚勞苦我此法服子昔受持不意中違今應贈汝文殊難見徒費劬勞見仍不識亦何所裨馨默然遲疑母去數武喚言大德比丘我即文殊馨疾趨攀挽已失其處惟伽黎存焉乃泣禮返步適寺僧夢神致囑優波離尊者來汝等速迎致禮以是因緣僧徒共曉沿途士女香花供養不可數計因挂錫妙德庵復感五頂放光於寶光中見大士手為摩頂心地洞開復徧遊諸方道侶皈信抵金陵吉祥里創剎即名古林龍象遠集法會雲興神宗特勅延至五臺命司禮內臣張然代受菩薩戒陞座之頃五色祥雲結蓋盤空內臣還奏賜號慧雲律師并頒賚金頂毗盧帽千佛珠衣鉢盂錫杖功德圓滿仍返古林遠清律師傳明遠清字澄芳新安人夙具奇姿雅懷高素既謝塵俗徧遊名勝初習賢首精通教觀負笈南來至止越邦時慧雲律師方說戒于武林靈隱夜夢有人語云明日有文殊化身來乞戒可方便為彼授之翌旦清率眾趨壇執弟子禮慧雲驚異問所從來云自五臺向雖宏法尚未近圓久慕道風今欲歸依慧欣然應許興辭而退及法期已屆大眾登壇清獨未至慧復憶前夢方便攝受因遣人探詢清果有恙不可以風慧雲感彼神語不吝慈悲統眾就之一時三壇方便授受清既得戒懷寶而歸徑造五臺精研律部善達意旨開遮無礙尤善屬文嘗謂古有戒壇自明以來歲久封錮欲興此舉非叩帝閽其道末由乃具文疏略述梗概因內宦奏之時神宗御極雅重佛法覽疏大悅遂奉旨南下詔慧雲赴五臺振茲法雷弘爾象教並敕兩街及內使御馬監張然齎衣鉢錫杖賜之說戒三年敕建聖光永明寺更賜紫衣金帛恩榮重渥莫與比數乃值寇盜戎馬騷動慧雲講演一期竟爾南歸命清繼席遂終三載無違聖諭法戒大興果符神兆世壽僧臘均無可考唯靈塔一區長峙五臺紫柏大師傳明達觀名真可晚號紫柏其先句曲人父沈連世居吳江母夢異人授附葉大鮮桃寤而香滿室遂有娠可生五歲不語有異僧摩頂謂其父曰此兒出家當為人天師言訖忽不見可遂能語髫年性雄猛慷慨激烈貌偉不羣弱不好弄生不喜見婦人年十七仗劍遠遊塞上至蘇州閶門天大雨值虎邱僧明覺相顧盼壯其貌以傘蔽之同歸寺聞僧夜誦八十八佛名心大快悅晨入覺室曰吾兩人有大寶何以汙在此中耶解腰纏金授覺令設齋請剃髮遂禮覺為師自是閉戶讀書年半不越閫見僧有飲酒茹葷者曰出家兒如此可殺也僧咸畏之年二十從講師受具戒至常熟相國嚴養翁識為奇器留月餘既之武塘景德寺掩關三年復回辭覺曰吾當行腳參知識究明大事遂策杖去一日聞僧誦張拙見道偈至斷除妄想重增病趨向真如亦是邪可曰錯也當云方無病不是邪僧云你錯他不錯可大疑之疑至頭面俱腫一日齋次忽悟頭面立消自是陵躒諸方嘗曰使我在臨濟德山座下一掌便醒安用如何如何後北遊至京師參徧融笑巖諸大老萬曆三年南歸至嘉禾見太宰陸五臺心大相契每念法道陵遲大藏卷帙重多難為徧布欲刻方冊易以流通普使見聞作金剛種于十二年發起倡募至十七年創刻于五臺山妙德庵董其事者為密藏道開又有幻余法本為之輔弼歷四年以五臺苦寒遂移于徑山寂照庵以嘉興楞嚴寺為藏板及印刷所可初于刻藏有成議後乃返吳門省得度師刻藏事詳見本志密藏傳後之都門訪憨山於東海又西遊峨眉禮普賢繼至匡廬尋歸宗故址志願重興克符所願江州邢孝廉延居長松館可為說法語名長松茹退復北遊至潭柘慈聖聖母聞可至命近侍陳儒致齋供特賜紫伽黎可固讓曰自慚貧骨難披紫施與高人福倍增儒隨可過雲居禮石經於雷音寺啟石室佛座下得金函貯佛舍利三枚光燭巖壑因請舍利入內供三日出帑金重藏於石窟以聖母齋襯餘金贖琬公塔即石經處邀憨山偕往瞻禮并囑作記回寓慈壽與憨山同居西郊園中對談四十晝夜目不交睫信為生平至快事二十三年憨山觸聖怒詔逮下獄可在匡廬聞報許誦法華百部冀祐并擬赴都相救旋聞南放乃待於江滸及會執手歎曰公以死荷負大法公不生還吾不有生日二十八年上以三殿工榷礦稅中使者駐湖口南康太守吳寶秀劾奏被逮其夫人哀憤以繯死可聞之曰時事至此其如世道何遂策杖赴都門吳入獄可多方調護授以毗舍浮佛半偈囑誦滿十萬當出獄吳持至八萬蒙上意解得末減可每歎曰老憨不歸則我出世一大負礦稅不止則我救世一大負傳燈未續則我慧命一大負若釋此三負當不復走王舍城矣三十一年癸卯忽妖書發震動中外忌者乘閒劾可竟以是罹難幸早見重於帝適見奏章意甚憐之在法不能免因逮及旨下云著審而已訊鞫但以三負事對絕無他辭時執政欲死之可聞曰世法如此久住何為乃索浴罷囑侍者性田曰吾去矣幸謝江南諸護法說偈端坐安然而逝御史曹學程以建言逮繫問道於可聞急趨至撫曰師去得好可復開目微笑而別時癸卯十二月十七日也壽六十一臘四十一可嘗教人誦毗舍浮佛偈憨山問師還誦否曰持二十年止熟一句半若熟二句則死生無礙矣如此自由安逝乃持偈之實效足見其悟證之高深化後待命六日顏色不改及出徙身浮葬於慈慧寺外次年秋陸西源欲致可肉身南還啟之安然不動緇素見之無不感歎禮敬乃奉歸徑山供寂照庵又越十三年丙辰方茶毗建塔於大慧塔後開山第二代之左曰文殊臺可徧禮諸方無剎不至及常遊都下上悅帝心凡普陀敕建殿閣皆其啟奏之力每見古剎荒廢必志恢復始從楞嚴終至歸宗雲居等重興梵剎一十五所以未出世故無上堂普說示眾諸語但就參請機緣開示門人輯之有紫柏全集三十卷入清藏妙峯大師傳明妙峯名福登山西平陽人姓續氏春秋續鞠居之裔生秉奇姿脣掀齒露鼻昂喉結七歲失恃怙為里人牧羊十二歲投近寺僧出家僧待之虐逃至蒲坂行乞于市夜宿郡東文昌閣閣係山陰王建請萬固寺朗公居之一日山陰王見之謂朗公曰此子五官皆露而神凝骨堅他日必成大器當收為徒善視之未幾地大震民居盡塌登壓其下無所傷王益奇之乃修中條山棲巖蘭若令登閉關專修禪觀日夜鵠立者三年入關未久即有悟處作偈呈王王曰此子見處已如此若不挫之後必發狂遂取敝履割底書一偈云者片臭鞋底封將寄與汝並不為別事專打作詩嘴封而寄之登接得禮佛以綫繫項自此絕無一言矣三年關滿往見王則本分事明具大人相王甚喜令其往聽楞嚴受具戒繼又令其徧參知識北方乾燥及到南方朝普陀因受潮溼徧身生疥發願造滲金文殊普賢觀音三大士像並銅殿送五臺峨眉普陀以永供養回至寧波染時證幾死旅宿求滴水不可得遂以手掬浴盆水飲之而甘次日見其甚穢大嘔吐忽悟曰飲之甚甘視之甚穢淨穢由心非關外物即通身發汗而瘉而疥瘡仍舊至南京大報恩寺無極法師講華嚴懸談憨山為副講登討一淨頭單以期養病而聽經每日于大眾過堂及放養息時打掃廁室甚為清潔憨山億此淨頭必是高僧遂私訪之與登訂盟為同參不久廁室不潔憨山知登去遂亦去尋之登去後回蒲州乃於中條最深處結茅靜修辟穀三年大有所悟山陰王於南山建梵宇請登居之又令往北京請藏經於京師市中得遇憨山及經事完畢同至蒲州次年同往五臺卜居於北臺下龍門之妙德庵越三年各寫華嚴經憨山用泥金刺血和金寫其金紙皆慈聖皇太后所賜登則刺舌血和硃寫各以此報罔極恩及經畢登擬建無遮大會百二十日事已妥慈聖太后遣官來山祈皇儲遂以此功德通歸祈儲過十月皇儲生即泰昌也此會已畢登與憨山以大名之下不可久居同皆下山隱遁憨山往牢山登往蘆芽山結庵以居太后命人訪而得之即為賜建蘆芽華嚴寺成一大道場自此建叢林修橋梁鋪山路者二十餘年凡大工程他人不能成者一請登料理不久即成成則去之不復過問一生所興大道場十餘處並其他工程由登之福德智慧與其忠誠故上自皇帝宰輔以訖士庶無不景仰信從而樂施之三大名山之銅殿亦登所親製將終前晉王請修山西省城大塔寺殿宇工完又修會城橋長十里工未完登以疾還山乃料理所建道場通為十方常住各得其人向來輔助料理之眷屬悉令歸萬固不留一人於餘處至臘月十九日端坐而逝壽七十三臘四十餘時萬曆四十年將逝之前數日皇帝勅封真正佛子之勅黃到及聞其逝又賜金建塔並令凡登所有未完之工悉令完之猗歟懿哉如登者可謂人天師表法門砥柱矣當其閉關得鞋底時若非有大根行當即氣死豈肯以此繫之于項乎況已通宗教後為養病故討淨頭當今人稍有見處令彼打掃佛殿尚不肯況廁室乎又況偷空打掃必致極其淨潔乎所興十餘處大道場自己眷屬一人不住其謙卑自牧無有我相唯知為法為人了無自私之念非乘願再來振興法道者能如是乎登一生道行功業詳具夢遊集本傳今略舉其大概而已密藏幻余傳明密藏名道開南昌人棄青衿披剃於南海聞紫柏道風往歸之紫柏知為法器留侍焉嘉興楞嚴寺為長水法師疏經處久廢有力者侵為園亭紫柏慨然傷之欲為恢復計囑開任其事陸太宰弟雲臺為建禪堂五楹既成紫柏刺臂血題其柱云若不究心坐禪徒增業苦如能護念呵佛猶益真修後二十年太守槐亭蔡公捨資重修之蓋紫柏願力所持也居常歎法道陵遲又念大藏卷帙重多遐方僻陬有終身不聞佛法名字者欲刻方冊易以流通普使見聞作金剛種子即有謗者罪當自代遂與太宰陸光祖司馬馮夢禎廷尉曾同亨冏卿瞿汝稷共商度之以開董其事於萬曆十七年己丑創刻於五臺妙德庵居四年以冰雪苦寒復移於徑山寂照庵工及半開以病隱去幻余名法本不詳氏族曾親近雲谷紫柏二師及紫柏提倡刻方冊大藏法本道開同任其事其為功德何可泯沒今將紫柏集中最初刻藏緣起附之于後庶後世學者知紫柏密藏幻余三大師為法為人之一番熱心也紫柏云嘉隆間袁了凡以大法垂秋僧曹無遠慮不思宋元之世大藏經板海內不下二十餘副自明已來南都藏板印造者多已模糊不甚清白矣且歲久腐朽燕京板雖完壯字畫清白顯朗以在禁中印造苟非奏請不敢擅便又世故無常治亂豈可逆定不若易梵筴為方冊則印造之者價不高而書不重價不高則印造易書不重則易廣布縱經世亂必焚燬不盡使法寶常存慧命堅固譬夫廣種薄收雖遭饑饉不至餓死時法本禪人實聞此言但本公自顧力弱不能圖之然此志耿耿在肝膈間無須臾敢忘者也至萬曆七年予來自嵩少挂錫清風涇上去大雲寺不甚遠寺有雲谷老宿乃空門白眉也時本公為雲谷侍者予訪雲谷於大雲復值本公在焉既而談及刻藏之舉以為非三萬金未能完此眾生以財為命豈易乞哉大都常人之情有傷其命雖父母兄弟妻子之間有不悅者以世外之人乞人性命誰願之哉予曰小子何不見大若是乎但恐辦心不真真則何慮無成且堂堂大明反不若宋元之盛哉宋板藏經亦有書刻者元板亦不下十餘副子急圖之勿自歉老漢雖不敏敢為刻藏之旗鼓旗所以一人之目鼓所以一人之耳目一則明耳一則聰聰之與明眾生之所本有者特無大法以熏開其心故雖有而不能用子謂眾生財與命同以故難乞殊不知以財為重者誠聰明未啟耳如聰明一啟即知此身幻化非堅此心起滅不常矣既知此矣即乞其頭亦歡然願施者況身外阿堵物耶於是法本輩化弱為強轉狹為廣視刻藏之舉若壯士屈伸臂耳了無難色然猶未舉行也及密藏開公問法於老漢因而囑以刻藏之事開公曰易梵筴為方冊則不尊重無乃不可乎予破之曰金玉尊重則不可以資生米麥雖不如金玉之尊重然可以養生使梵筴雖尊重而不解其意則尊之何益使方冊雖不尊重以價輕易造流通必普千普萬普之中豈無一二人解其義趣者乎我又聞之我法如塗毒鼓於眾人中擊之發聲無論有心無心聞之者命根皆斷若然者不唯尊重供養者有大功德即毀之謗之之徒終必獲益且娑婆度生以折門為先攝門次之縱使輕賤方冊之輩先墮地獄受大極苦苦則反本反本則知墮地獄之因知因則改過改過則易輕賤為尊重是以攝之不可則折之以折之之故則見有地獄既見地獄則痛想天堂矣由信天堂而信佛故尊重與輕賤乃翻手覆手耳老漢是願一切眾生輕賤佛法墮地獄中因地獄苦發菩提心若然者易梵筴為方冊則廣長舌相猶殊勝萬萬倍矣子何不智若此乎於是道開聞予言泣涕俱下跪而發誓曰謹奉和尚命若有人捨三萬金刻此藏板者道開願以頭目腦髓供養是人自今而後藏板不完開心不死由是觀之則法本道開不才老漢及現前一切刻藏施主皆袁了凡之化身也又紫柏令幻余募緣之文曰夫大藏佛語也而大藏之所詮者佛心也佛語如薪佛心如火薪多則火熾薪盡則火不可傳火不可傳則變生為熟破暗張明之用幾乎息矣故傳火必待於薪而火始有用傳心必合於佛語而心始無疑我心既無疑佛心我心也佛心我心則凡有知覺者孰非佛耶雖然眾生本佛奈何日用而不知謂之根本無明譬如生盲之人出胎墮地雖長百歲終不知天地日月是何物也眾生本佛日用不知謂之生盲謂之無明不亦可乎夫生盲之人一旦得良醫抉其障翳則天地之大日月之明了然無惑矣眾生之無明若不得佛語之金錍抉其無明障翳雖佛性本有烏能識哉如火未始不在也不得薪以傳之則火不可得而用也故曰地二生火天三成之三若不成則火雖在亦不可得而照物也如眾生正因佛性雖在不得緣因佛性熏之則了因不開了因不開則正因終不得而復矣由是而言緣因佛語也了因佛語之所詮者也正因則眾生本有之自心也自心固有不得佛語傳之了因了之自心雖固有終不能用也正如火在而不得薪以傳之火亦終不可得而用也是故有志於用自心者必先明佛語夫自心明則無往而非明矣故曰不明自發則諸暗相永不能昏而永不能昏之人始可以開物成務矣予是知大藏一刻豈唯凡夫可以登正覺實治道中開物成務一大機也刻大藏之緣始今某將丐緣於四方馮太史跋其前予繼太史而復跋之者蓋念聚薪不易如薪聚而火不傳者未之有也佛語宏傳而眾生不明自心者亦未之有也某行矣無滯蓮池大師傳明袾宏字佛慧號蓮池俗姓沈杭州仁和人年十七補諸生以學行重于時鄰有老嫗日課佛名數千問其故嫗曰先夫持佛名臨終無病與人一拱而別故知念佛功德不可思議宏自此遂棲心淨土每書生死事大四字于案頭以自策戒殺生歲時饗祀陳蔬果而已年二十七喪父三十一喪母泣涕曰親恩罔極正吾報答時也遂決志出家繼室湯氏亦長齋奉佛除夕命湯氏點茶捧至宏前盞忽裂宏笑曰因緣無不散之理明年元日為嘉靖四十五年訣湯氏曰恩愛不常生死莫代吾往矣汝自為計湯氏洒然曰君先吾亦將行矣宏為作一筆勾詞投西山無門洞性天理和尚薙髮乞昭慶寺無塵玉律師受具戒徧參諸方知識北遊五臺感文殊放光住妙德庵與憨山妙峯盤桓四十餘日至伏牛隨眾煉磨入京師謁徧融笑巖諸大老每參念佛者是誰南還過東昌發悟參究彌篤杭州諸寺多禪期宏與會者五終不知鄰單名字隆慶五年宏乞食梵村見雲棲山水幽寂有終焉之志山有廢寺伏虎禪師故居也土人楊國柱陳如玉等結茅以棲宏宏孑然無侶往往絕糧倚壁危坐而已山中多虎環山四十里傷人甚眾居民苦之宏為諷經千卷施鬼神食自是虎不為患歲亢旱居民乞禱雨宏曰吾但知念佛無他術也眾固請宏乃持木魚出循田塍行唱佛名時雨隨注如足所及眾悅相與庀材造屋衲子日歸附遂成叢林宏痛念末法學者掠影宗門撥無淨土有若狂象講師輩知解依通說食不飽如法思惟唯念佛一門橫截生死普攝三根于是單提淨土著阿彌陀經疏鈔十餘萬言總持圓頓諸經融會事理指歸一心書成一時緇白之流歸心淨土者若魚龍之趨溟渤也宏又以佛設三學戒為基本南北戒壇久禁不行宏令求戒者具三衣于佛前受之宏為證明已受者半月誦梵網戒經及比丘諸戒品眾共推宏精律制為第一行因著沙彌要略具戒便蒙梵網經疏發隱淨慈寺僧性蓮請宏講圓覺經于是贖寺前萬工池畜生魚其後增拓之復開城中上方長壽兩池畜魚益眾歲費百餘金禽畜別一區歲費粟二百石宏每言天地之大德曰生天下之大惡曰殺生著戒殺文慈聖李太后見而善之遣內侍齎紫袈裟白金問法要宏書偈進曰尊榮豪貴者由宿植善因因勝果必隆今成大福聚深達罪福相果中更植因喻如錦上華重重美無盡如是修福已復應慎觀察修福不修慧終非解脫因福慧二俱修世出世第一眾生真慧性皆以雜念昏修慧之要門但一心念佛念極心清淨心淨土亦淨蓮臺最上品于中而受生見佛悟無生究竟成佛道三界無倫匹是名大尊貴當是時雲棲道風聞天下僧眾日集其設規條益嚴大堂之外習禪念佛息老病安行腳各有堂百執事有寮夜必巡警擊板唱佛名聲傳山谷布薩羯磨舉功過行賞罰凜如也綜核巨細別白因果未嘗妄費有餘輒散施諸山垂老亦躬自出溺器浣濯衣袴小沙彌拜未嘗不答拜宰官居士問道者踵錯接之無加禮飯脫粟臥敗席亦莫不安之宏極軫幽冥之苦手定水陸儀文及施食壇儀每親設之有見宏于座上現如來像者蓋方作如來觀也萬曆四十年七月二日示寂先十餘日入城別諸弟子及故舊還山設茶別眾至月朔晚入堂告眾曰明日吾行矣次夕入丈室示微疾瞑目坐召城中諸弟子至宏復開目云大眾老實念佛莫捏怪莫壞我規矩向西唱佛名而逝年八十一僧臘五十湯氏後亦出家為尼先一載化去自宏化後百有餘年雲棲香火特盛冠諸叢林而淨業則遠不及昔矣清世宗極為欽崇為作傳封淨妙真修禪師讚曰三乘十地頓漸偏圓一句具足法爾如然作麼一句阿彌陀佛方廣等平圓通明徹可謂百年後之知己者鎮澄法師傳明鎮澄字空印姓李氏宛平人父仲武母呂氏夢一僧持錫入室覺而遂生幼性聰慧不類凡兒嬉戲喜作膜拜年十五投西山廣應寺禮引公得度為沙彌服勤三年登壇受具一江灃西峯深守庵中諸師弘教于大都澄尋依講肆參窮性相宗旨融貫華嚴靡不該練如是者十餘年復從小山笑巖究西來密意妙契心印一時義學推為上首明萬曆壬午憨山妙峯結隱五臺將集海內耆碩建無遮法會招澄至欣然相許以所居紫霞蘭若居之壁觀三年大有開悟塔院主人大方廣公請修清涼志隨留講諸經聲光赫奕四方學者日益集先是釋智光于獅子窩創十方禪院效遠公結蓮社修淨業澄亦預社講演華嚴學者數千指坐寒巖冰雪儼金剛窟中也慈聖太后為國祈福注念臺山聞澄風雅重之特賜大藏經尋復命澄于都城千佛寺講所著楞嚴正觀復于慈因寺講演諸經時妙峯造千佛銅殿于大顯通寺神宗嘉其功行命重修更賜額曰永明建七處九會道場延諸法師講演華嚴以澄主第一座會罷以古竹林寺文殊現身處也廢久復葺所用多出內帑不日而成更集學子重講華嚴疏復修南臺為文殊化境自是疲于津梁遂謝諸弟子默然兀坐頃之示微疾猶危坐三日夜中宵寂然而逝萬曆四十五年六月十四日也世壽七十有一僧臘五十有奇塔于竹林寺之左澄生而安重寡言笑律身甚嚴而處眾以和說法三十餘年三演華嚴雖登高座萬指圍繞意若無人天廚日至而疏糲自如居嘗專注理觀脅不至席淵沈靜默老無惰容受法弟子以千百計出其門者率皆質樸無浮習其于講演提綱挈要時出新意北方法席之盛稽之前輩無出其右者所著有楞嚴正觀金剛正眼般若照真論因明起信攝論永嘉集諸解行於世憨山大師傳明德清字澄印憨山乃居清涼時自號也俗姓蔡南京全椒人母夢大士抱兒授之而生清七歲叔父死尸于牀問母曰叔父何處去耶即疑不解九歲能背誦普門品年十二辭親入南京報恩寺依師翁西林和尚內江趙大洲見而異之問曰汝圖作麼答曰圖作佛大洲撫之曰兒他日當為人天師年十三受法華經四月成誦遂以次誦諸經及世間書年十九雲谷大師勖以向上事取中峯廣錄讀之大快遂薙髮修念佛三昧日夜不斷一夕夢阿彌陀佛現空中毫相分明觀音勢至左右侍自此每入觀三聖炳現信向益篤其年冬受具戒于無極法師聽講華嚴懸談悟法界圓融無盡之旨慕清涼國師之為人遂發心欲遊五臺明年從雲谷禪師結禪天界寺發憤參究疽發于背禱護伽藍神願誦華嚴經十部假三月以畢禪期禱已熟寐晨起脫然瘉居六年將遊五臺抵北京參徧融笑巖諸老宿入盤山度夏明年偕同參妙峯結冬蒲坂清向閱肇公物不遷論至旋嵐偃岳之旨疑之及是閱梵志語曰吾猶昔人非昔人也恍然有悟作偈曰死生晝夜水流華謝今日方知鼻孔向下妙峯詰其所得清曰夜來見河邊兩箇鐵牛相鬬入水去至今絕消息遂與妙峯去之五臺入龍門老屋數椽宴坐其中單提一念有來者目之而已當春夏交大風時作流凘衝擊如萬馬馳驟聲以問妙峯妙峯云不見古人道三十年聞水聲不轉意根當證觀音圓通清然之谿邊有獨木橋行坐其上久之忽然忘身眾籟都寂自此水聲不復入耳矣一日粥罷經行忽立定及從定起光明湛然覓身與心了不可得說偈曰瞥然一念狂心歇內外根塵俱洞徹翻身觸破太虛空萬象森羅從起滅因奸商伐木不能禁往雁門祈兵備道胡公護持居署中入定五晝夜胡公撼之不動鳴引磬數聲乃出定還山刺血泥金寫華嚴經每下一筆念佛一聲念念不斷久之動靜一如得大自在寫至行願品偶隱几假寐見紺殿華臺諸聖影現清手捧梵筴長跪竊念梵書何能辨之乃聞高座唱曰有分別識無分別智識隨生死智會涅槃如是千百句梵文即變為漢字遂於智識明了洞徹時神宗未有太子萬曆九年李太后遣官五臺建祈儲道場以妙峯與清主之明年光宗生清尋遁入東海之牢山牢山者華嚴經所謂那羅延窟也結茅山南而居之太后聞遣中使再徵不起賜三千金以造寺復固辭中使不敢復命清曰古有矯詔賑饑之事山東歲凶以此廣聖慈于饑民不亦善乎中使從之持賑籍還報太后感歎命頒藏經一部仍率諸眷屬輸金造寺賜額曰海印清詣京謝恩復為南京報恩寺請藏經即命清送之將至寺塔放光者累日還復命仍歸牢山歲復大饑清散所儲糧賑之不足汎舟遼東糴豆數百石以濟牢山之民無饑死者初牢山人多從異教不知佛法清住山十三年方便說法信從者日眾有里豪謀占道場構道士控有司誣清侵占道院既按驗不實而罷時太后屢遣中使分頒藏經于諸名山修諸塔寺神宗惜其費頗怒中使權貴與中使有隙者因藉端令東廠番役偽為道士擊登聞鼓以侵占事聞遂逮清至京付鎮撫司究問并按太后前所施帑金數十萬考掠時清從容對曰公欲僧誣服易耳獄成置聖母何地公所按數十萬在官家錙銖耳柰何以錙銖故傷聖母心問者憚乃具獄上所列唯賑饑三千金有內庫籍可考然猶坐私造寺院戍雷州既至就壁壘間構禪堂冠巾說法歲大疫死者相藉清率眾掩埋作廣薦法會七日大雨三日疫即止清自五臺發明心地回視諸經了無疑義遂發弘經之願及是楞伽筆記成旋著楞嚴通議法華通議皆直指心原脫略章句一時推宗說俱通者必歸焉二十八年南韶道祝君請師住曹谿祖庭乃反侵田斥僦舍修祖殿闢僧寮百廢具舉緇白坌集會紫柏可公以妖書事連坐京院飭行有司檄師還戍所四十二年李太后崩奉恩詔反僧服又二年還過廬山結庵五乳峯下東遊吳越反廬山以所居庵接十方來者名曰法雲寺清初以念佛入道至是效遠公六時刻漏專修淨業示人偈曰但觀一句彌陀佛念念心中常不斷若能念念最分明即與彌陀親見面只想淨土在目前日用頭頭無缺欠佛土全收一句中便是往生異方便只在了了分明時不可更起差別見復以次講大乘諸經論居四年應粵人請重住曹谿天啟三年十月示微疾韶陽知府張君來問疾清坐語如平時既別沐浴焚香集眾告別危坐而逝年七十僧臘五十九時谿水忽涸百鳥哀鳴夜有光燭天三日入龕面如生清所著自諸經外其唯識起信諸論及大學中庸春秋左氏老莊等書各有論著刻行于世䒢溪禪師傳清行森號䒢溪又號慈翁博羅人俗姓黎氏器宇神俊壯歲四大偶不安和倚枕間忽聞鼓吹聲頓省根源不從他有遂決志出家依雪嶠信信示寂乃參大覺普濟能仁國師玉林琇洞明心要琇令分座說法接引海眾十方參承捷得解脫一時目為大鵬劈海又稱為森鐵棒云開化龍溪緇侶輻湊大清順治十五年戊戌世祖章皇帝召玉林琇入京琇令森主報恩法席己亥玉林還山森奉詔留京師世祖章皇帝寵遇極隆屢降恩旨欲加封號森以父子不敢並受封奏辭甚力世祖從之既而請謁五臺山宿顯通寺寺前遇一老婆子手提竹籃口嚼石子若仙若神與語深明宗旨呼森為大通佛自五臺回遂乞歸龍溪世祖賜名所居寺曰圓照御書以賜森持律精純導眾嚴整雅有百丈之風雖機辯迅利而實能正眼接人非祇露一己之爪牙者受世祖章皇帝知遇甚深及其歸里如日邊雲影既離絳霄即隨意孤飛斷崖荒水間不挂一絲真是無為道人所行如其所解世諦無非第一義諦足以媲美玉林為千古衲僧規則康熙十六年遊華巖曰此中修篁奇石可以臥數江帆吾老此畫圖中矣乃自刻化期手書封龕偈而寂世壽六十有四僧臘三十有六蓋生於明萬曆之四十二年也大清雍正十一年追封明道正覺禪師贊曰一人首出八表昇平爰有龍象僧中之英十虛融攝正眼洞明日光月華水綠山青雍正十一年五月十五日御筆阿王老藏傳清阿王老藏燕京西山之喇嘛也姓賈氏生甫十齡父母送之崇國寺為沙彌年十八始受具稟性超穎度越儕伍已習韋馱兼究瑜伽慧根自覺真空獨證于番漢經書一目俱了復歷講肆徧聆奧義至於三密護身壇儀悉練五部印契宣導咸推會大清定鼎順治初元應詔入都藏與同壇五人攝𪗋受戒有一上士忽諦視曰此中有一五臺主人眾皆惘然莫測所謂及順治己亥藏果以兼通番漢膺選乘傳上主五臺總理番漢經典舊時所譯多所訂正上士之言始為有徵自莅眾茲山乳竇重流荊條復茂損食減衣以施貧乏禪堂駢集覺路弘開補綴殘典不憚勤勞生平不設衣鉢一錫飄然無所繫念空諸所有即為正觀平等應緣解除一切乘五衍之軾開八正之門拯溺逝川大庇交喪內翰繆彤中行李嘉猷道過臺頂一見皈依玉帶山門雲天瓶水遠吟深契信非偶然厥後比歲赴覲闕廷欽承天問妙諦微幾既協皇情而譯事鉤稽尤邀特眷是以殊禮異數寵賚滋多康熙辛亥年已七十矣退居頤養日以禪誦課心長坐不臥徧翻大藏專業華嚴以千部為期嘗以歲旱露跣禱祈甘雨應時而降萬眾交忭癸亥秋聖祖幸臨臺山御書題賜號為清涼老人宸藻流輝焜燿千古住山二十八稔法雲遠蔭火宅晨涼慧日載升重昏夜曉宗風方暢祖庭用光以康熙二十六年三月九日示寂先期集眾告以大限十日將從西去勉哉修持勿令墜失日至索浴號佛不絕端坐而化春秋八十有七僧臘六十有九聖祖聞之賜金營葬發龕茶毗塔于鳳林谷設食供眾至者四千餘人悲聲悽響感動林壑戶部左侍郎蔣弘道為撰碑銘勒石山阿老藏丹貝傳清老藏丹貝蒙古大喇嘛也初入衛籍為趙氏居京師禮崇國寺僧為導師又嘗師土波沙門藍建巴始至清涼居中頂及羅睺結念所依數歲不去後復遠涉土波蒙古于其國語言文字靡不通曉更自清涼山歸崇國寺時清室龍興世祖入關定鼎燕都襃崇佛法雅慕高僧己亥歲詔眾推選清涼山住持僉舉丹貝庚子卓錫茲山辛丑受鉢莅眾重葺經堂遠接雲水廣護人天不分畛域聖祖御宇鑾輿西狩遂幸斯山至菩薩頂則金碧煇煌筍璀璨花臺寶幢尊嚴峻肅異于他處獎賚有加既而奉命監修五頂精藍悉力殫思恭恪從事甲子復以陳請菩薩頂大殿改覆碧琉璃瓦自山入都跋履艱辛遂成勞瘵偃臥崇國乃邀恩眷日遣御醫調治終莫能瘳及其滅也賜金存恤闍維塔于鳳林谷生平樸質沖澹器宇疏朗妙解文義兼工書法其于學也專事熏修蓋息心淨行之流以康熙二十三年五月示寂春秋五十三僧臘四十四悟塵和尚傳清悟塵蘇州人康熙間發心朝五臺病於顯通寺向知事者索白米少許欲煑粥知事曰此地長年止食油麥安得白米塵乃發願決以白米細麪供養往來滿一切願病瘉遂往山西汾州府募緣時將十月天降大雪于城內外尋宿不得即坐城外門洞下中夜凍息將絕感韋馱菩薩託夢于徧城大小巷眾檀越併十方院僧云五臺山文殊菩薩將凍死于城外如是再三眾至旦出城見塵坐城門洞下微有息在眾即擡至十方院經時方甦眾問原由塵說如上眾皆歎異共助金資若干塵還臺山至鎮海寺借茶房三間備具米麪等物如法供養後復建殿堂數十楹立為叢席接待大眾現已一敗塗地矣章嘉國師傳清章嘉呼土克圖西藏人生有異徵不迷本性相傳為達賴第二世呼畢勒罕轉生種種異徵眾所欽企幼育于寺乃居第五世達賴弟子清康熙時寰宇載寧重譯來朝聖祖晚歲頗耽禪理屢諮法典歎為玄識特錫灌頂普慧廣慈之號命主蒙古多倫泊彙宗寺章嘉博貫宗教梵行精純諦義圓妙西藏蒙古諸王尤相崇信多所歸依世宗在藩邸時傾心仰慕歎為真再來人古今希有及總萬機為造善因寺居之恩禮有加純廟登極應詔入京翻譯大藏中一切呪語以漢滿蒙藏四體並列使讀者瞭然不限方域刊為梵筴用廣流傳嘗言其國有狼達爾瑪漢者滅法毀教其後補綴未全而經已佚因假楞嚴善本四譯而歸之又佐莊親王修同文韻統晚年病目與人講論能以手數經卷篇目而指其文往往不爽羣相驚歎非記誦嫻熟未易臻此以乾隆四十一年寂于京師源修釋柱傳清源修姓周氏寶應人年四十一棄家為僧冬夏一衲日中一食清咸豐間約同侶數輩取道西藏往參佛國偕伴數人不堪其苦皆中途而返修一意孤行孑然獨邁越懸渡逾雪山經歷寒暑直達印度心欲見佛無從問訊憩坐道旁忽聞呼江南源修者三且云佛召汝見遂飄然隨去至則殿宇光明目不能視志誠頂禮佛坐蓮臺摩頂慰勞賜名阿王因問來此何為修以但願常覲如來對佛云此間緣分尚未具足汝可往清涼山造石室五使參禮者有所安息斯可矣遂遵道而返刻志興築獲茲靈感冀得神助果遇蜀僧釋柱相與為理數年間五座石室並峙五頂修後端坐誦佛號無疾而化釋柱未詳其姓氏生平靜默寡言人莫測其蘊奧既與源修同築五臺石室既成遂隱於棲霞山光緒初元示微疾囑當事者于茶毗後粉骨為丸施之江中並備錢二百酒一樽花果飴餅少許眾如其言時值隆冬泛舟江上捨茲丸骨所攜錢物恰應舟子所需散後回棹訊所由來知亡者遺言乃爾舟子歎曰此人當生安養矣轉瞬失舟所在達天和尚傳清通理字達天直隸冀州新河趙氏子生於康熙辛巳身相具足七處平滿垂手過膝口四十齒圓具後徧歷講席於諸經論若宿習然一目貫通悉解玄旨年二十四行化京師開講華嚴于西山遺光寺天下道俗無不景仰因閱清涼大疏識臺山為文殊菩薩住處遂發心往禮止萬緣庵講報恩經為臺山供養一日至北臺霽日光風倏忽白雲靉靆銀色光芒天色晡晚罔識歸路師默祈菩薩示其歸路遂拜既起已在萬緣庵門矣歡喜而入謂眾曰菩薩送我來師有禮讚偈曰菩薩慈悲不可思議六十餘里頃刻而至乾隆癸酉奉旨管理僧錄司印務兼為拈花寺住持欽賜紫衣庚子秋西藏聖師班禪戹爾德尼來京恭祝七旬萬壽與師會遇暢談佛法大義聖師稱善遂供師以香帛曼答等物旋荷聖恩勅封闡教禪師之號壬寅六月十三日謂弟子曰予八十餘年未離佛法且道即今是有佛法是無佛法眾無以應師視之微笑而逝春秋八十有二所註法華楞嚴圓覺金剛盂蘭盆五教儀等疏行于世音義煨燼上烏回切下詳進切餘焰也確苦角切固也築諸六切甕於貢切瞢𧄼上莫登切下徒亙切鄂卬入聲侈態上昌是切下他代切翊余力切輔也蛻舒芮他味二切悼徒到切輟知劣切止也纂初患切屆皆去聲狩收去聲紿台上聲眴胡絹切目搖也脅虛業切餚音爻繇音由藝魚祭切詁音古顒玉恭切矯各表切鬣力涉切龍鬚蜿蜒上宛下延罽居例切抃音卞郢盈上聲琮才宗切綬音受徽音暉剡音琰緱胡侯切州名炯戶頂切璝古回切玉也甿莫耕切民也乂牛世切才也裔余制切垠五根切厓也爨七亂切閭呂平聲賺徒陷切錯也剗楚𥳑切縮雙玉切碾尼展切舁以諸切兩手舉貌屹魚乙切踣蒲北切嶼似與切水中山也頵於倫切大首也擘補革切婪郎感切貪也諗尸枕切偃於宛切鹽音閻沁侵去聲水名墼居的切土坏掠彴上力尚切下音斫橫水木勘苦紺切鴉於加切撲普鹿切廨音介憩去利切柑音甘擺補買切瞌睡上苦合切下殊瑞切踢他力切讖初禁切砒鴆上音毗下沈去聲撒桑割切邽音圭地名鄢音偃擷音絜捋取也擲音直綴知衛切駢部田切
