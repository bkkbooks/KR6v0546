body:
  text: 第七帝王崇建粵稽法運之興衰定藉明良援手欲得剎竿之起倒全憑檀護皈心無憂王造八萬四千窣堵震旦光流南北朝頒三百八十龍章御書閣建皇恩始沛於漢朝曠典尤隆於清代寶珠金鉢頒自九重御筆宸章垂於五頂陛戺頽而靈應開臺風雨剝而真容易瓦爰以獎緇流之演教即以錫黎庶之惠嘉使人免蓋纏家臻仁壽五戒敷而鄉黨無犯罪之民三多祝而朝廷致無為之治出世實通於入世佛道有裨於王道也志崇建昔如來以教法并弟子纍諸國王大臣以為外護欲令法眼常存僧行有賴是以法運盛衰係乎大力王臣作不作耳且以五臺觀之自漢明肇化以來聖主明王代為崇建及至清朝御翰宸章煥乎有文豈非靈山付託有在耶今略録數條且彰曼殊盛化於清則略加詳焉以期鑑今而知古由帝王崇奉而知佛恩之及人也深且遠矣其他備諸弘明集金湯篇云按大唐感通傳道宣律師嘗問諸天佛法來此之始及域內聖道場處天名玄暢者答曰周穆王時已有聲教及此清涼山者曼殊所居穆王於中造廟祀之據此周代世主已有崇奉者矣列子仲尼篇云商太宰問仲尼曰夫子聖者歟子曰丘博學強識者也聖則丘何敢曰三王聖者歟子曰三王善任智勇聖則丘弗知曰五帝聖者歟子曰五帝善任仁義聖則丘弗知曰三皇聖者歟子曰三皇善任因時聖則丘弗知太宰大駭曰然則孰為聖人乎子曰丘聞西方有聖人者不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉不知真聖歟真不聖歟鬳齊林公注曰彼時已有佛教及此故夫子推之不然孰能加於五帝三皇之上據此玄暢之言信矣宋為商後故稱宋為商後漢明帝永平十年摩滕法蘭二尊者西至以慧眼觀清涼山乃文殊化宇中有阿育王所置佛舍利塔阿育王此云無憂天竺鐵輪王也能驅使鬼神將佛舍利造八萬四千塔藏之散布閻浮五臺山有一焉奏帝建寺額曰大孚靈鷲寺大孚弘信也帝以始信佛化故以名焉出感通傳元魏孝文帝再建大孚靈鷲寺環匝鷲峯置十二院今顯通寺即善住院菩薩頂即真容院餘皆湮沒矣歲時香火遣官修敬華嚴疏備高齊建寺二百餘所割八州稅以充香火之需隋文帝開皇元年下詔五頂各置寺一所設文殊像各度僧三人令事焚修古傳十三年十二月遣使至清涼山設齊上自書疏曰大隋皇帝佛弟子堅敬白文殊大士周武亂常侮滅聖迹致愚者無以開迷智者無以入聖朕往植善因寄茲昌祚起廢興殘福資黎首釋彼往愆惟聖斯假觀皇記唐太宗貞觀二年下詔五臺山等名山大剎聖道場處修齊七日其略曰朕惟神道設教慈悲為先玄化潛通亭育資始朕躬膺大寶撫愛黎元矜愍之心觸類而長是用旁求冥貺幽贊明靈所冀九功惟序五福斯應宜為普天億兆仰祈嘉祐辨正録九年十一月詔曰朕惟三乘結轍濟度為先八正歸源慈悲為主流智慧之海膏澤羣生翦煩惱之林津梁品物任真體道理叶至仁妙果勝因事符積善朕欽若金輪恭膺寶命至德之訓無遠不思大聖之規靡幽不察欲使人免蓋纏家臻仁壽比緣喪亂僧徒減少華臺寶殿窺戶無人紺髮青蓮櫛風沐雨眷言凋毀良用憮然凡天下名山佛剎宜度僧衆數以三千為限代朕清修而五臺山者文殊閟宅萬聖幽栖境係太原實我祖宗植德之所尤當建寺度僧切宜祗畏是年臺山建寺十所度僧百數釋鑑高宗顯慶元年五月敕有司天下僧尼有犯國法者以僧律治之不得與民同科是年十月敕有司五臺等聖道場地僧寺不得稅斂古史則天武后長安二年后神遊五頂是歲敕并州刺史重建清涼寺三年敕感法師率百餘僧詣山齊會緇素千人咸見五雲佛手天仙白鹿現於空冥杳靄之間州牧奏聞天后大悅封感公昌平開國公食邑一千戶住清涼寺三年敕琢玉文殊像遣大夫魏元忠送詣清涼寺上自書疏云朕曩承佛記今握化寶敢不恢弘至道光闡大猷但以萬機所係未能親詣聖境恭叩慈容仰白文殊大師昭格古傳肅宗乾元元年敕有司五嶽并五臺各建寺一區選高行沙門主之釋史代宗廣德元年十一月土番陷京師帝在華陰文殊現形以狄語授帝及郭子儀克復京師駕還長安詔修五臺文殊殿鑄銅為瓦造文殊像高一丈六尺鍍金為飾釋鑑德宗貞元十二年上敕河東節度使李詵進香于五臺文殊殿上書延大華嚴寺觀法師入長安觀國師傳是歲西域南天竺烏茶國王遣使進華嚴後分梵本入朝兼賫奇香御節往禮五頂其辭略云南天竺烏茶國深信最勝善逝法者修行最勝大乘行者吉祥自在師子王稽首和南于大支那國五頂山中曼殊室利摩訶菩提薩埵足下伏願我此流通聖教開化支那功德因緣惟聖證知於當來世得如善財始見大聖開法界眼入普賢乘觀國師外集華嚴鈔云大唐始太宗至德宗凡九帝莫不傾仰靈山留神聖境御札天衣每光五頂中使香藥不斷歲時至於百辟歸崇殊邦賫供不可悉記矣宋太宗太平興國元年詔天下童子願出家者得度牒是年有詔五臺深林大谷禪侶幽棲盡蠲稅賦二年上幸成都敕以金泥書經一藏畢敕中使送五臺菩薩院供養每歲度僧五十人令事清修宋傳五年四月遣使蔡廷玉等詣臺山建寺敕河東路有司運給七年八月寺成賜額太平興國宋傳真宗景德四年敕五臺真容院建重閣設文殊像綺煥殊麗映曜林谷賜額奉真閣宋清涼傳自太宗至仁宗三代聖主眷想靈峯流光五頂天書玉札凡三百八十軸恢隆佛化照曜林藪清涼之興于時為盛宋清涼傳元世祖至元元年詔曰朕眷仰靈峯大聖所宅清修之士冥贊化機官民人等不得侵暴次年造經一藏敕送臺山善住院令僧披閲為福邦民十二佛剎皆為葺新古傳成宗元貞二年帝幸臺山覩靈現有感敕建萬聖祐國寺英宗至治二年帝幸臺山見文殊化身晃若臨鏡至王子寺有感敕重修葺是年復建普門寺按妙濟等傳所記止此然據五峯之間殘碑古鼎多是敕造則知歷代人主皆有崇建而諸史不録故後世無聞焉明成祖永樂四年秋初上遣大智法王班丹札釋於西土迎葛哩麻尊者入京敕封大寶法王大善自在佛師性愛林泉不樂京師辭行上曰五臺深林幽谷萬聖所棲師可居之敕賜鑾輿旌幢傘蓋之儀遣使送至大顯通寺安置於是敕修育王所置佛舍利塔并顯通寺十三年六月上制書於五臺妙覺圓通慧慈普應輔國顯教灌頂弘善西天佛子大國師釋迦也失曰相別遽爾數月想徒從已達臺山宴坐高峯神遊八極與文殊老人翱翔於大漠之鄉超然於萬化之始朕豈勝眷念薄賫瓜果以見所懷遣書故不多致十五年秋上制書妙覺圓通國師曰秋風澄肅五臺早寒遠惟佛境清虛法體安泰今制袈裟禪衣遣使祗送以表朕懷後列異色衣八品十七年春上制書妙覺圓通國師曰自師西行忽見新歲使者還乃知履況安和適慰朕懷茲以鍍金蓮座用表遠貺并系之讚讚不録十八年春上製五臺感應序曰朕惟佛道弘深廣大超出三界圓滿十方慈悲利濟普度羣生然其要在於使人為善去惡積福修因以共成佛道朕閒嘗取佛經所載諸佛世尊如來菩薩尊者神僧名號編為歌曲名經俾人諷誦歡喜讚歎功德之大不可涯涘朕遣使賫歌曲名經往五臺散施一至顯通寺即有祥光煥發五色絢爛上燭霄漢衣被山谷彌滿流動朗耀日星久而不散已而復有文殊菩薩乘獅子隱隱出雲際微露形迹及雲收霧斂乃見獅子揚髯吐舌奮臂振足騰躍鼓舞左顧右盼於山駐立明日復有羅漢由華嚴嶺而來或五百或三百或一二百先後踵接聯翩翱翔其間有頂經包者有拄錫者有裸體者有袒肩者有跣足者有跛躄而傴僂者衆至三千餘隱現出沒變化非常于時四方來遊五臺者莫不頂禮讚歎以為千載之希遇大抵人之好善惟在於誠誠則純一無妄貫徹內外足以通天地感鬼神貫金石孚豚魚雖極其幽遠無有不感通者朕統臨天下夙夜拳拳以化民為務凡有所為一出於至誠是以佛經所至屢獲感通觀於五臺之顯應尤足徵矣今特命工繪為圖且復為歌曲以系之善信之士果能誠心向善日積月纍念念不已將見生享榮華世臻福慶沒則往生淨土受諸快樂苟為褻瀆輕慢不惟身受譴罰殃及子孫至于生生世世永墮沈淪不能消釋嗚呼作善獲福為惡召殃徵之已往具有明驗故曰積善之家必有餘慶積不善之家必有餘殃又曰作善降之百祥作不善降之百殃然則人之欲為善以祈福壽者可不勉哉可不勉哉十九年夏上制書妙覺圓通國師曰朕惟大師覺行圓融慈悲利濟朕心瞻企夙夜不忘茲以歲序維新特遣禪師板竹等祝讚於朕并以佛像等物來鑑茲勤誠良深嘉悅今遣內官戴與等賫佛像等物并致偈讚用表朕懷讚不録宣宗宣德二年夏上制書妙覺圓通國師曰朕惟佛氏道體冲玄德用神妙厥大無外厥高無等歷代人主罔不崇信朕恭膺天命主宰華夷體祖宗一視同仁之心隆佛氏慈悲不二之教追惟皇祖太宗文皇帝皇考仁宗昭皇帝鞠育深恩如天罔極欲舉薦揚之典一念之誠夙夜惓切惟大師功行高潔定慧圓明朕切慕之特遣太監侯顯賫書禮請冀飛錫前來敷揚寶範廣闡能仁以副朕誠朕不勝瞻望之至英宗正統十年春既望上造藏經送安臺山普恩禪寺有聖諭曰朕體天地保民之心恭承我皇曾祖考弘道之志刊印大藏經典頒賜天下開覺生民福資大業茲以一藏靈文送安普恩禪寺永充供養聽所在僧徒看誦讚揚上為國家祝釐下與生民祈福務須敬奉守護不許泛常私借觀看輕毀褻瀆致有損失違者究治故諭天順二年夏上敕諭護持山西五臺顯通等寺曰朕惟如來之教清淨圓明慈悲利濟陰翊皇度覺悟羣迷自昔有國家者皆遵崇其教用廣仁化矧五臺乃名勝之地古剎所在我朝嘗建顯通等寺俾僧徒居住清修上祝國釐下祈民福已有年矣昨命僧録覺義從鈴住持率所在僧徒自在修行今特頒敕護持凡本寺及合山諸寺不許一應官員軍民人等侵擾以沮壞其教違者以法罪之故諭是年夏上又敕諭曰朕惟佛氏之教以空寂為宗以普度為心化民以善覺物以真勿殺以崇仁勿盜以崇義勿淫以崇禮勿迷以崇智勿妄以崇信使強不陵弱大不虐小各安其分各遂其生舉一世而同躋仁壽之域其為功德豈不遠哉今五臺新建寺賜名圓照聽從僧徒自在修行所在官員軍民人等不得侮慢欺陵以沮其教違者必罪無赦故諭是年敕造五大藏經安于五頂各有敕旨護持以充化寶開覺生民憲宗成化七年夏上敕諭五臺都綱司曰朕觀釋教古無官司僧林穆穆法化自淳後世聖遠道衰不循律軌淫盜奸欺靡所不至故我聖祖不獲已設僧司以治之冀可復也唯五臺者乃國家資福之所千巖萬壑皆清行之棲爾都綱司宜衛護之使修心之徒安生得所餘不法者依律治之毋得挾官虐衆侵陵掊剋以負朕意違則罪之欽此故諭十七年上為聖母祈安造鍍金文殊像高一丈六寸並畫佛百軸香金五百兩布帛千匹念珠萬串遣太監李珍賫送臺山文殊寺供養散施上制聖諭曰朕惟佛氏之教道明一極德化羣方利兼自他妙融空有不言而民自信不令而民自行攝惡崇善導迷返覺其陰翊皇度之功深矣而五臺山者大聖所宅感應靈異振耀今日實我國家吉祥福地今特遣官奉賫佛像供儀詣山修敬以表朕誠爰祈海宇寧謐母后萬齡時熙民樂同躋仁壽刻之於珉永示朕心凡厥臣庶咸體斯意欽哉敬哉是年三月聖母慈懿皇太后敕造藏經佛像并幡幢金帛若干遣官修敬特頒懿旨護持是年六月復敕諭五臺大文殊寺朕惟佛氏以空寂為宗慈濟為用陰翊皇度開覺生民神化之功幽明無閒是以華夷愚智家戶奉行非勉之而然乃自然也其於治道豈不裕哉朕嗣位以來至善之道罔不思隆今承皇考崇善保民之心敕建五臺山文殊寺僧二十名月給糧六斗命爾短竹斑丹禪師焚修上祝國釐下祈民福一應官員軍民不許侵暴以沮其教違者治之故諭是月上復敕諭五臺山覺義定旺曰朕惟佛氏之教以一心為宗萬行為用德贊皇度道善斯民稽之前代悉多尚之逮我祖宗興作彌勤於五臺營建寺宇數區實為國家祈福之所今特命爾都綱以職焚修尚宜丕振宗風廣宣慈化用副朝廷崇獎之意欽此毋忽孝宗弘治十二年秋上制疏遣太監周輔祭告五臺文殊大聖曰朕惟佛道宏深誡言明切教行中國粵有歲年唯此靈山具聞顯迹爰稱內典景切朕懷特遣內使遠申祭告伏惟至聖慧鑑衷誠祚我邦家永膺多福謹告武宗正德二年秋上敕建銅瓦殿賜額廣宗寺兼聖諭護持七年春上敕梵僧朵而只堅於中臺頂建寺一區鑄鐵為瓦賜額曰演教并敕旨護持自有佛法以來聖主明王代為興建護其教不啻若大寶眷其徒不啻若赤子至我聖朝褒封敕諭建立弘通惓惓於佛道者勤矣而吾徒果能體斯道而行之乎如能行之則卓然物表不待護而存不藉持而久矣如不能行雖龍章金券亦弗我護也今觀臺山數剎敕諭尚存早至寥落豈非吾人不自護持耶故曰大明不能破長夜之昏慈母不能保身後之子可不勉哉朽庵曰佛法不度無緣國法能治有罪古今之大義也後之入清涼者知此二法畏敬奉行則無咎而有緣矣慎之慎之神宗萬曆七年敕建大寶塔記曰大明慈聖宣文明肅皇太后曩承佛記示御金輪恆以護法善民為心海宇蒼生餐和飲澤陶沐玄化復於都城內外建寺數區飯僧數萬至於梁河濟溺蠲逋賑貧功德勝善難以悉記萬曆戊寅秋建慈壽塔寺告完明年己卯春復出膳羞之資於五臺山建護國祐民釋迦文佛舍利寶塔遣太監范江李友董其役塔在鷲峯之前羣山中央基至黃泉高二十一丈圍二十五丈狀如澡瓶上十三級寶瓶高一丈六尺鍍金為飾覆盤圍七丈一尺匝以垂帶懸以金鈴更造金銀寶玉等佛像及諸雜寶安置藏中海內皇宗宰官士庶沙門景仰慈化造像書經如雲而集悉納藏中十年壬午秋工成并及寺宇佛殿經樓藏輪禪室罔不備焉永為國家祝釐之所功德勝事光越千古擇僧行圓廣授僧録善世以職焚修特進光祿大夫左柱國太傅兼太子太師吏部尚書中極殿大學士張居正奉命撰碑文云昔阿育王獲佛舍利八萬四千顆各建塔藏之散布南洲今五臺靈鷲前塔是其一也我聖母慈聖宣文明肅皇太后前欲創寺於此為穆考薦福今上祈儲以道遠中止遂于都城西建慈壽寺以當之居正業已奉敕為之記顧我聖母至誠精虔不忘始願復遣尚衣監太監范江李友輩捐供奉餘資往事莊嚴敕建大塔院寺并護國祐民釋迦文佛舍利寶塔工始七年九月成于十年七月所費金錢出自內帑聖母復命臣記之臣竊惟聖人之治天下齊一幽明兼綜道法其粲然者在古先帝王垂成憲著章程於世矣乃有不言而信不令而行以慈蔭妙雲覆涅槃海饒益羣生則大雄氏其人也其教以空為宗以慈為用以一性圓明空不空為如來藏即其說不易知然以神力總持法界撈漉沈淪闡幽理資明功亦神道設教者所不廢也我聖母誕育皇上為億兆主養成聖德澤洽宇內施及外方日所出入靡不懷服至如寧靜以奠坤維建梁以拯墊溺儉素以式閫帷慈惠以布恩德含生之倫有陰蒙其利而不知者所種孰非福田所證孰非菩提哉乃益建勝因廣資冥福託象教以誘俗乘般若以導迷斯可謂獨持慈寶默運化機者矣先是虜酋俺答款關效貢請于海西建寺延僧奉佛上可之賜名曰仰華至是聞聖母作五臺寺又欲領其衆赴山進香夫醜虜嗜殺乃其天性一旦革彼凶慝懷我好音臣以是益信佛氏之教有以陰翊皇度而我聖母慈光所燭無遠不被其功德廣大雖盡恆河沙數不足以喻其少分也乃拜手稽首庸記歲月系之以詞曰於惟慈氏闡教金庚以般若智濟度羣生普天率土莫非化城法雲慧日布濩流行雁門之西亦有靈鷲七級浮屠巋然特秀阿育獲寶散布緇流南飛一粒永鎮神州塵劫幾更山川不改重建妙因機如有待惟我聖母天篤慈仁總持陰教覆育蒸民莊嚴寶剎於茲靈壤龍象巍巍人天共仰既右父母亦右我皇定命孔固寖隆寖昌臣庸作頌億載垂光是年正月上為祈國儲遣太監尤用張本詣大塔院寺修無遮齊七日十二年遣太監高勛王忠詣山飯僧十三年敕造大藏經布諸天下名山用充化寶各有敕旨護持五臺有二藏焉二十六年夏六月遣御馬監太監王忠曹奉於五頂并獅子窩等處修建弘福萬壽報國祐民吉祥大齊於千佛澡浴池設大施會十方四衆皆得飽滿秋九月遣官曹奉賫白金一千兩于獅子窩修建洪福萬壽藏經樓閣二十七年春三月遣御馬監太監王忠賫送佛大藏經一藏於獅子窩并賜寺額曰大護國文殊寺皇帝敕曰朕發誠心印造佛大藏經頒施在京及天下名山寺院供奉經首護敕已諭其由爾住持及僧衆人等務要虔潔供安朝夕禮誦保安眇躬康泰宮壼肅清懺已往愆尤祈無疆壽福民安國泰天下太平俾四海八方同歸仁慈善教朕成恭己無為之治道焉今特差內漢經廠掌壇御馬監太監王忠賫請一藏前去五臺山獅子窩文殊寺供安各宜仰體知悉欽哉故諭夏五月仍遣太監王忠賫送佛大藏經一藏安於中臺賜金泥水陸神像於龍泉寺復建萬聖閣夏六月仍遣王忠賫一藏安置北臺秋八月遣官任徐楊趙何五人於五頂作祝延聖壽道場冬十一月遣官曹奉懸長幡二首於獅子窩二十八年夏四月遣太監王忠賫送佛經三藏安置餘三臺普山飯僧自是臺山欽賜藏經凡有六藏皆有聖諭護持用充化寶開覺生民清聖祖御製南臺普濟寺碑南臺世傳文殊示現之處也臺當山之陽地稍暄暖金蕖日菊佛鉢之花生遍崖谷若錦繡之相錯故其峯曰錦繡之峯峯有寺曰普濟蓋宋所建云佛氏之教息心淨業以獨善其身而文殊所願在饒益衆生布施以廣仁義持戒以守信忍辱以撝謙精進以施敬禪定以守靜智慧以通理其慈惠之心有獨弘者自漢以來清涼之山代有精舍至宋之十寺為國祝釐恆賜詔褒答載籍傳之所從來久矣山之僧棲巖飲澗以自甘惟守其師之說以獨善其身寺有圮者力不能興葺也朕登南臺乃命復新普濟寺以居僧徒之息心淨業者俾祝釐於是登臨者覩象教之精嚴慈惠之心可以油然而生矣御製東臺望海寺碑周官職方氏掌天下之圖辨九州之國州表一山以為鎮躋其巔可以望海者則揚之會稽兖之岱青之沂幽之醫無閭凡四山焉惟岱距海較遠登日觀望扶桑其岧嶤峻極尤非他山可比也五臺隸并州州境無海而臺之東峯以望海名蓋雲中上黨晉地踞天下之脊山之麓既高而臺之高復三十餘里龍泉以東岡巒陵阜皆處其下遠瞰滄瀛諸州景光惝恍儼若紫瀾浩渺與青皓之氣混涵相接記稱旭日方升望大海若陂澤信有以哉臺有寺榱棟桯桷不蔽風雨朕省方登此命加修葺復其初制蓮臺法相固極莊嚴已四方之人得於焉信宿縱睇渤海之朝暾以視夫岱宗日觀又何多讓耶遂礱片石文以紀之御製中臺演教寺碑五臺之山高出雲代然不與嶽鎮之列山經禹貢以及道書所稱洞天福地均莫之載蓋自昔為釋子所棲故與峨眉普陀號三靈山之三山者或在海上或當巴蜀險遠之區惟茲山峙神京之右千里而近宜登陟者較多焉朕嘗覽觀載記謂茲山東有離嶽火珠西有麗農瑤室南有洞光珠樹北有玉澗瓊枝中峯則有自明之金環光之璧是靈秀所鍾中臺為尤異矣臺高三十有九里游者至是必思憩息之地此自唐以來演教寺之所由建也山峻多風寺久傾圮朕爰命工拓而新之譬之於物澤雉十步一啄百步一飲鵬之飛九萬里而扶搖六月而息其遠邇高下雖殊方其息自適之情則一也朕之命新茲寺亦欲登是山者咸有自適之樂焉爾御製北臺靈應寺碑清涼山左鄰恆嶽右接天池環基五百餘里五峯竦峙而北臺為最高歲癸亥二月朕鑾輅西巡登其層巘雲氣生舄屨之下開闔萬變時春雪方霽青霄敻絶天風颯然所謂身歷清淨之域目睇澄鮮之境心遊太古之地盈縮造化吐納皓氣泠然善也臺名叶斗峯舊有靈應寺丹青虧剝杗廇敧傾朕念衣緇之流不外仁義以為教故熙隆之代亦所不廢矧曼殊化宇恆著感通遠邇之人蘄嚮久矣爰命崇其陛戺飾其題楶土木瓦石丹堊金碧之需財自內出不涉經費工以傭給役弗違農是以工敏於事而民若不知秋八月告落成焉董事之臣請製文勒石以志之用以上昭景福於慈闈下廣惠嘉於兆庶垂示於億萬斯年爾御製西臺法雷寺碑朕聞鷲嶺蜂臺不少水晶之域鵠林鹿苑恆開金粟之園莫不獻露裛之千花蔭春浮之雙樹乃有龍湫抱鉢偕猿鶴以高棲燕子成龕捫藤蘿而直上況夫竺法蘭之初地舊是花宮勾龍爽之畫圖羣推紫府緗蓮照野智炬長然青豆開房精廬用結西臺絶頂有法雷寺焉方廣化城文殊密宇琉璃布地霄鄰挂月之峯栲栳名山磴轉干雲之石仙人五百青髻曾遊沙界三千玉毫盡徹指修蛇之負壑恆嶽匪遙數歸雁之銜蘆并門在下朕對清涼之勝景招閶闔之長風北瞻則畢月昴車西顧則參旗井鉞憫此伽藍久廢飭其瓴甋重新紺馬銖衣長轉相輪於雲表桐魚茶版仍流清響於山椒庶使龍象行時金閣遠符大曆狻猊坐處神光復現元和云爾御製菩薩頂大文殊院碑夫坤輿九壤厥有名區方志所標莫之勝紀若其巒隴綿邈巖岡崇阻縈紆窈窕悠然遠望列峯競秀壁立霞駮不可殫視則惟清涼山之五臺為最勝五臺並高數十里如覆盂如懸棧閣如鶻摩天如鼇脊出海飛崿穹岫飄渺超忽而風高氣寒土脈深狹遠近如一至夫鬱盤回薄斥為廣衍之地蘊真萃異信為靈迹之所棲託者惟臺懷為最勝臺懷居五臺之中左襟右帶前俯後仰若在懷抱其地陽陸平林舊多梵剎有菩薩頂文殊院者相傳文殊示現於此其殿廡尤莊嚴弘邃殆福地之精藍神坰之奧蹟也我朝建鼎以來歲有給賜為國祝釐蓋其境域過清不可以業四民故於禪棲為宜雖寥迥深岨介於無何有之鄉巾瓶施乞遠莫能致然象教所感伊蒲之供率集於四方居其地者亦類能謹教律嚴心行致其潔虔以一歸於慈氏之訓庶克稱國家優厚之意焉朕西巡駐蹕茲地因劖詞於石列之院中以垂示無極云御製殊像寺碑蓋惟清涼福地拱紫塞以標靈臺頂名山矗蒼穹而聳秀文殊飛錫之所夙號神皋吉祥闡教之區舊多精剎況龕留古佛為法海之殊觀壤接中臺乃香林之勝境創琳宮於自昔葺紺宇以維新茲殊像禪寺開基臺畔結宇山阿谷邇鳳林環千巖之紫翠堂臨鹿苑俯萬壑之煙霞峯曰梵仙望層巒於天際泉稱般若落清礀於雲中殿有金容因名殊像天人肅穆羣瞻龍象之尊儀度莊嚴共禮狻猊之座青蓮妙相琉璃光映於林端碧樹幽棲鐘磬聲聞於嶺外乃以歲年歷久陳迹都荒風雨所摧僧寮非舊慨此丹楹畫壁無非蛛網塵封朕為慈闈祝釐故爾法駕戾止憫茲頽廢爰命締修梵宇再興唄筵如故祇園金地依然多寶之場佛頂珠光重現牟尼之瑞招提既肅緇衲咸歸室可賴以安禪用勵清修之衆事有裨於勸俗聿弘覺善之門式勒貞珉永垂奕御製碧山寺碑原夫園成祇樹聿標鷲嶺之奇香滿栴檀定據琳宮之勝況山雄雲代宇結清涼文殊演教而開基天龍八部迦葉瞻容而俯首螺髻千身繄朔塞之名區實梵王之法界經馱白馬覩貝畫之常新地布黃金喜薝林之重燦茲碧山寺棟構臺阿翬飛巖畔榜傳普濟化城之玉磶猶存谷號華嚴德水之青蓮時現銀龕珠洞映三藏之神光疊嶂層巒萃五方之靈秀浮煙罨翠迥接蒼穹含藹流清傍分緑澗荷羣峯之凝碧繞丈室以增幽雁塔崚嶒朱夏帶陰山之雪鶴林高下白毫連紫極之雲茲因歲月遷移川陵委寂禪枝忍草侵榛蔓以交蕪寶鐸雕甍歷風霜而黯色朕親來佛地藉祝慈禧爰整金繩丕施珠網啓琉璃之淨國寶樹攢香燦瓔珞之紅樓曇花四照相輪自備巧傍新幡丹鳳飛來還棲舊剎苾芻競集弘參不二之宗象力攸崇衆證無為之果用鐫貞石永煥名山御製臺麓寺碑朕惟道源普濟金輪轉靈鷲之峯象設莊嚴蘭若啓閻浮之地蓋振鐸聲於祇樹教澤彌長秀螺髻於蓮臺拜瞻斯肅況復文殊聖宅遙連紫塞之煙雲大士名區近作神京之屏翰五峯屹峙千嶂回環三春開四照之花長夏積經年之雪緬此清涼之靈境實為萬聖之幽棲若乃路入山隈寺名臺麓飄法幢於雲表影拂虹霓響清磬於林端聲浮澗壑維茲勝域迥異恆規朕永惟佛教之弘深欲躋羣生於仁壽巡行駐輦式禮香林仰祈嘉祉於慈幃敬製金容於祕殿出尚方之丹碧選內府之香檀刻鏤精工集經營於匠氏威儀豐約裁尺度於朕心妙相端凝映雲霞而煥彩粹容圓滿偕日月以齊輝瓔珞紛披寶鏡照大千之界蓮華璀璨祥烟籠丈六之身敬送臺山奉安淨土繡幡香輿出鳳闕而西行法鼓鯨鐘望鴈門而賁止遠近覩旌幢之盛天人瞻龍象之儀莫不注目竦觀齊心稽首講堂鈴鐸傳唄唱於天風畫栱琉璃朗慧燈於長夜繞徑挺菩提之樹巡檐現優鉢之香智海汪洋川嶽益增其炳煥慈雲瀰漫草木咸載其光華貝闕常新琳宮日麗嗣後六時禪誦望寶筏以知歸四遠緇流禮精藍而式化宗風丕振品類咸休用勒貞珉昭示無極御製羅睺寺碑朕省方觀民所過名山大川壯觀勝蹟與夫往聖先賢講學明道之地心切向往多所表章而釋氏之宮標靈顯異所在多有亦閒留題以寄遐懷嘗一再至五臺山慨然於清涼真境如遊崆峒汾水之間登眺五峯俱賜匾額維茲羅睺寺其地近文殊現相處其取義似皈依西方十六祖創建自唐顯迹於宋續修於勝國賢藩逮我先朝曾闢院以供十方暨朕躬亦嘗寵以翰墨而日月既久榱題傾圮赤白漫漶今住持僧元旦復規而新之加麗焉夫浮屠義不三宿則無地非桑下也以無所住為常住亦何處不清涼也然其過化之所往往留精舍焉亦弟子職也往聞羅睺擊鐘集大衆以別聲聞而宋丞相張商英嘗見神燈茲寺中則今元旦之舉於將廢也鐘聲燈影或者復聞聞而見見乎因援筆而賜之記御製湧泉寺碑地湧璇源山驛著醒心之號天開金界禪宮標盥掌之名故鍊性高僧每棲真於碧澗而熏修淨侶多遁迹於丹泉用浣滌乎塵氛乃流傳夫靈蹟五臺山湧泉寺者祇陀化域震旦清都宿歷井參聳蓮華之五萼山連恆岱環柏谷以千盤師利垂光神燈燭夜摩滕演教仙梵飄空陟中頂之岧嶤指北巖而迤邐路入清涼之谷萬派跳珠俗稱澡浴之池一泓噀玉神膏滭沸金猊駐影而徘徊細縠奫淪香象陵波而蹴踏諸天撝護四衆皈依既撥蘚以披榛遂結亭而甃石雪竇寫空明之色月林生定慧之香朕以西巡駕臨初地喜清瀾之不竭念聖境之未湮爰發帑金式扶象教揭獅堂以纓壑紺碧重新翼鴈舍以連霄烟嵐增煥雖慈恩廣大千江共印圓輝而誠愫感通一勺亦沾法乳珠幡寶網無雲不現吉祥粥鼓齊鐘是水皆分功德綿靈長於億載甘露恆滋普福利於羣生祥河永濟泐諸貞石昭示來茲御製廣宗寺碑蓋聞教闡浮提資神功於廣運理融淨域表大義於正宗山號清涼藏名歡喜覽勝則鴈門紫塞標奇則鹿苑珠林式承由舊之規宜示維新之象廣宗寺者幽棲妙境禪悅精藍泉飛猊座之旁塔湧鷲峯之半當其開基曩代鑿石成龕架宇虛巖範銅為瓦大孚金像儼然分照十方小朵天城久矣齊稱五佛屬星霜之流易致風雨之漂搖朕法駕時巡祇園涖止特頒金帑再飾寶坊畫棟於以重輝雲楣因茲永煥風幡高卓偕鐵鳳以翱翔月鏡長圓並金羊而焜耀種福田於福地事重祝釐宣梵唄於梵天意兼勸俗庶幾宏敷廣席徹權實之指歸丕振宗傳識源流之派別云爾御製顯通寺碑山分五頂亙右輔之雄區地接三霄顯西方之化域惟大士棲真之所高揭獅牀為竺蘭演教之場羣標鴈舍靡不矗瓊梯於碧漢耀琳宇於丹巖茲顯通寺者創自永平闢大孚之靈蹟拓於元魏增善住之崇基唐宗始易前稱勝代再頒嘉號玉花園畔紺雨繽紛甘露津邊璇源滴瀝神燈煥彩散列巘以千星飛閣翔空絢明霞於萬疊洵臺懷之上剎恆朔之名藍也朕駕鑾輅以時巡望鷲峯而企嚮身雲忽湧陟初地之清涼心月常圓燭慧光之鴻朗特捐淨施香界重開聿改舊觀熏修倍肅石上辟支現影顯示吉祥函中舍利升輝盡生歡喜葳蕤紫菌宛同四照交枝曲折紅泉即是八功衍派上以綿慈闈之景算壽嶽彌崇下以錫兆姓之繁禧祥河普潤爰鐫片碣用詔來茲御製棲賢寺碑蓋惟鷲嶺西來西土旋移樂土鳳林東望東臺即是春臺漸近神京雲湧一峯獨秀回翔震旦蓮開五朵齊明谷鋪錦繡之花輝連忍草溝注清涼之水法具慈航名高選佛之場眺瀛州而若鏡迹表棲賢之社探石洞以如霞儼然證道之區允矣降真之所昔者大士於此現身早證圓通闡從聞思修之教顯標真實偕隨聲應感之緣曾為七佛之師化宣纍劫今作十方之主澤普羣生幸茲常喜之國都瞻禮妙德之相好出緡錢於內帑香火頻仍啓傑構於靈山莊嚴斯在祇園遐敞地分五百坤輿寶座一乘光遍三千世界禪枝影靜願風雨之調均覺海波澄信金湯之擁護祝慈有慶九天之壽域長新綿祚無疆兆姓之福田永賴礱鐫貞石託記載於斯文抒寫至懷俾昭垂於來許御製菩薩頂真容院碑碧落千尋浮法雲於五髻紺宮百疊湧慧日於一螺摩滕天眼之所憑阿育神光之所攝譬諸木金水火行配土而居中岱霍華恆嶽得嵩而峻極洵祇林之勝概梵界之偉觀矣茲菩薩頂寺者區包靈迹閣貯真容默贊化機初布貞觀墨詔顯資治理載新景德豐碑瑞像現於毫端金繩拓於覺路羣龍北向樓臺當地脈之中雙練南飛鐘磬隔烟波之外基緣闢而加廣殿以配而彌尊栴檀與婆律同熏薝蔔共優曇並馥結大士跏趺之坐峯擁蓮華登普賢般若之臺河呈香象百千賢劫俱歸不二法門萬億人天各證前三妙諦從此招提永煥欄楯重開臨列障以標奇冠諸方而首出用銘貞石作鎮名山御製白雲寺碑三明闡教弘塵海之津梁八正開宗示靈山之門閾白雲寺者五臺之接待院也面臨逵道已饒林麓之觀後枕巖椒即是烟霞之宅乍棼絲而出岫紺馬羣翔俄散綺以盈川玉毫同色縈青繚白朝暮皆宜罨翠浮嵐陰晴互換松寮爽塏霏香靄於諸天蓮社蕭間隔氛埃於下界聖真茲焉顯化開士託以潛棲溯厥由來亦云舊矣然而法輪未建祕境猶湮階繡苔錢難覓雀離之舍壁留蝸篆莫瞻螺髻之容惟洪構之有期信勝因之不昧朕旁搜竺典結念名區特頒內府之金鏐用飾上方之象設天龍八部齊拱齊筵鐘板六時共修禪誦剎竿高峙風琴動而月鏡升梵宇長新意蕊飛而心燈炳冀願船之普濟道在弘慈庶覺路之咸登義存廣善云爾有清諸帝悉信佛法其悟入最深者唯世宗雍正為第一不但在清為第一自大法東來皇帝中頗有修持嚴密悟入深遠者于中當以清世宗為宗說皆通之第一人具眼者觀其著作自可知此語不妄也清廷發源關東注重𡃤嘛世祖入關登極後屢令𡃤嘛啓建護國祐民道場于順治十二年十四年各派數十𡃤嘛往五臺山啓建護國祐民道場十八年特命阿王老藏𡃤嘛住持五臺山真容院督理番漢僧衆至聖祖康熙二十三年以後天下太平國家富裕或隔一二年往五臺山一次或每年一次由京至山凡用膳住宿之處各建行宮而大者有三一在真定府一在南臺下一在臺懷各大寺均有宴坐之所于各寺院或賜匾額或賜詩文或特加修葺為製碑記御書宸翰及頒賜珍物多難悉録今但録聖祖御製碑文十六道以示其概至高宗乾隆之世亦然仁宗嘉慶初一至五臺此後國運日衰不復再去所有行宮通皆坍塌淨盡鞠為叢林茂草矣然文殊所住真常寂滅之境不以世諦建設頽敗而為興衰衆生觸目明心之機或因世相變遷悟得自心本無生滅或由道場莊嚴悟得自心圓具萬德山河大地明暗色空無非毗盧遮那清淨妙土實為文殊菩薩常住道場願有心者咸注意焉附録慈雲大師寫彌陀經正信發願偈稽首十方佛彌陀聖中尊方等修多羅一切法寶藏觀音及勢至大地菩薩僧我以誠信心刻板并印造阿彌陀經卷及以正信偈旋造各一萬施四衆受持偈以發信心經以資讀誦若有每日中至少誦三卷年誦千八十十年萬八百況復多誦者及歷多年數如是積功德自然生佛前我此萬卷經隨所流布處極少得一人誦持生淨土我願承此力決定生彼國況復於多人人亡經復在展轉相傳授是名無盡燈燈燈相照耀破生死長夜顯出佛菩提究竟悉同生常寂光淨土持此清淨福回向奉君親我國聖帝王及聖后聖位仁壽各萬年覆育羣氓類我父母眷屬怨親非怨親咸承勝善根同生安養國
